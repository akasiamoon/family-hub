<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cottage Hub • Farmington</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: white; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Fixed Background - Using your Imgur link */
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; 
            background: #000 url('https://i.imgur.com/nH96gF0.jpeg') no-repeat center center fixed; 
            background-size: cover;
            transition: filter 1s ease-in-out;
        }

        /* Pure Glassmorphism */
        .glass {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 
                        inset 0 0 15px rgba(34, 211, 238, 0.05);
            border-radius: 2.5rem;
        }

        /* Title Effects */
        .hub-title {
            text-transform: uppercase;
            letter-spacing: 0.5em;
            background: linear-gradient(to right, #fde68a, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.4));
        }

        /* Scrollbars */
        .custom-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #22d3ee rgba(0,0,0,0.1); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }

        /* Calendar Styles */
        .fc { border: none !important; font-family: inherit; }
        .fc-toolbar-title { color: #22d3ee !important; font-weight: 800; font-size: 1.3rem !important; }
        .fc-button-primary { background: rgba(34, 211, 238, 0.15) !important; border: 1px solid #22d3ee !important; }
        .fc-daygrid-day:hover { background: rgba(34, 211, 238, 0.1) !important; cursor: pointer; }

        .hidden-ui { opacity: 0 !important; transform: translateY(50px) scale(0.98); pointer-events: none; }
        .bg-dim { filter: brightness(35%) contrast(1.1); }
        .bg-bright { filter: brightness(100%); }
    </style>
</head>
<body>

    <div id="bg-image" class="bg-dim"></div>

    <button onclick="toggleUI()" class="fixed bottom-10 right-10 z-50 bg-cyan-500/10 hover:bg-cyan-500/30 border border-cyan-400/50 px-8 py-3 rounded-full backdrop-blur-xl transition-all active:scale-95 shadow-lg shadow-cyan-500/20">
        <span id="toggleText" class="font-bold tracking-widest text-xs uppercase text-cyan-200">Hide Interface</span>
    </button>

    <div id="mainUI" class="container mx-auto p-6 lg:p-12 min-h-screen transition-all duration-700">
        <header class="mb-12 text-center lg:text-left">
            <h1 class="text-5xl hub-title mb-2">Cottage Hub</h1>
            <p class="text-cyan-400/50 text-xs tracking-[0.4em] uppercase">Farmington, MS • Mission Control</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            
            <div class="space-y-10">
                <div class="glass p-8">
                    <h2 class="text-orange-400 font-black text-sm tracking-widest uppercase mb-6 flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-orange-500 shadow-[0_0_10px_orange]"></div> Market List
                    </h2>
                    <div id="marketList" class="space-y-3 mb-6 h-48 custom-scroll"></div>
                    <div class="flex gap-2">
                        <input id="mInput" type="text" placeholder="Add grocery..." class="bg-white/5 border border-white/10 rounded-xl p-3 w-full text-sm outline-none focus:border-orange-500 transition-all">
                        <button onclick="saveMarket()" class="bg-orange-600/20 px-5 rounded-xl border border-orange-500/50 hover:bg-orange-600/40 text-orange-200 font-bold">+</button>
                    </div>
                </div>

                <div class="glass p-8">
                    <h2 class="text-green-400 font-black text-sm tracking-widest uppercase mb-6 flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_green]"></div> Meal Plan
                    </h2>
                    <div id="mealGrid" class="space-y-3 text-xs"></div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass p-10 h-full flex flex-col">
                    <h2 class="text-cyan-400 font-black text-sm tracking-widest uppercase mb-6 flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-cyan-500 shadow-[0_0_10px_cyan]"></div> Family Log
                    </h2>
                    <div id="notesLog" class="flex-grow space-y-6 mb-8 custom-scroll min-h-[400px]"></div>
                    <div class="flex gap-4">
                        <input id="nInput" type="text" placeholder="Share a note or update..." class="bg-white/5 border border-white/10 rounded-2xl p-5 w-full outline-none focus:border-cyan-500 transition-all">
                        <button onclick="saveNote()" class="bg-cyan-600/20 px-10 rounded-2xl font-black border border-cyan-400/50 hover:bg-cyan-600/40 text-cyan-200">POST</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass p-10">
                    <h2 class="text-cyan-300 font-black text-sm tracking-widest uppercase mb-8 flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-cyan-300 shadow-[0_0_10px_cyan]"></div> Schedule & Quests
                    </h2>
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- PASTE YOUR SUPABASE URL HERE ---
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let uiVisible = true;
        let calendar;

        window.onload = () => {
            if(SUPABASE_URL.includes('PASTE')) return console.warn("Missing URL");
            refreshAll();
            initCalendar();
            
            _supabase.channel('db').on('postgres_changes', {event:'*', schema:'public'}, () => {
                refreshAll();
                if(calendar) calendar.refetchEvents();
            }).subscribe();
        };

        function toggleUI() {
            uiVisible = !uiVisible;
            document.getElementById('mainUI').classList.toggle('hidden-ui', !uiVisible);
            document.getElementById('bg-image').className = uiVisible ? 'bg-dim' : 'bg-bright';
            document.getElementById('toggleText').innerText = uiVisible ? "Hide Interface" : "Show Interface";
        }

        async function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                height: 'auto',
                selectable: true,
                select: async (info) => {
                    const title = prompt('Add Entry:');
                    if (title) {
                        await _supabase.from('calendar_events').insert([{ title, start_date: info.startStr }]);
                        calendar.refetchEvents();
                    }
                },
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date, backgroundColor: 'rgba(34, 211, 238, 0.2)', borderColor: '#22d3ee' })) : []);
                }
            });
            calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }

        async function saveNote() {
            const i = document.getElementById('nInput');
            if (!i.value) return;
            const ts = new Date().toLocaleString([], {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: ts }]);
            i.value = "";
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `
                <div class="border-l-4 border-cyan-500/30 pl-6 py-4 bg-white/5 rounded-r-2xl transition-all hover:bg-white/10">
                    <small class="text-cyan-400/60 font-mono tracking-widest text-[10px] uppercase">${n.timestamp}</small>
                    <p class="text-white/80 text-lg font-light mt-1">${n.note}</p>
                </div>
            `).join('') : '';
        }

        async function saveMarket() {
            const i = document.getElementById('mInput');
            if (i.value) await _supabase.from('market_items').insert([{ text: i.value }]);
            i.value = "";
        }

        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <input type="checkbox" class="w-4 h-4 accent-orange-500">
                    <span class="text-sm text-white/70">${item.text}</span>
                </div>
            `).join('') : '';
        }

        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/5">
                        <span class="font-bold text-green-400">${day}</span>
                        <input onchange="updateMeal('${day}', this.value)" value="${meal}" class="bg-transparent text-right w-2/3 outline-none text-white/50 focus:text-white">
                    </div>
                `;
            }).join('');
        }

        async function updateMeal(day, menu) { await _supabase.from('meal_plan').upsert({ day, menu }, { onConflict: 'day' }); }
    </script>
</body>
</html>
