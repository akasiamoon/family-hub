<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Farmington</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700;800&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        /* SUBTLE PARTICLES */
        #particle-canvas { 
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            z-index: 1; pointer-events: none;
        }

        .sidebar {
            position: relative;
            width: 100%; max-width: 480px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; 
            z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 80%, rgba(0,0,0,0) 100%);
            border-right: 1px solid rgba(34, 211, 238, 0.1);
        }

        /* HIDEOUS SCROLLBAR FIX */
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.2); border-radius: 20px; }
        .sidebar { scrollbar-width: thin; scrollbar-color: rgba(34, 211, 238, 0.2) transparent; }

        .glass-module {
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(25px); border: 2px solid rgba(34, 211, 238, 0.2);
            border-radius: 1.5rem; margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .module-header { padding: 1.5rem; display: flex; justify-content: space-between; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .module-content { padding: 1.5rem; transition: all 0.5s ease; max-height: 1200px; opacity: 1; }
        .module-collapsed .module-content { max-height: 0; padding: 0; opacity: 0; overflow: hidden; pointer-events: none; }

        .hub-title {
            font-family: 'Cinzel', serif; letter-spacing: 0.2em;
            background: linear-gradient(to right, #fde68a, #22d3ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; text-transform: uppercase;
        }

        /* CLEARER BUTTONS & INPUTS */
        input { 
            background: rgba(0,0,0,0.8) !important; 
            border: 2px solid rgba(255,255,255,0.1) !important; 
            color: white !important; padding: 14px !important; 
            border-radius: 12px; width: 100%; margin-bottom: 12px; font-size: 16px;
        }
        
        .btn-ui { 
            background: #22d3ee !important; 
            color: #000 !important; 
            padding: 12px; border-radius: 12px; width: 100%; 
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 14px;
            transition: transform 0.2s, background 0.3s;
        }
        .btn-ui:active { transform: scale(0.98); }

        .btn-secondary {
            background: rgba(34, 211, 238, 0.1) !important;
            border: 1px solid #22d3ee !important;
            color: #22d3ee !important;
            padding: 8px 16px; border-radius: 10px; font-size: 12px; font-weight: 700;
        }

        #custom-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .modal-glass { background: rgba(15, 15, 20, 1); border: 2px solid #22d3ee; border-radius: 2rem; padding: 2.5rem; width: 90%; max-width: 440px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="custom-modal">
        <div class="modal-glass">
            <h3 id="modal-title" class="hub-title text-xl mb-6 text-center"></h3>
            <div id="modal-input-container"><input id="modal-input" type="text" placeholder="Enter name here..."></div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="btn-ui !bg-gray-800 !text-white !border-none">Cancel</button>
                <button id="modal-confirm" class="btn-ui">Confirm & Save</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <header class="mb-12">
            <h1 class="text-4xl hub-title">Siren's Sands</h1>
            <p class="text-cyan-400 text-sm tracking-widest uppercase mt-2 font-bold">Farmington Family Hub</p>
            
            <div class="mt-8">
                <button id="audioBtn" onclick="toggleAudio()" class="btn-secondary">🔊 Summon Sea Tides</button>
                <audio id="beachAudio" loop preload="auto">
                    <source src="https://actions.google.com/sounds/v1/water/ocean_waves.ogg" type="audio/ogg">
                </audio>
            </div>
        </header>

        <div id="marketMod" class="glass-module">
            <div class="module-header" onclick="toggle('marketMod')">
                <span class="text-orange-400 font-extrabold text-sm uppercase tracking-wider">🛒 Shopping List</span>
                <span onclick="triggerPurge(event)" class="text-[11px] font-bold text-red-400 uppercase">[Clear All]</span>
            </div>
            <div class="module-content">
                <div id="marketList" class="max-h-56 overflow-y-auto mb-6 space-y-3"></div>
                <input id="mInput" type="text" placeholder="Type item and hit Enter..." onkeydown="if(event.key==='Enter') saveMarket()">
                <button onclick="saveMarket()" class="btn-ui">Add To List</button>
            </div>
        </div>

        <div id="mealMod" class="glass-module">
            <div class="module-header" onclick="toggle('mealMod')">
                <span class="text-green-400 font-extrabold text-sm uppercase tracking-wider">🍲 Menu for the Week</span>
            </div>
            <div class="module-content"><div id="mealGrid" class="text-sm space-y-4"></div></div>
        </div>

        <div id="logMod" class="glass-module">
            <div class="module-header" onclick="toggle('logMod')">
                <span class="text-cyan-400 font-extrabold text-sm uppercase tracking-wider">📜 Family Log</span>
            </div>
            <div class="module-content">
                <div id="notesLog" class="max-h-72 overflow-y-auto mb-6 space-y-4"></div>
                <input id="nInput" type="text" placeholder="Type note and hit Enter..." onkeydown="if(event.key==='Enter') saveNote()">
                <button onclick="saveNote()" class="btn-ui">Post Note</button>
            </div>
        </div>

        <div id="calMod" class="glass-module">
            <div class="module-header" onclick="toggle('calMod')">
                <span class="text-cyan-200 font-extrabold text-sm uppercase tracking-wider">📅 Family Calendar</span>
            </div>
            <div class="module-content"><div id="calendar" class="text-[12px]"></div></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleAudio() {
            const a = document.getElementById('beachAudio');
            const b = document.getElementById('audioBtn');
            if (a.paused) { a.play(); b.innerText = "🔇 Mute Sea Tides"; } 
            else { a.pause(); b.innerText = "🔊 Summon Sea Tides"; }
        }

        function openModal(title, showInput, onConfirm) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-input-container').style.display = showInput ? 'block' : 'none';
            document.getElementById('custom-modal').style.display = 'flex';
            document.getElementById('modal-confirm').onclick = () => { onConfirm(document.getElementById('modal-input').value); closeModal(); };
        }
        function closeModal() { document.getElementById('custom-modal').style.display = 'none'; document.getElementById('modal-input').value = ''; }

        function toggle(id) { document.getElementById(id).classList.toggle('module-collapsed'); }

        window.onload = () => { refreshAll(); initCalendar(); animate(); };

        async function initCalendar() {
            window.calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 'auto', selectable: true,
                select: (info) => { openModal('New Event', true, async (title) => { if (title) { await _supabase.from('calendar_events').insert([{ title, start_date: info.startStr }]); window.calendar.refetchEvents(); } }); },
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date, color: '#0e7490' })) : []);
                }
            });
            window.calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }
        async function saveMarket() { const i = document.getElementById('mInput'); if (i.value) await _supabase.from('market_items').insert([{ text: i.value }]); i.value = ""; }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between items-center bg-white/[0.04] p-4 rounded-xl border border-white/5 group"><span>✦ ${item.text}</span><span class="cursor-pointer text-red-400 font-bold px-2" onclick="deleteItem('market_items', '${item.id}')">DELETE</span></div>`).join('') : '';
        }
        async function triggerPurge(e) { e.stopPropagation(); openModal('Wipe entire list?', false, async () => { await _supabase.from('market_items').delete().neq('id', 0); refreshAll(); }); }
        async function saveNote() { const i = document.getElementById('nInput'); if (i.value) await _supabase.from('family_notes').insert([{ note: i.value, timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }]); i.value = ""; }
        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `<div class="bg-white/[0.04] p-5 rounded-2xl border border-white/5 relative group"><small class="text-cyan-400 font-bold text-[10px] block mb-2">${n.timestamp}</small><p class="text-[16px]">${n.note}</p><span class="absolute top-4 right-4 cursor-pointer text-red-400 text-xs font-bold" onclick="deleteItem('family_notes', '${n.id}')">REMOVE</span></div>`).join('') : '';
        }
        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `<div class="flex justify-between items-center bg-white/[0.03] p-3 rounded-xl border border-white/5"><span class="font-black text-green-400 text-[11px] uppercase">${day}</span><input onchange="updateMeal('${day}', this.value)" value="${meal}" class="!bg-transparent !border-none !p-0 !m-0 !w-auto text-right text-cyan-400 font-bold"></div>`;
            }).join('');
        }
        async function updateMeal(day, menu) { await _supabase.from('meal_plan').upsert({ day, menu }, { onConflict: 'day' }); }
        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); }

        // --- PARTICLE ENGINE: SLOWER & SMALLER ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const glyphs = ['♪', '♫', '♩'];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.isNote = Math.random() > 0.3;
                this.text = glyphs[Math.floor(Math.random() * glyphs.length)];
                this.size = Math.random() * 8 + 4; // Smaller size
                this.speed = Math.random() * 0.4 + 0.1; // Slower speed
                this.opacity = Math.random() * 0.3 + 0.1;
                this.color = this.isNote ? '34, 211, 238' : '251, 191, 36';
            }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 100) * 0.3; if (this.y < -30) this.reset(); }
            draw() {
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                if (this.isNote) { ctx.font = `${this.size}px Cinzel`; ctx.fillText(this.text, this.x, this.y); } 
                else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 5, 0, Math.PI * 2); ctx.fill(); }
            }
        }

        for (let i = 0; i < 35; i++) particles.push(new Particle());
        function animate() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            particles.forEach(p => { p.update(); p.draw(); }); 
            requestAnimationFrame(animate); 
        }
    </script>
</body>
</html>
