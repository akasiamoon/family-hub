<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #bg-video {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover;
            transition: filter 0.5s ease;
        }
        .glass {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden-ui {
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
        }
        .video-dim { filter: brightness(40%); }
        .video-bright { filter: brightness(100%); }
    </style>
</head>
<body class="text-white font-sans overflow-hidden">

    <video autoplay muted loop playsinline id="bg-video" class="video-dim">
        <source src="Druid_s_Cottage_Looping_Video.mp4" type="video/mp4">
    </video>

    <button onclick="toggleUI()" class="fixed bottom-6 right-6 z-50 bg-orange-600/80 hover:bg-orange-500 p-4 rounded-full shadow-lg transition-all active:scale-95">
        <span id="toggleText">Hide Interface</span>
    </button>

    <div id="mainUI" class="container mx-auto p-4 lg:p-10 h-screen flex flex-col justify-between">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-2xl font-bold mb-4 text-orange-300">🛒 Market List</h2>
                <div id="marketList" class="space-y-2 mb-4 h-48 overflow-y-auto"></div>
                <div class="flex gap-2">
                    <input id="mInput" type="text" placeholder="Add..." class="bg-black/40 border border-white/20 rounded p-2 w-full">
                    <button onclick="saveMarket()" class="bg-orange-600 px-4 rounded">+</button>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl lg:col-span-2">
                <h2 class="text-2xl font-bold mb-4 text-blue-300">📜 Family Log</h2>
                <div id="notesLog" class="space-y-3 h-64 overflow-y-auto mb-4 pr-2"></div>
                <div class="flex gap-2">
                    <input id="nInput" type="text" placeholder="Share a note..." class="bg-black/40 border border-white/20 rounded p-2 w-full">
                    <button onclick="saveNote()" class="bg-blue-600 px-6 rounded">Post</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR KEY HERE
        const SUPABASE_URL = 'YOUR_URL_HERE';
        const SUPABASE_KEY = 'YOUR_KEY_HERE';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let uiVisible = true;

        function toggleUI() {
            uiVisible = !uiVisible;
            const ui = document.getElementById('mainUI');
            const video = document.getElementById('bg-video');
            const btnText = document.getElementById('toggleText');

            ui.classList.toggle('hidden-ui', !uiVisible);
            video.className = uiVisible ? 'video-dim' : 'video-bright';
            btnText.innerText = uiVisible ? 'Hide Interface' : 'Show Interface';
        }

        // Real-time saving logic would go here
        async function saveNote() {
            const input = document.getElementById('nInput');
            if (!input.value) return;
            const timestamp = new Date().toLocaleString([], { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            
            // For now, it adds locally. We can wire up the 'supabase.from()' call next!
            const log = document.getElementById('notesLog');
            log.innerHTML = `<div class="p-2 border-b border-white/10"><span class="text-xs text-blue-300 font-mono">[${timestamp}]</span><p>${input.value}</p></div>` + log.innerHTML;
            input.value = "";
        }
    </script>
</body>
</html>
