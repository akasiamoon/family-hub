<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tucker • Family Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@200;400;700;900&display=swap');
        :root { --sigil: #22d3ee; --gold: #fbbf24; }
        [data-theme="purple"] { --sigil: #a855f7; }
        [data-theme="red"] { --sigil: #ef4444; }
        [data-theme="green"] { --sigil: #10b981; }
        [data-theme="gold"] { --sigil: #fbbf24; }
        [data-theme="pink"] { --sigil: #f472b6; }
        [data-theme="orange"] { --sigil: #f97316; }
        [data-theme="silver"] { --sigil: #94a3b8; }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #e2e8f0; font-family: 'Cinzel', serif; overflow-x: hidden; }
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; background: #000; }
        .hub-container { display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 10; background: transparent; }
        .hero-image { width: 100%; height: 35vh; background: url('thefamilyhub.jpg') center center no-repeat; background-size: cover; border-bottom: 3px solid var(--sigil); }
        .sidebar { width: 100%; padding: 2rem 1.5rem; background: linear-gradient(to bottom, rgba(10,10,15,0.4) 0%, rgba(0,0,0,0.95) 100%); flex-grow: 1; }
        @media (min-width: 1024px) { .hub-container { flex-direction: row; height: 100vh; overflow: hidden; } .hero-image { width: 60%; height: 100vh; border-bottom: none; border-right: 3px solid var(--sigil); } .sidebar { max-width: 500px; height: 100vh; overflow-y: auto; scrollbar-width: none; } }
        .oracle-row { display: flex; justify-content: space-around; align-items: center; font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--sigil); margin: 15px 0; text-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
        .glass-module { background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; margin-bottom: 1.5rem; overflow: hidden; }
        .expensive-header { font-size: 12px; letter-spacing: 0.3em; font-weight: 900; text-transform: uppercase; padding: 1rem 1.25rem; background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 2px solid transparent; border-image: linear-gradient(to right, var(--gold), var(--sigil)) 1; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .avatar-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; }
        .avatar-option { height: 42px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; background: rgba(0,0,0,0.6); transition: 0.3s; }
        .avatar-option.active { border-color: var(--sigil); box-shadow: 0 0 15px var(--sigil); transform: scale(1.1); }
        .vibe-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px 20px; }
        .theme-dot { height: 22px; width: 22px; border-radius: 50%; border: 1px solid white; cursor: pointer; justify-self: center; }
        input { background: rgba(0,0,0,0.6) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: #fff !important; padding: 12px !important; border-radius: 10px; font-family: 'Inter', sans-serif; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="hub-container">
        <div class="hero-image"></div>
        <div class="sidebar">
            <header class="text-center mb-6">
                <h1 class="text-4xl font-black tracking-[0.2em]" style="background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TUCKER</h1>
                <div class="oracle-row">
                    <span id="clock">00:00:00</span>
                    <div class="flex items-center gap-2"><span>☁️</span> <span id="temp">52°F</span></div>
                    <span>FARMINGTON</span>
                </div>
                <div class="glass-module mb-4">
                    <div class="avatar-bar">
                        <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🐢')">🐢</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🐺')">🐺</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🦉')">🦉</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '⚓')">⚓</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '📖')">📖</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🥥')">🥥</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🌴')">🌴</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🐬')">🐬</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🦀')">🦀</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🎸')">🎸</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🏹')">🏹</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '⚔️')">⚔️</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🍄')">🍄</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '💎')">💎</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🍺')">🍺</div>
                    </div>
                </div>
                <div class="glass-module mb-6">
                    <div class="vibe-bar">
                        <div class="theme-dot bg-cyan-400" onclick="setTheme('')"></div>
                        <div class="theme-dot bg-purple-600" onclick="setTheme('purple')"></div>
                        <div class="theme-dot bg-red-600" onclick="setTheme('red')"></div>
                        <div class="theme-dot bg-emerald-500" onclick="setTheme('green')"></div>
                        <div class="theme-dot bg-yellow-500" onclick="setTheme('gold')"></div>
                        <div class="theme-dot bg-pink-400" onclick="setTheme('pink')"></div>
                        <div class="theme-dot bg-orange-500" onclick="setTheme('orange')"></div>
                        <div class="theme-dot bg-slate-400" onclick="setTheme('silver')"></div>
                    </div>
                    <input id="userName" type="text" placeholder="COMMANDER NAME" class="text-center font-black">
                </div>
            </header>
            
            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('marketContent')"><span>Provisions</span><span>↕</span></div>
                <div id="marketContent" class="p-6"><div id="marketList" class="space-y-4 mb-4 text-sm font-bold text-white"></div><input id="mInput" type="text" placeholder="Add provision..." onkeydown="if(event.key==='Enter') saveItem('market_items', 'mInput')"></div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('mealContent')"><span>Meal Plan</span><span>↕</span></div>
                <div id="mealContent" class="p-6"><div id="mealList" class="space-y-4 mb-4 text-sm font-bold text-white"></div><input id="mealInput" type="text" placeholder="Dinner plan..." onkeydown="if(event.key==='Enter') saveItem('meal_plan', 'mealInput')"></div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('noteContent')"><span>The Chronicler</span><span>↕</span></div>
                <div id="noteContent" class="p-6"><div id="notesLog" class="space-y-4 mb-4 text-sm font-bold text-white"></div><input id="nInput" type="text" placeholder="Write history..." onkeydown="if(event.key==='Enter') saveNote()"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentSigil = '🔱';

        function selectAvatar(el, icon) { document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active')); el.classList.add('active'); currentSigil = icon; }
        function setTheme(t) { document.body.setAttribute('data-theme', t); }
        function toggleModule(id) { const e = document.getElementById(id); e.style.display = e.style.display === 'none' ? 'block' : 'none'; }

        window.onload = () => { refreshAll(); animate(); setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'}); }, 1000); };

        async function refreshAll() { loadList('market_items', 'marketList'); loadList('meal_plan', 'mealList'); loadNotes(); }
        async function saveItem(table, inputId) {
            const i = document.getElementById(inputId); if(!i.value) return;
            const name = document.getElementById('userName').value || 'Amber';
            await _supabase.from(table).insert([{ text: `${currentSigil} ${name}: ${i.value}` }]);
            i.value = ""; refreshAll();
        }
        async function loadList(table, divId) {
            const { data } = await _supabase.from(table).select('*').order('created_at', { ascending: true });
            document.getElementById(divId).innerHTML = data?.length ? data.map(item => `<div class="flex justify-between border-b border-white/5 pb-2"><span>${item.text}</span><span class="text-red-900 font-bold cursor-pointer" onclick="deleteItem('${table}', '${item.id}')">×</span></div>`).join('') : '<div class="opacity-20 italic text-[10px]">Empty...</div>';
        }
        async function saveNote() {
            const i = document.getElementById('nInput'); if(!i.value) return;
            const name = document.getElementById('userName').value || 'Amber';
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${currentSigil} ${name} • ${new Date().toLocaleTimeString()}` }]);
            i.value = ""; loadNotes();
        }
        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `<div class="border-l-4 border-cyan-400 pl-4 py-2 bg-white/5 rounded-r-lg mb-2"><small class="text-[9px] opacity-40 uppercase font-black tracking-widest">${n.timestamp || ''}</small><p class="text-sm font-bold mt-1">"${n.note}"</p><span class="text-[8px] text-red-900 cursor-pointer uppercase font-black" onclick="deleteItem('family_notes', '${n.id}')">Delete</span></div>`).join('') : '';
        }
        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); }

        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.init(); }
            init() { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; this.size = Math.random() * 25 + 10; this.speed = Math.random() * 1.5 + 0.5; this.opacity = Math.random() * 0.4 + 0.1; this.isEmber = Math.random() > 0.6; this.char = this.isEmber ? '•' : '♪'; }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 50) * 0.8; if (this.y < -50) this.init(); }
            draw() { ctx.fillStyle = this.isEmber ? '#f97316' : '#22d3ee'; ctx.globalAlpha = this.opacity; ctx.font = `${this.size}px serif`; ctx.fillText(this.char, this.x, this.y); }
        }
        for (let i = 0; i < 50; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    </script>
</body>
</html>
