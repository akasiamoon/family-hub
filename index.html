<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tucker Cooper Burns • Family Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@200;400;700;900&display=swap');

        :root { --sigil: #22d3ee; --gold: #fbbf24; }
        [data-theme="purple"] { --sigil: #a855f7; }
        [data-theme="green"] { --sigil: #10b981; }
        [data-theme="red"] { --sigil: #ef4444; }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; background-size: cover;
            color: #e2e8f0; font-family: 'Cinzel', serif; overflow: hidden; 
        }

        #particle-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

        .sidebar {
            position: relative; width: 100%; max-width: 480px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 85%, rgba(0,0,0,0) 100%);
            border-right: 3px solid var(--sigil); scrollbar-width: none;
        }

        /* ORACLE ROW - CLEAN & CENTERED */
        .oracle-row {
            display: flex; justify-content: space-around; align-items: center; 
            font-size: 11px; font-weight: 900; letter-spacing: 2px;
            color: var(--sigil); margin: 20px 0 40px 0;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.4);
        }

        .expensive-header {
            font-size: 12px; letter-spacing: 0.35em; font-weight: 900; text-transform: uppercase;
            padding: 1.1rem 1.25rem; background: linear-gradient(to right, var(--gold), var(--sigil));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            border-bottom: 2px solid transparent; border-image: linear-gradient(to right, var(--gold), var(--sigil)) 1;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* ELITE GLASSMORPHISM */
        .glass-module {
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem;
            margin-bottom: 2.5rem; overflow: hidden; transition: 0.4s ease;
        }
        .glass-module:hover { border-color: var(--sigil); box-shadow: 0 0 30px rgba(34, 211, 238, 0.15); }

        .avatar-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; }
        .avatar-option { height: 45px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(0,0,0,0.6); transition: 0.3s; }
        .avatar-option.active { border-color: var(--sigil); box-shadow: 0 0 15px var(--sigil); transform: scale(1.1); }

        input { background: rgba(0,0,0,1) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: #fff !important; padding: 15px !important; border-radius: 10px; font-family: 'Inter', sans-serif; width: 100%; }

        #themeMenu { display: none; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 10px; background: #000; border: 1px solid var(--sigil); border-radius: 10px; margin-bottom: 10px; }
        .theme-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid white; }

        /* INTERACTIVE CALENDAR */
        .cal-date { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; }
        .cal-today { border: 2px solid var(--gold) !important; color: var(--gold); }
        .has-quest { border-color: var(--sigil) !important; box-shadow: inset 0 0 10px var(--sigil); }
        .quest-banner { background: linear-gradient(to right, rgba(251,191,36,0.2), transparent); border-left: 4px solid var(--gold); padding: 15px; margin-top: 5px; border-radius: 0 10px 10px 0; }

        #questModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); backdrop-blur: 15px; align-items: center; justify-content: center; }
        .modal-glass { background: #08080c; border: 2px solid var(--gold); padding: 2.5rem; border-radius: 1rem; width: 90%; max-width: 420px; text-align: center; }
    </style>
</head>
<body id="mainBody">

    <div id="questModal">
        <div class="modal-glass">
            <h2 id="modalDateTitle" class="text-xl font-black mb-6 text-white tracking-widest uppercase"></h2>
            <div id="modalEventList" class="space-y-3 mb-6 text-left max-h-40 overflow-y-auto pr-2"></div>
            <input id="modalInput" type="text" placeholder="Assign Appointment...">
            <div class="flex gap-4 mt-6">
                <button onclick="closeQuestModal()" class="w-full py-3 border border-white/10 uppercase text-[10px] font-black">Return</button>
                <button id="addQuestBtn" class="w-full py-3 bg-white/5 border border-white/20 uppercase text-[10px] font-black">Assign</button>
            </div>
        </div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <header class="text-center mb-4">
            <h1 class="text-3xl font-black tracking-[0.2em]" style="background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TUCKER COOPER BURNS</h1>
            <p class="text-[10px] tracking-[0.8em] opacity-40 uppercase mt-1">Family Hub</p>
            
            <div class="oracle-row">
                <span id="clock">00:00:00</span>
                <div class="flex items-center gap-2"><span id="weatherIcon">🌧️</span> <span id="temp">57°F</span></div>
                <span>FARMINGTON</span>
            </div>

            <div class="avatar-bar bg-white/5 rounded-2xl border border-white/5">
                <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐢')">🐢</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐺')">🐺</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🦉')">🦉</div>
                <div class="avatar-option" onclick="selectAvatar(this, '⚓')">⚓</div>
                <div class="avatar-option" onclick="selectAvatar(this, '📖')">📖</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🥥')">🥥</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🌴')">🌴</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐬')">🐬</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🦀')">🦀</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🎸')">🎸</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🏹')">🏹</div>
                <div class="avatar-option" onclick="selectAvatar(this, '⚔️')">⚔️</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🍄')">🍄</div>
                <div class="avatar-option" onclick="selectAvatar(this, '💎')">💎</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🍺')">🍺</div>
            </div>
            
            <div class="flex gap-2 mt-4">
                <input id="userName" type="text" placeholder="NAME" class="text-center font-black">
                <button onclick="toggleThemeMenu()" class="p-4 border border-white/10 rounded-xl text-[9px] uppercase font-black hover:bg-white/5">Theme</button>
            </div>
            <div id="themeMenu" class="mt-2">
                <div class="theme-dot bg-cyan-400" onclick="setTheme('')"></div>
                <div class="theme-dot bg-purple-600" onclick="setTheme('purple')"></div>
                <div class="theme-dot bg-emerald-500" onclick="setTheme('green')"></div>
                <div class="theme-dot bg-red-600" onclick="setTheme('red')"></div>
                <div class="theme-dot bg-yellow-500" onclick="setTheme('gold')"></div>
            </div>
        </header>

        <div class="glass-module">
            <div class="expensive-header"><span>Grocery List</span><span onclick="purgeList()" class="text-[8px] cursor-pointer opacity-30 hover:opacity-100">Purge</span></div>
            <div class="p-6"><div id="marketList" class="space-y-4 mb-4 text-sm font-bold font-inter"></div><input id="mInput" type="text" placeholder="Provision..." onkeydown="if(event.key==='Enter') saveMarket()"></div>
        </div>
        
        <div class="glass-module">
            <div class="expensive-header"><span>Love Notes</span><span id="heartCount" class="text-[9px] text-red-500 font-black">❤️ 0</span></div>
            <div class="p-6">
                <div id="pinnedLog" class="mb-6 space-y-6 border-b border-white/5 pb-6"></div>
                <div id="notesLog" class="space-y-6 mb-4"></div>
                <input id="nInput" type="text" placeholder="Post note..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header"><span onclick="changeMonth(-1)" class="cursor-pointer">◀</span><span id="calMonth"></span><span onclick="changeMonth(1)" class="cursor-pointer">▶</span></div>
            <div id="calendarDates" class="grid grid-cols-7 gap-1 p-4 min-h-[250px]"></div>
            <div id="bannerArea" class="p-4 bg-white/5 border-t border-white/10"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', dispDate = new Date();

        function selectAvatar(el, icon) { document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active')); el.classList.add('active'); currentSigil = icon; }
        function toggleThemeMenu() { const m = document.getElementById('themeMenu'); m.style.display = m.style.display === 'grid' ? 'none' : 'grid'; }
        function setTheme(t) { document.body.setAttribute('data-theme', t); }
        function closeQuestModal() { document.getElementById('questModal').style.display = 'none'; }
        function changeMonth(o) { dispDate.setMonth(dispDate.getMonth() + o); buildCalendar(); }

        window.onload = async () => { 
            await refreshAll(); buildCalendar(); animate(); 
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}); }, 1000);
        };

        async function refreshAll() { await Promise.all([loadNotes(), loadMarket()]); }
        async function purgeList() { if(confirm("Clear grocery list?")) { await _supabase.from('market_items').delete().neq('id', 0); loadMarket(); } }
        
        async function saveMarket() {
            const i = document.getElementById('mInput'); if(!i.value) return;
            const name = document.getElementById('userName').value || 'Someone';
            await _supabase.from('market_items').insert([{ text: `${currentSigil} ${name}: ${i.value}` }]);
            i.value = ""; loadMarket();
        }

        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between border-b border-white/5 pb-2"><span>${item.text}</span><span class="text-red-900 font-bold cursor-pointer" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }

        async function saveNote() {
            const i = document.getElementById('nInput'); if(!i.value) return;
            const name = document.getElementById('userName').value || 'Someone';
            const { error } = await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${currentSigil} ${name} • ${new Date().toLocaleTimeString()}`, is_pinned: false }]);
            if (error) console.error("Save Note Error:", error);
            i.value = ""; await loadNotes();
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            if(!data) return;
            document.getElementById('heartCount').innerText = `❤️ ${data.length}`;
            const p = data.filter(n => n.is_pinned), r = data.filter(n => !n.is_pinned);
            const html = (n) => `<div class="border-l-4 border-cyan-500/50 pl-4 py-2 group"><small class="text-[9px] opacity-40 uppercase font-inter">${n.timestamp}</small><p class="italic text-[16px] font-bold mt-1 text-white">"${n.note}"</p><div class="flex gap-4 mt-2"><span class="cursor-pointer ${n.is_pinned ? 'text-red-500' : 'opacity-20'}" onclick="togglePin('${n.id}', ${n.is_pinned})">❤️</span><span class="text-red-900 font-bold cursor-pointer" onclick="deleteItem('family_notes', '${n.id}')">×</span></div></div>`;
            document.getElementById('pinnedLog').innerHTML = p.length ? `<div class="text-[8px] font-black text-yellow-500 mb-2 tracking-[4px]">ARCHIVE OF HEARTS</div>` + p.map(html).join('') : '';
            document.getElementById('notesLog').innerHTML = r.map(html).join('');
        }

        async function togglePin(id, s) { await _supabase.from('family_notes').update({ is_pinned: !s }).eq('id', id); await loadNotes(); }
        async function deleteItem(t, id) { await _supabase.from(t).delete().eq('id', id); refreshAll(); buildCalendar(); }

        async function buildCalendar() {
            const y = dispDate.getFullYear(), m = dispDate.getMonth();
            document.getElementById('calMonth').innerText = dispDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            const grid = document.getElementById('calendarDates'); grid.innerHTML = '';
            const { data: appts } = await _supabase.from('calendar_events').select('*');
            
            const todayStr = new Date().toISOString().split('T')[0];
            const todayQuests = appts?.filter(a => a.start_date === todayStr);
            document.getElementById('bannerArea').innerHTML = todayQuests?.length ? todayQuests.map(q => `<div class="quest-banner"><small class="text-[8px] uppercase tracking-widest text-[#fbbf24] font-black">Today's Quest</small><div class="text-sm font-bold">${q.title}</div></div>`).join('') : '<div class="text-[9px] opacity-30 italic">No quests today.</div>';

            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasA = appts?.some(e => e.start_date === ds);
                const isT = (d === new Date().getDate() && m === new Date().getMonth() && y === new Date().getFullYear());
                grid.innerHTML += `<div class="cal-date ${isT ? 'cal-today' : ''} ${hasA ? 'has-quest' : ''}" onclick="openQuestModal('${ds}', ${d})">${d}</div>`;
            }
        }

        async function openQuestModal(ds, d) {
            document.getElementById('modalDateTitle').innerText = `${d} ${dispDate.toLocaleString('default', { month: 'long' })}`;
            document.getElementById('questModal').style.display = 'flex';
            const { data: evs } = await _supabase.from('calendar_events').select('*').eq('start_date', ds);
            document.getElementById('modalEventList').innerHTML = evs?.length ? evs.map(e => `<div class="bg-white/5 p-4 rounded flex justify-between items-center border border-white/10 text-xs font-bold"><span>${e.title}</span><span class="text-red-500 font-black cursor-pointer" onclick="deleteItem('calendar_events', '${e.id}'); openQuestModal('${ds}', ${d});">×</span></div>`).join('') : '<p class="opacity-30 italic text-xs text-center">No assignments.</p>';
            document.getElementById('addQuestBtn').onclick = async () => {
                const v = document.getElementById('modalInput').value; if(!v) return;
                await _supabase.from('calendar_events').insert([{ title: v, start_date: ds }]);
                document.getElementById('modalInput').value = ""; openQuestModal(ds, d); buildCalendar();
            };
        }

        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.init(); }
            init() { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; this.size = Math.random() * 20 + 10; this.speed = Math.random() * 1.5 + 0.5; this.opacity = Math.random() * 0.3; this.char = ['♪', '♫', '•'][Math.floor(Math.random()*3)]; }
            update() { this.y -= this.speed; if(this.y < -50) this.init(); }
            draw() { ctx.fillStyle = this.char === '•' ? '#f97316' : '#22d3ee'; ctx.globalAlpha = this.opacity; ctx.font = `${this.size}px serif`; ctx.fillText(this.char, this.x, this.y); ctx.globalAlpha = 1; }
        }
        for (let i = 0; i < 40; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
