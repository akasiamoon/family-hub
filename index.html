<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Farmington Chronicle</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;700&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        /* FORCE THE CANVAS TO SHOW */
        #particle-canvas { 
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            z-index: 1; /* Moved up so it's visible but behind text */
            pointer-events: none;
            display: block;
        }

        .sidebar {
            position: relative;
            width: 100%; max-width: 460px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; 
            z-index: 10; /* Keeps UI above particles */
            background: linear-gradient(to right, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 80%, rgba(0,0,0,0) 100%);
            border-right: 1px solid rgba(34, 211, 238, 0.1);
        }

        .glass-module {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(25px); border: 1px solid rgba(34, 211, 238, 0.25);
            border-radius: 1.25rem; margin-bottom: 1.5rem;
        }

        .module-header { padding: 1.25rem; display: flex; justify-content: space-between; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .module-content { padding: 1.5rem; transition: all 0.5s ease; max-height: 1000px; opacity: 1; }
        .module-collapsed .module-content { max-height: 0; padding: 0; opacity: 0; overflow: hidden; pointer-events: none; }

        .hub-title {
            font-family: 'Cinzel', serif; letter-spacing: 0.4em;
            background: linear-gradient(to right, #fde68a, #f59e0b, #22d3ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; text-transform: uppercase;
        }

        /* Input styling */
        input { background: rgba(0,0,0,0.7) !important; border: 1px solid rgba(34, 211, 238, 0.2) !important; color: white !important; padding: 12px !important; border-radius: 10px; width: 100%; margin-bottom: 10px; }
        .btn-magic { background: rgba(34, 211, 238, 0.1); border: 1px solid #22d3ee; color: #22d3ee; padding: 10px; border-radius: 10px; width: 100%; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 10px; transition: 0.3s; }
        
        #custom-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .modal-glass { background: rgba(15, 15, 20, 0.95); border: 1px solid #22d3ee; border-radius: 1.5rem; padding: 2.5rem; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="custom-modal">
        <div class="modal-glass">
            <h3 id="modal-title" class="hub-title text-lg mb-4 text-center"></h3>
            <div id="modal-input-container"><input id="modal-input" type="text" placeholder="..."></div>
            <div class="flex gap-4 mt-6">
                <button onclick="closeModal()" class="btn-magic opacity-50">Cancel</button>
                <button id="modal-confirm" class="btn-magic">Confirm</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <header class="mb-12">
            <h1 class="text-3xl hub-title">Cottage Hub</h1>
            <p class="text-cyan-400/40 text-[9px] tracking-[0.5em] uppercase mt-2 font-bold">The Farmington Chronicle</p>
            
            <div class="mt-8 flex gap-3">
                <button id="audioBtn" onclick="toggleAudio()" class="btn-magic !w-auto px-6">Summon Tides</button>
                <audio id="beachAudio" loop preload="auto">
                    <source src="https://actions.google.com/sounds/v1/water/ocean_waves.ogg" type="audio/ogg">
                </audio>
            </div>
        </header>

        <div id="marketMod" class="glass-module">
            <div class="module-header" onclick="toggle('marketMod')">
                <span class="text-orange-400 font-black text-[11px] uppercase tracking-widest">🛒 Market</span>
                <span onclick="triggerPurge(event)" class="text-[9px] text-orange-200/30 hover:text-orange-400 uppercase cursor-pointer">[Purge]</span>
            </div>
            <div class="module-content">
                <div id="marketList" class="max-h-48 overflow-y-auto mb-6 space-y-3"></div>
                <input id="mInput" type="text" placeholder="Add provision..." onkeydown="if(event.key==='Enter') saveMarket()">
            </div>
        </div>

        <div id="mealMod" class="glass-module">
            <div class="module-header" onclick="toggle('mealMod')">
                <span class="text-green-400 font-black text-[11px] uppercase tracking-widest">🍲 Meals</span>
            </div>
            <div class="module-content"><div id="mealGrid" class="text-[11px] space-y-3"></div></div>
        </div>

        <div id="logMod" class="glass-module">
            <div class="module-header" onclick="toggle('logMod')">
                <span class="text-cyan-400 font-black text-[11px] uppercase tracking-widest">📜 Log</span>
            </div>
            <div class="module-content">
                <div id="notesLog" class="max-h-64 overflow-y-auto mb-6 space-y-4"></div>
                <input id="nInput" type="text" placeholder="Post chronicle..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div id="calMod" class="glass-module">
            <div class="module-header" onclick="toggle('calMod')">
                <span class="text-cyan-200 font-black text-[11px] uppercase tracking-widest">📅 Schedule</span>
            </div>
            <div class="module-content"><div id="calendar" class="text-[10px]"></div></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // AUDIO FIX Logic
        function toggleAudio() {
            const a = document.getElementById('beachAudio');
            const b = document.getElementById('audioBtn');
            if (a.paused) {
                a.play().then(() => { b.innerText = "Mute Tides"; }).catch(e => console.error("Audio block:", e));
            } else {
                a.pause();
                b.innerText = "Summon Tides";
            }
        }

        // MODAL Logic
        function openModal(title, showInput, onConfirm) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-input-container').style.display = showInput ? 'block' : 'none';
            document.getElementById('custom-modal').style.display = 'flex';
            document.getElementById('modal-confirm').onclick = () => { onConfirm(document.getElementById('modal-input').value); closeModal(); };
        }
        function closeModal() { document.getElementById('custom-modal').style.display = 'none'; document.getElementById('modal-input').value = ''; }

        function toggle(id) { document.getElementById(id).classList.toggle('module-collapsed'); }

        window.onload = () => { refreshAll(); initCalendar(); animate(); };

        async function initCalendar() {
            window.calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 'auto', selectable: true,
                select: (info) => { openModal('New Quest', true, async (title) => { if (title) { await _supabase.from('calendar_events').insert([{ title, start_date: info.startStr }]); window.calendar.refetchEvents(); } }); },
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date, color: 'rgba(34, 211, 238, 0.4)' })) : []);
                }
            });
            window.calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }
        async function saveMarket() { const i = document.getElementById('mInput'); if (i.value) await _supabase.from('market_items').insert([{ text: i.value }]); i.value = ""; }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between items-center bg-white/[0.03] p-3 rounded-lg border border-white/5 group"><span>✦ ${item.text}</span><span class="cursor-pointer opacity-0 group-hover:opacity-100" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }
        async function triggerPurge(e) { e.stopPropagation(); openModal('Purge List?', false, async () => { await _supabase.from('market_items').delete().neq('id', 0); refreshAll(); }); }
        async function saveNote() { const i = document.getElementById('nInput'); if (i.value) await _supabase.from('family_notes').insert([{ note: i.value, timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }]); i.value = ""; }
        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `<div class="bg-white/[0.03] p-4 rounded-xl border border-white/5 relative group"><small class="text-cyan-500/40 text-[9px] block mb-2">${n.timestamp}</small><p class="text-[14px]">${n.note}</p><span class="absolute top-2 right-3 cursor-pointer opacity-0 group-hover:opacity-100" onclick="deleteItem('family_notes', '${n.id}')">×</span></div>`).join('') : '';
        }
        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `<div class="flex justify-between items-center bg-white/[0.02] p-2 border border-white/5"><span class="font-bold text-green-400/70 uppercase text-[10px]">${day}</span><input onchange="updateMeal('${day}', this.value)" value="${meal}" class="!bg-transparent !border-none !p-0 !m-0 !w-auto text-right text-cyan-400 text-xs"></div>`;
            }).join('');
        }
        async function updateMeal(day, menu) { await _supabase.from('meal_plan').upsert({ day, menu }, { onConflict: 'day' }); }
        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); }

        // --- ANIMATION ENGINE FIX ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const glyphs = ['♪', '♫', '♩', '♬'];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 50;
                this.isNote = Math.random() > 0.4;
                this.text = glyphs[Math.floor(Math.random() * glyphs.length)];
                this.size = Math.random() * 16 + 8;
                this.speed = Math.random() * 1.5 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.color = this.isNote ? '34, 211, 238' : '251, 191, 36';
            }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 50) * 0.5; if (this.y < -50) this.reset(); }
            draw() {
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                if (this.isNote) { ctx.font = `${this.size}px Cinzel`; ctx.fillText(this.text, this.x, this.y); } 
                else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 4, 0, Math.PI * 2); ctx.fill(); }
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());
        function animate() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            particles.forEach(p => { p.update(); p.draw(); }); 
            requestAnimationFrame(animate); 
        }
    </script>
</body>
</html>
