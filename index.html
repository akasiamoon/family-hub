<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@200;300;400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        .sidebar {
            position: relative;
            width: 100%; max-width: 480px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.7) 80%, rgba(0,0,0,0) 100%);
            border-right: 2px solid var(--sigil-color, rgba(34, 211, 238, 0.3));
            box-shadow: 10px 0 50px var(--sigil-shadow, rgba(0,0,0,0.5));
            transition: all 0.8s ease;
        }

        .hub-title { font-family: 'Cinzel', serif; letter-spacing: 0.2em; background: linear-gradient(135deg, #fde68a 0%, #d97706 50%, #22d3ee 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; text-transform: uppercase; }

        .heart-counter { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: #f472b6; margin-top: 5px; text-shadow: 0 0 10px rgba(244, 114, 182, 0.4); font-weight: 900; }

        .expensive-header {
            font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.3em; font-weight: 900; text-transform: uppercase;
            color: #fde68a; padding: 1.1rem 1.25rem; background: linear-gradient(to right, rgba(253, 230, 138, 0.15), transparent);
            border-bottom: 1px solid rgba(253, 230, 138, 0.4); text-shadow: 0 0 12px rgba(253, 230, 138, 0.6);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* DAILY FOCUS BANNER */
        .focus-banner {
            background: linear-gradient(45deg, rgba(253, 230, 138, 0.1), rgba(34, 211, 238, 0.05));
            border: 1px solid rgba(253, 230, 138, 0.3);
            border-radius: 1rem; padding: 1.5rem; margin-top: 1rem;
            text-align: center; box-shadow: 0 0 20px rgba(253, 230, 138, 0.05);
        }

        .glass-module {
            background: rgba(8, 8, 12, 0.92); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem; margin-bottom: 2.5rem; overflow: hidden;
        }

        .avatar-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; padding: 12px; }
        .avatar-option { height: 40px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 20px; background: rgba(0,0,0,0.5); filter: grayscale(100%); opacity: 0.4; }
        .avatar-option.active { border-color: var(--sigil-color, #22d3ee); filter: grayscale(0%); opacity: 1; box-shadow: 0 0 15px var(--sigil-color, #22d3ee); transform: scale(1.1); }
        .name-input { background: rgba(0,0,0,0.8) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; text-align: center; font-weight: 900; color: #fde68a !important; letter-spacing: 2px; text-transform: uppercase; font-size: 11px !important; }

        .calendar-container { min-height: 280px; padding: 1.5rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-date { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; border-radius: 6px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: 0.2s ease; cursor: pointer; position: relative; }
        .cal-date.has-quest { border-color: var(--sigil-color, #22d3ee) !important; box-shadow: inset 0 0 8px var(--sigil-color, #22d3ee); }
        .cal-today { color: #fde68a; border: 1px solid #fde68a !important; font-weight: 900; }
        .heart-indicator { font-size: 8px; position: absolute; bottom: 2px; filter: drop-shadow(0 0 3px #f472b6); }

        .archive-btn { font-size: 8px; color: #f472b6; border: 1px solid rgba(244, 114, 182, 0.3); padding: 2px 10px; border-radius: 20px; transition: 0.3s; cursor: pointer; letter-spacing: 1px; font-weight: 900; }
        .archive-btn.active { background: rgba(244, 114, 182, 0.2); border-color: #f472b6; }

        .pinned-tag { font-size: 8px; background: rgba(244, 114, 182, 0.15); color: #f472b6; padding: 4px 12px; border-radius: 20px; letter-spacing: 2px; font-weight: 900; border: 1px solid rgba(244, 114, 182, 0.3); }
        .heart-pin { cursor: pointer; transition: 0.3s; opacity: 0.2; filter: grayscale(100%); font-size: 18px; }
        .heart-active { opacity: 1 !important; filter: grayscale(0%) drop-shadow(0 0 10px #f472b6) !important; }

        #questModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); align-items: center; justify-content: center; }
        .modal-glass { background: rgba(10, 10, 15, 0.98); border: 1px solid #fde68a; padding: 2.5rem; border-radius: 0.5rem; width: 90%; max-width: 420px; }

        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: linear-gradient(#fde68a, #22d3ee); }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="questModal">
        <div class="modal-glass text-center">
            <h2 id="modalDateTitle" class="hub-title text-lg mb-6"></h2>
            <div id="modalEventList" class="space-y-4 mb-8 text-left max-h-48 overflow-y-auto pr-2"></div>
            <input id="modalInput" type="text" placeholder="Assign Appointment..." class="mb-4">
            <div class="flex gap-4">
                <button onclick="closeQuestModal()" class="w-full py-2 border border-white/20 text-[10px] uppercase font-bold tracking-widest">Return</button>
                <button id="addQuestBtn" class="w-full py-2 bg-yellow-600/20 border border-yellow-500 text-yellow-500 text-[10px] uppercase font-bold tracking-widest">Assign</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <header class="mb-12 text-center">
            <h1 class="text-3xl hub-title">Tucker Cooper Burns</h1>
            <p class="text-cyan-400/40 text-[9px] tracking-[0.8em] uppercase mt-1 font-black">Family Hub</p>
            <div id="heartCount" class="heart-counter">❤️ 0 SHARED HEARTS</div>
            
            <div class="mt-10">
                <div class="avatar-bar">
                    <div class="avatar-option active" data-color="#22d3ee" onclick="selectAvatar(this, '🔱')">🔱</div>
                    <div class="avatar-option" data-color="#f472b6" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                    <div class="avatar-option" data-color="#cbd5e1" onclick="selectAvatar(this, '🐚')">🐚</div>
                    <div class="avatar-option" data-color="#ef4444" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                    <div class="avatar-option" data-color="#f97316" onclick="selectAvatar(this, '🔥')">🔥</div>
                    <div class="avatar-option" data-color="#4ade80" onclick="selectAvatar(this, '🐢')">🐢</div>
                    <div class="avatar-option" data-color="#94a3b8" onclick="selectAvatar(this, '🐺')">🐺</div>
                    <div class="avatar-option" data-color="#fbbf24" onclick="selectAvatar(this, '🦉')">🦉</div>
                    <div class="avatar-option" data-color="#38bdf8" onclick="selectAvatar(this, '⚓')">⚓</div>
                    <div class="avatar-option" data-color="#a78bfa" onclick="selectAvatar(this, '📖')">📖</div>
                    <div class="avatar-option" data-color="#84cc16" onclick="selectAvatar(this, '🥥')">🥥</div>
                    <div class="avatar-option" data-color="#059669" onclick="selectAvatar(this, '🌴')">🌴</div>
                    <div class="avatar-option" data-color="#60a5fa" onclick="selectAvatar(this, '🐬')">🐬</div>
                    <div class="avatar-option" data-color="#f87171" onclick="selectAvatar(this, '🦀')">🦀</div>
                    <div class="avatar-option" data-color="#e879f9" onclick="selectAvatar(this, '🎸')">🎸</div>
                    <div class="avatar-option" data-color="#8b5cf6" onclick="selectAvatar(this, '🏹')">🏹</div>
                    <div class="avatar-option" data-color="#d1d5db" onclick="selectAvatar(this, '⚔️')">⚔️</div>
                    <div class="avatar-option" data-color="#f43f5e" onclick="selectAvatar(this, '🍄')">🍄</div>
                    <div class="avatar-option" data-color="#fde68a" onclick="selectAvatar(this, '💎')">💎</div>
                    <div class="avatar-option" data-color="#fb923c" onclick="selectAvatar(this, '🍺')">🍺</div>
                </div>
                <input id="userName" type="text" placeholder="IDENTIFY" class="name-input" oninput="localStorage.setItem('sands_name', this.value)">
            </div>
        </header>

        <div class="glass-module">
            <div class="expensive-header"><span>Grocery List</span></div>
            <div class="p-6">
                <div id="marketList" class="space-y-3 mb-6"></div>
                <input id="mInput" type="text" placeholder="Add provision..." onkeydown="if(event.key==='Enter') saveMarket()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header">
                <span>Love Notes</span>
                <span id="archiveToggle" class="archive-btn" onclick="toggleArchive()">Archive of Hearts</span>
            </div>
            <div class="p-6">
                <div id="notesLog" class="space-y-6 mb-6"></div>
                <input id="nInput" type="text" placeholder="Speak your heart..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header">
                <span onclick="changeMonth(-1)" class="cursor-pointer">◀</span>
                <span id="calMonth"></span>
                <span onclick="changeMonth(1)" class="cursor-pointer">▶</span>
            </div>
            <div class="calendar-container">
                <div id="calendarDates" class="calendar-grid"></div>
            </div>
        </div>

        <div class="focus-banner">
            <small class="text-[9px] text-yellow-200 uppercase tracking-[4px] font-black block mb-2 opacity-60">Upcoming Quest</small>
            <div id="nextQuestDisplay" class="text-white font-light italic text-[14px]">Consulting the stars...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', displayedDate = new Date(), favoritesOnly = false;

        function selectAvatar(el, icon) { 
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active'); currentSigil = icon;
            const color = el.getAttribute('data-color');
            document.documentElement.style.setProperty('--sigil-color', color);
            document.documentElement.style.setProperty('--sigil-shadow', color + '66');
        }

        function toggleArchive() { favoritesOnly = !favoritesOnly; document.getElementById('archiveToggle').classList.toggle('active'); loadNotes(); }

        window.onload = () => { 
            const saved = localStorage.getItem('sands_name');
            if(saved) document.getElementById('userName').value = saved;
            refreshAll(); buildCalendar(); animate(); 
        };

        async function buildCalendar() {
            const y = displayedDate.getFullYear(), m = displayedDate.getMonth(), today = new Date();
            document.getElementById('calMonth').innerText = displayedDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            const grid = document.getElementById('calendarDates'); grid.innerHTML = '';
            
            const { data: appts } = await _supabase.from('calendar_events').select('*');
            const { data: pinned } = await _supabase.from('family_notes').select('*').eq('is_pinned', true);

            // Update Next Quest Banner
            const upcoming = appts?.filter(a => new Date(a.start_date) >= today).sort((a,b) => new Date(a.start_date) - new Date(b.start_date))[0];
            document.getElementById('nextQuestDisplay').innerText = upcoming ? `${upcoming.title} • ${new Date(upcoming.start_date).toLocaleDateString()}` : "No quests currently assigned.";

            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasA = appts?.some(e => e.start_date === ds);
                const hasH = pinned?.some(n => n.post_date === ds);
                let ist = (d === today.getDate() && m === today.getMonth() && y === today.getFullYear()) ? 'cal-today' : '';
                grid.innerHTML += `<div class="cal-date ${ist} ${hasA ? 'has-quest' : ''}" onclick="openQuestModal('${ds}', ${d})">${d}${hasH ? '<span class="heart-indicator">❤️</span>' : ''}</div>`;
            }
        }

        async function openQuestModal(ds, d) {
            document.getElementById('modalDateTitle').innerText = `${d} ${displayedDate.toLocaleString('default', { month: 'long' })}`;
            document.getElementById('questModal').style.display = 'flex';
            const { data: evs } = await _supabase.from('calendar_events').select('*').eq('start_date', ds);
            document.getElementById('modalEventList').innerHTML = evs?.length ? evs.map(e => `<div class="bg-white/5 p-3 rounded flex justify-between"><span>${e.title}</span><span class="text-red-900 cursor-pointer" onclick="deleteItem('calendar_events', '${e.id}'); openQuestModal('${ds}', ${d}); buildCalendar();">×</span></div>`).join('') : '<p class="text-[10px] opacity-30 text-center">Empty.</p>';
            document.getElementById('addQuestBtn').onclick = async () => {
                const v = document.getElementById('modalInput').value; if(!v) return;
                await _supabase.from('calendar_events').insert([{ title: v, start_date: ds }]);
                document.getElementById('modalInput').value = ""; openQuestModal(ds, d); buildCalendar();
            };
        }
        function closeQuestModal() { document.getElementById('questModal').style.display = 'none'; }
        function changeMonth(offset) { displayedDate.setMonth(displayedDate.getMonth() + offset); buildCalendar(); }

        function getUser() { return `${currentSigil} ${document.getElementById('userName').value || 'Someone'}`; }
        async function refreshAll() { loadNotes(); loadMarket(); }
        async function saveMarket() { const i = document.getElementById('mInput'); if(i.value) await _supabase.from('market_items').insert([{ text: `${getUser()} • ${i.value}` }]); i.value = ""; refreshAll(); }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between items-center text-[13px] font-light border-b border-white/5 pb-2"><span>${item.text}</span><span class="cursor-pointer text-red-900 opacity-50 hover:opacity-100" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }
        async function saveNote() { 
            const i = document.getElementById('nInput'); if(i.value) {
                const now = new Date();
                const dk = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
                await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${getUser()} • ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`, is_pinned: false, post_date: dk }]); 
                triggerSparkles();
            }
            i.value = ""; refreshAll(); buildCalendar();
        }
        async function loadNotes() {
            let { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            if(!data) return;
            document.getElementById('heartCount').innerText = `❤️ ${data.length} SHARED HEARTS`;
            if(favoritesOnly) data = data.filter(n => n.is_pinned);
            const rN = (n) => `<div class="group"><div class="flex justify-between items-center mb-1"><small class="text-cyan-400 font-black text-[9px] uppercase tracking-widest">${n.timestamp}</small><div class="flex gap-4"><span class="heart-pin ${n.is_pinned ? 'heart-active' : ''}" onclick="togglePin('${n.id}', ${n.is_pinned})">❤️</span><span class="text-red-900 opacity-0 group-hover:opacity-100 cursor-pointer" onclick="deleteItem('family_notes', '${n.id}')">×</span></div></div>${n.is_pinned ? '<span class="pinned-tag mb-2 inline-block">❤️ PINNED ❤️</span>' : ''}<p class="text-[15px] font-light italic text-white/90">"${n.note}"</p></div>`;
            document.getElementById('notesLog').innerHTML = data.map(rN).join('');
        }
        async function togglePin(id, s) { await _supabase.from('family_notes').update({ is_pinned: !s }).eq('id', id); refreshAll(); buildCalendar(); }
        async function deleteItem(t, id) { await _supabase.from(t).delete().eq('id', id); refreshAll(); buildCalendar(); }
        async function triggerPurge(e) { e.stopPropagation(); if(confirm("Purge list?")) { await _supabase.from('market_items').delete().neq('id', 0); refreshAll(); } }

        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; this.isNote = Math.random() > 0.4; this.size = Math.random() * 30 + 15; this.speed = Math.random() * 1.5 + 0.5; this.opacity = Math.random() * 0.4 + 0.1; this.color = this.isNote ? '34, 211, 238' : '251, 191, 36'; }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 60) * 1; if (this.y < -50) this.reset(); }
            draw() { ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`; if (this.isNote) { ctx.font = `${this.size}px Cinzel`; ctx.fillText('♪', this.x, this.y); } else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 4, 0, Math.PI * 2); ctx.fill(); } }
        }
        class SpecialParticle {
            constructor(isHeart) { this.x = Math.random() * 400; this.y = canvas.height * 0.6; this.isHeart = isHeart; this.size = Math.random() * 20 + 10; this.speedX = (Math.random() - 0.5) * 4; this.speedY = -Math.random() * 5 - 2; this.opacity = 1; this.life = 100; }
            update() { this.x += this.speedX; this.y += this.speedY; this.opacity -= 0.01; this.life--; }
            draw() { if(this.opacity <= 0) return; ctx.fillStyle = this.isHeart ? `rgba(244, 114, 182, ${this.opacity})` : `rgba(253, 230, 138, ${this.opacity})`; ctx.font = `${this.size}px serif`; ctx.fillText(this.isHeart ? '❤️' : '✨', this.x, this.y); }
        }
        function triggerSparkles() { for (let i = 0; i < 20; i++) { particles.push(new SpecialParticle(true)); particles.push(new SpecialParticle(false)); } }
        for (let i = 0; i < 35; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles = particles.filter(p => p.life === undefined || p.life > 0); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
