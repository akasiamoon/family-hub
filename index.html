<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@200;300;400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        .sidebar {
            position: relative;
            width: 100%; max-width: 480px; height: 100vh;
            padding: 3rem 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.7) 80%, rgba(0,0,0,0) 100%);
            border-right: 1px solid rgba(34, 211, 238, 0.2);
        }

        /* EXPENSIVE TYPOGRAPHY & HEADERS */
        .hub-title { 
            font-family: 'Cinzel', serif; letter-spacing: 0.3em; 
            background: linear-gradient(135deg, #fde68a 0%, #d97706 50%, #fde68a 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-weight: 900; text-transform: uppercase;
            filter: drop-shadow(0 0 10px rgba(253, 230, 138, 0.2));
        }

        .section-header {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 0.4em;
            font-weight: 700;
            text-transform: uppercase;
            color: #fde68a;
            border-bottom: 1px solid rgba(253, 230, 138, 0.2);
            padding-bottom: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* PREMIUM GLASS MODULES */
        .glass-module {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(40px) saturate(140%);
            border: 1px solid rgba(34, 211, 238, 0.15);
            border-radius: 1rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }

        .name-input-premium {
            background: transparent !important;
            border: none !important;
            border-bottom: 1px solid rgba(34, 211, 238, 0.3) !important;
            border-radius: 0 !important;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 4px;
            color: #22d3ee !important;
            font-size: 12px !important;
            margin-top: 10px;
            transition: 0.5s ease;
        }
        .name-input-premium:focus { border-bottom: 1px solid #fde68a !important; color: #fde68a !important; outline: none; }

        input { background: rgba(0,0,0,0.85) !important; border: 1px solid rgba(34, 211, 238, 0.2) !important; color: #fff !important; padding: 14px !important; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: 200; font-size: 14px; }
        
        /* CALENDAR */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-date { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 300; border-radius: 4px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: 0.3s;
        }
        .cal-date:hover { background: rgba(34, 211, 238, 0.2); border-color: #22d3ee; }
        .cal-today { color: #fde68a; border: 1px solid #fde68a !important; font-weight: 900; }
        .has-quest { box-shadow: inset 0 -3px 0 #22d3ee; background: rgba(34, 211, 238, 0.1) !important; }

        /* MODAL */
        #questModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); align-items: center; justify-content: center; }
        .modal-glass { background: rgba(10, 10, 15, 0.98); border: 1px solid #fde68a; padding: 3rem; border-radius: 0.5rem; width: 90%; max-width: 420px; }

        .sidebar::-webkit-scrollbar { width: 2px; }
        .sidebar::-webkit-scrollbar-thumb { background: #fde68a; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="questModal">
        <div class="modal-glass text-center">
            <h2 id="modalDateTitle" class="hub-title text-lg mb-6"></h2>
            <div id="modalEventList" class="space-y-4 mb-8 text-left max-h-48 overflow-y-auto pr-2"></div>
            <input id="modalInput" type="text" placeholder="Assign New Appointment..." class="mb-4">
            <div class="flex gap-4">
                <button onclick="closeQuestModal()" class="w-full py-2 border border-white/20 text-[10px] uppercase font-bold tracking-widest">Return</button>
                <button id="addQuestBtn" class="w-full py-2 bg-yellow-600/20 border border-yellow-500 text-yellow-500 text-[10px] uppercase font-bold tracking-widest hover:bg-yellow-500 hover:text-black transition-all">Assign</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <header class="mb-16 text-center">
            <h1 class="text-4xl hub-title">Siren's Sands</h1>
            <p class="text-cyan-400/40 text-[9px] tracking-[0.8em] uppercase mt-4 font-black">Farmington • Mississippi</p>
            <input id="userName" type="text" placeholder="IDENTIFY" class="name-input-premium" oninput="localStorage.setItem('sands_name', this.value)">
        </header>

        <div class="glass-module p-6">
            <div class="section-header">
                <span>Grocery List</span>
                <span onclick="triggerPurge(event)" class="text-[8px] opacity-30 hover:opacity-100 cursor-pointer">Clear</span>
            </div>
            <div id="marketList" class="space-y-3 mb-6"></div>
            <input id="mInput" type="text" placeholder="Add provision..." onkeydown="if(event.key==='Enter') saveMarket()">
        </div>

        <div class="glass-module p-6">
            <div class="section-header">Love Notes</div>
            <div id="notesLog" class="space-y-6 mb-6"></div>
            <input id="nInput" type="text" placeholder="Speak your heart..." onkeydown="if(event.key==='Enter') saveNote()">
        </div>

        <div class="glass-module p-6">
            <div class="section-header">
                <span>Appointments</span>
                <span id="calMonth" class="text-[9px] opacity-50"></span>
            </div>
            <div class="calendar-grid mb-4">
                <div class="cal-day-label">S</div><div class="cal-day-label">M</div><div class="cal-day-label">T</div><div class="cal-day-label">W</div><div class="cal-day-label">T</div><div class="cal-day-label">F</div><div class="cal-day-label">S</div>
            </div>
            <div id="calendarDates" class="calendar-grid"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeDay = null;

        window.onload = () => { 
            const saved = localStorage.getItem('sands_name');
            if(saved) document.getElementById('userName').value = saved;
            refreshAll(); buildCalendar(); animate(); 
        };

        // --- CALENDAR ---
        async function buildCalendar() {
            const now = new Date();
            document.getElementById('calMonth').innerText = now.toLocaleString('default', { month: 'long' });
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const grid = document.getElementById('calendarDates'); grid.innerHTML = '';
            const { data: events } = await _supabase.from('calendar_events').select('*');
            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasEvent = events?.some(e => e.start_date === dateStr);
                let today = (d === now.getDate()) ? 'cal-today' : '';
                let quest = hasEvent ? 'has-quest' : '';
                grid.innerHTML += `<div class="cal-date ${today} ${quest}" onclick="openQuestModal('${dateStr}', ${d})">${d}</div>`;
            }
        }

        async function openQuestModal(dateStr, d) {
            activeDay = dateStr;
            const modal = document.getElementById('questModal');
            document.getElementById('modalDateTitle').innerText = `${d} ${document.getElementById('calMonth').innerText}`;
            modal.style.display = 'flex';
            const { data: dayEvents } = await _supabase.from('calendar_events').select('*').eq('start_date', dateStr);
            const list = document.getElementById('modalEventList');
            list.innerHTML = dayEvents?.length ? dayEvents.map(e => `<div class="bg-white/5 p-3 rounded text-[11px] flex justify-between"><span>${e.title}</span><span class="text-red-500 cursor-pointer" onclick="deleteEvent('${e.id}')">×</span></div>`).join('') : '<p class="text-[10px] opacity-30 text-center italic">No assignments.</p>';
            document.getElementById('addQuestBtn').onclick = async () => {
                const val = document.getElementById('modalInput').value; if(!val) return;
                await _supabase.from('calendar_events').insert([{ title: val, start_date: dateStr }]);
                document.getElementById('modalInput').value = ""; openQuestModal(dateStr, d); buildCalendar();
            };
        }
        function closeQuestModal() { document.getElementById('questModal').style.display = 'none'; }
        async function deleteEvent(id) { await _supabase.from('calendar_events').delete().eq('id', id); openQuestModal(activeDay, parseInt(activeDay.split('-')[2])); buildCalendar(); }

        // --- DATA ---
        function getUser() { return document.getElementById('userName').value.trim().toUpperCase() || 'UNIDENTIFIED'; }
        async function refreshAll() { loadNotes(); loadMarket(); }
        async function saveMarket() { const i = document.getElementById('mInput'); if(i.value) await _supabase.from('market_items').insert([{ text: `${getUser()} • ${i.value}` }]); i.value = ""; refreshAll(); }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between items-center text-[13px] font-light border-b border-white/5 pb-2"><span>${item.text}</span><span class="cursor-pointer text-red-900 opacity-50 hover:opacity-100" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }
        async function saveNote() { const i = document.getElementById('nInput'); if(i.value) await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${getUser()} • ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}` }]); i.value = ""; refreshAll(); }
        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `<div class="group"><small class="text-cyan-400 font-black text-[9px] block mb-1 uppercase tracking-widest">${n.timestamp}</small><div class="flex justify-between items-start"><p class="text-[15px] font-light italic text-white/90">"${n.note}"</p><span class="text-red-900 opacity-0 group-hover:opacity-100 cursor-pointer ml-4" onclick="deleteItem('family_notes', '${n.id}')">×</span></div></div>`).join('') : '';
        }
        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); }
        async function triggerPurge(e) { e.stopPropagation(); if(confirm("Purge shopping list?")) { await _supabase.from('market_items').delete().neq('id', 0); refreshAll(); } }

        // --- PARTICLES ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; this.isNote = Math.random() > 0.4; this.size = Math.random() * 30 + 15; this.speed = Math.random() * 1.5 + 0.5; this.opacity = Math.random() * 0.4 + 0.1; this.color = this.isNote ? '34, 211, 238' : '251, 191, 36'; }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 60) * 1; if (this.y < -50) this.reset(); }
            draw() { ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`; if (this.isNote) { ctx.font = `${this.size}px Cinzel`; ctx.fillText('♪', this.x, this.y); } else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 4, 0, Math.PI * 2); ctx.fill(); } }
        }
        for (let i = 0; i < 35; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    </script>
</body>
</html>
