<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tucker Cooper Burns • Family Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@200;400;700;900&display=swap');

        :root { --sigil: #22d3ee; --gold: #fbbf24; }
        [data-theme="purple"] { --sigil: #a855f7; }
        [data-theme="red"] { --sigil: #ef4444; }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; color: #e2e8f0; font-family: 'Cinzel', serif;
            overflow-x: hidden; 
        }

        #particle-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .hub-container { 
            display: flex; flex-direction: column; min-height: 100vh; 
            position: relative; z-index: 10; background: transparent;
        }

        .hero-image {
            width: 100%; height: 35vh;
            background: url('thefamilyhub.jpg') no-repeat center center;
            background-size: cover; border-bottom: 3px solid var(--sigil);
        }

        .sidebar {
            width: 100%; padding: 2.5rem 1.5rem; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%);
            flex-grow: 1;
        }

        @media (min-width: 1024px) {
            .hub-container { flex-direction: row; height: 100vh; overflow: hidden; }
            .hero-image { width: 60%; height: 100vh; border-bottom: none; border-right: 3px solid var(--sigil); }
            .sidebar { max-width: 500px; height: 100vh; overflow-y: auto; scrollbar-width: none; }
        }

        .oracle-row {
            display: flex; justify-content: space-around; align-items: center; 
            font-size: 11px; font-weight: 900; letter-spacing: 2px;
            color: var(--sigil); margin: 20px 0;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.4);
        }

        .expensive-header {
            font-size: 13px; letter-spacing: 0.35em; font-weight: 900; text-transform: uppercase;
            padding: 1.1rem 1.25rem; background: linear-gradient(to right, var(--gold), var(--sigil));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            border-bottom: 2px solid transparent; border-image: linear-gradient(to right, var(--gold), var(--sigil)) 1;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }

        .glass-module {
            background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem;
            margin-bottom: 2rem; overflow: hidden;
        }

        .avatar-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; }
        .avatar-option { height: 45px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(0,0,0,0.6); }
        .avatar-option.active { border-color: var(--sigil); box-shadow: 0 0 15px var(--sigil); transform: scale(1.1); }

        input { background: rgba(0,0,0,1) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: #fff !important; padding: 15px !important; border-radius: 10px; font-family: 'Inter', sans-serif; width: 100%; }
        
        /* CALENDAR */
        .cal-date { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; }
        .cal-today { border: 2px solid var(--gold) !important; color: var(--gold); }
        .has-quest { border-color: var(--sigil) !important; box-shadow: inset 0 0 10px var(--sigil); }

        .quest-banner { background: linear-gradient(to right, rgba(251,191,36,0.15), transparent); border-left: 4px solid var(--gold); padding: 12px; margin: 15px; border-radius: 0 8px 8px 0; font-size: 12px; font-weight: 700; }

        .collapsible-content { transition: max-height 0.4s ease-out; max-height: 1000px; }
        .collapsed { max-height: 0 !important; overflow: hidden; }

        #questModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); align-items: center; justify-content: center; }
        .modal-glass { background: #08080c; border: 2px solid var(--gold); padding: 2.5rem; border-radius: 1rem; width: 90%; max-width: 420px; text-align: center; }
    </style>
</head>
<body id="mainBody">

    <div id="questModal">
        <div class="modal-glass">
            <h2 id="modalDateTitle" class="text-xl font-black mb-6 text-white tracking-widest uppercase"></h2>
            <div id="modalEventList" class="space-y-3 mb-6 text-left max-h-40 overflow-y-auto"></div>
            <input id="modalInput" type="text" placeholder="Assign Appointment...">
            <div class="flex gap-4 mt-6">
                <button onclick="closeQuestModal()" class="w-full py-3 border border-white/10 uppercase text-[10px] font-black text-white">Return</button>
                <button id="addQuestBtn" class="w-full py-3 bg-white/5 border border-white/20 uppercase text-[10px] font-black text-white">Assign</button>
            </div>
        </div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div class="hub-container">
        <div class="hero-image"></div>
        <div class="sidebar">
            <header class="text-center mb-6">
                <h1 class="text-3xl font-black tracking-[0.1em]" style="background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TUCKER COOPER BURNS</h1>
                <div class="oracle-row">
                    <span id="clock">00:00:00</span>
                    <div class="flex items-center gap-2"><span>🌤️</span> <span id="temp">57°F</span></div>
                    <span>FARMINGTON</span>
                </div>
                
                <div class="avatar-bar bg-white/5 rounded-2xl border border-white/5 mb-4">
                    <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                </div>
                <input id="userName" type="text" placeholder="WHO IS COMMANDING?" class="text-center font-black">
                
                <div class="flex justify-center gap-4 mt-6">
                    <div class="w-6 h-6 rounded-full bg-cyan-400 border border-white cursor-pointer" onclick="setTheme('')"></div>
                    <div class="w-6 h-6 rounded-full bg-purple-600 border border-white cursor-pointer" onclick="setTheme('purple')"></div>
                    <div class="w-6 h-6 rounded-full bg-red-600 border border-white cursor-pointer" onclick="setTheme('red')"></div>
                </div>
            </header>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('calContent')">
                    <span onclick="event.stopPropagation(); changeMonth(-1)">◀</span>
                    <span id="calMonth">FEBRUARY 2026</span>
                    <span onclick="event.stopPropagation(); changeMonth(1)">▶</span>
                </div>
                <div id="calContent" class="collapsible-content">
                    <div id="activeQuestBanner" class="quest-banner">Select a date to view assignments.</div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 p-4"></div>
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('marketContent')"><span>The Provisions</span><span>↕</span></div>
                <div id="marketContent" class="collapsible-content p-6">
                    <div id="marketList" class="space-y-4 mb-4 text-sm font-bold text-white"></div>
                    <input id="mInput" type="text" placeholder="Add provision..." onkeydown="if(event.key==='Enter') saveItem('market_items', 'mInput')">
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('noteContent')
