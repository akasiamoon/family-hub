<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tucker • Family Apotheosis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;600;800&display=swap');
        :root { --sigil: #22d3ee; --gold: #fbbf24; --deep-glass: rgba(5, 5, 8, 0.98); }
        [data-theme="purple"] { --sigil: #a855f7; } [data-theme="red"] { --sigil: #ef4444; } [data-theme="green"] { --sigil: #10b981; }
        [data-theme="gold"] { --sigil: #fbbf24; } [data-theme="pink"] { --sigil: #f472b6; } [data-theme="orange"] { --sigil: #f97316; }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        body.large-mode .note-text, body.large-mode .list-item { font-size: 26px !important; }
        
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
        .hub-container { display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 10; }
        
        .hero-image { width: 100%; height: 40vh; background: #111 url('thefamilyhub.jpg') center center no-repeat; background-size: cover; border-bottom: 3px solid var(--sigil); }
        .sidebar { width: 100%; padding: 2rem; background: linear-gradient(to bottom, rgba(0,0,0,0), #000 20%); flex-grow: 1; }
        
        @media (min-width: 1024px) { 
            .hub-container { flex-direction: row; height: 100vh; } 
            .hero-image { width: 62%; height: 100vh; border-right: 3px solid var(--sigil); } 
            .sidebar { max-width: 550px; height: 100vh; overflow-y: auto; scrollbar-width: none; } 
        }

        .oracle-row { display: flex; justify-content: space-around; align-items: center; padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 2rem; color: var(--gold); font-weight: 800; font-size: 13px; letter-spacing: 2px; }
        .glass-module { background: var(--deep-glass); backdrop-filter: blur(80px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; margin-bottom: 2rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .expensive-header { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 0.3em; font-weight: 900; text-transform: uppercase; padding: 1.5rem; background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }

        .sticky-note { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--gold); padding: 1rem; border-radius: 1rem; margin-bottom: 2rem; font-weight: 800; color: var(--gold); text-align: center; animation: pulse 3s infinite; }
        .quest-banner { background: linear-gradient(to right, rgba(34, 211, 238, 0.15), transparent); border-left: 5px solid var(--sigil); padding: 1.5rem; margin: 1rem; border-radius: 0 1rem 1rem 0; font-size: 15px; font-weight: 800; }
        
        .list-item { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .note-card { border-left: 5px solid var(--sigil); padding: 1.5rem; background: rgba(255,255,255,0.02); margin-bottom: 2rem; border-radius: 0 1rem 1rem 0; }
        .note-img { width: 100%; border-radius: 1rem; margin-top: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        
        .action-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 12px; font-size: 11px; font-weight: 900; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
        .music-pill { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); border: 1px solid var(--sigil); padding: 10px 20px; border-radius: 50px; z-index: 100; display: flex; align-items: center; gap: 15px; font-size: 10px; font-weight: 900; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

    <div class="music-pill">
        <span>📻 TUCKER RADIO</span>
        <button onclick="toggleMusic()" id="playBtn">▶ PLAY</button>
        <audio id="bgAudio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div class="hub-container">
        <div class="hero-image"></div>
        <div class="sidebar">
            <header class="text-center mb-10">
                <h1 class="text-6xl font-black tracking-[0.2em]" style="background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Cinzel';">TUCKER</h1>
                
                <div class="oracle-row">
                    <span id="clock">00:00</span>
                    <span id="weather">FARMINGTON: 52°F</span>
                    <button id="sizeToggle" class="px-2 border border-white/20 rounded">AA</button>
                </div>

                <div id="sticky" class="sticky-note">MESSAGE: No current dispatches.</div>
            </header>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('calContent')"><span>The Oracle</span><span>↕</span></div>
                <div id="calContent">
                    <div id="dailyQuest" class="quest-banner text-cyan-400">GRAND QUEST: Loading...</div>
                    <div id="countdown" class="p-4 text-center text-[10px] font-black tracking-widest text-amber-500 uppercase border-b border-white/5">VACATION IN: 112d 14h 05m</div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 p-6 text-white text-xs"></div>
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('mealContent')"><span>Meal Plan</span><span>↕</span></div>
                <div id="mealContent" class="p-6">
                    <div id="mealList" class="mb-4"></div>
                    <input id="mealInput" type="text" placeholder="Add dinner..." onkeydown="if(event.key==='Enter') saveItem('meal_plan', 'mealInput')">
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('noteContent')"><span>The Chronicler</span><span>↕</span></div>
                <div id="noteContent" class="p-6">
                    <div id="notesLog" class="space-y-6 mb-6"></div>
                    <input id="nInput" type="text" placeholder="Capture a moment..." onkeydown="if(event.key==='Enter') saveNote()">
                    <div class="flex gap-2 mt-4">
                        <button class="action-btn" id="photoBtn" onclick="document.getElementById('imgUpload').click()">📷 PHOTO</button>
                        <input type="file" id="imgUpload" class="hidden" accept="image/*" onchange="uploadAndSave(this)">
                    </div>
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('marketContent')"><span>Provisions</span><span>↕</span></div>
                <div id="marketContent" class="p-6">
                    <div id="marketList" class="mb-4"></div>
                    <input id="mInput" type="text" placeholder="Add grocery..." onkeydown="if(event.key==='Enter') saveItem('market_items', 'mInput')">
                    <button onclick="purgeTable('market_items')" class="w-full mt-4 border border-red-500/30 py-3 rounded-xl text-[10px] font-black text-red-500 uppercase bg-red-500/5">Purge List</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', dispDate = new Date();

        const quests = ["Compliment a family member.", "Drink 64oz of water.", "Tidy one room for 10 minutes.", "Take a 15-minute walk.", "Read a chapter of a book."];

        window.onload = () => { 
            const savedName = localStorage.getItem('hubCommanderName');
            if (savedName) document.getElementById('userName').value = savedName;
            
            refreshAll(); buildCalendar(); animate(); 
            document.getElementById('dailyQuest').innerText = "GRAND QUEST: " + quests[new Date().getDate() % quests.length];
            
            setInterval(() => { 
                document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); 
            }, 1000); 
        };

        function toggleMusic() {
            const a = document.getElementById('bgAudio');
            const b = document.getElementById('playBtn');
            if (a.paused) { a.play(); b.innerText = "⏸ PAUSE"; }
            else { a.pause(); b.innerText = "▶ PLAY"; }
        }

        async function refreshAll() { loadList('market_items', 'marketList'); loadList('meal_plan', 'mealList'); loadNotes(); }
        
        async function saveItem(table, inputId) {
            const i = document.getElementById(inputId); if(!i.value) return;
            await _supabase.from(table).insert([{ text: `${currentSigil} ${i.value}` }]);
            i.value = ""; refreshAll();
        }

        async function uploadAndSave(input) {
            const file = input.files[0]; if (!file) return;
            const btn = document.getElementById('photoBtn'); btn.innerText = "⏳...";
            const path = `note-images/${Date.now()}-${file.name}`;
            await _supabase.storage.from('note-images').upload(path, file);
            const { data: { publicUrl } } = _supabase.storage.from('note-images').getPublicUrl(path);
            await _supabase.from('family_notes').insert([{ note: document.getElementById('nInput').value || "", image_url: publicUrl, timestamp: `${currentSigil} Amber • ${new Date().toLocaleDateString()}` }]);
            document.getElementById('nInput').value = ""; btn.innerText = "📷 PHOTO"; loadNotes();
        }

        async function loadList(table, divId) {
            const { data } = await _supabase.from(table).select('*').order('created_at', { ascending: true });
            document.getElementById(divId).innerHTML = data?.length ? data.map(item => `
                <div class="list-item">
                    <span>${item.text}</span>
                    <span class="text-red-900 font-black cursor-pointer" onclick="deleteItem('${table}', '${item.id}')">×</span>
                </div>`).join('') : '<div class="opacity-20 italic text-xs">Empty.</div>';
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `
                <div class="note-card">
                    <small class="opacity-30 uppercase font-black text-[9px] mb-2 block">${n.timestamp}</small>
                    ${n.note ? `<p class="font-semibold text-lg leading-relaxed">"${n.note}"</p>` : ''}
                    ${n.image_url ? `<img src="${n.image_url}" class="note-img">` : ''}
                    <span class="text-[9px] text-red-900 cursor-pointer mt-4 inline-block font-black" onclick="deleteItem('family_notes', '${n.id}')">DELETE</span>
                </div>`).join('') : '';
        }

        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); }
        async function purgeTable(table) { if(confirm("Clear list?")) { await _supabase.from(table).delete().neq('id', 0); refreshAll(); } }
        function toggleModule(id) { const e = document.getElementById(id); e.style.display = e.style.display === 'none' ? 'block' : 'none'; }

        async function buildCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            for (let d = 1; d <= 31; d++) {
                grid.innerHTML += `<div class="aspect-square flex items-center justify-center border border-white/5 ${d === new Date().getDate() ? 'border-amber-500 text-amber-500' : ''}">${d}</div>`;
            }
        }

        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.init(); }
            init() { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; this.speed = Math.random() * 1 + 0.5; this.opacity = Math.random() * 0.3; }
            update() { this.y -= this.speed; if (this.y < -50) this.init(); }
            draw() { ctx.fillStyle = '#22d3ee'; ctx.globalAlpha = this.opacity; ctx.fillText('•', this.x, this.y); }
        }
        for (let i = 0; i < 30; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
