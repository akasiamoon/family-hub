<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@200;400;900&display=swap');

        :root {
            --sigil-color: #22d3ee;
            --header-grad: linear-gradient(to right, #fbbf24, #22d3ee);
            --weather-tint: rgba(0,0,0,0);
        }

        body.gothic-mode {
            --sigil-color: #a855f7;
            --header-grad: linear-gradient(to right, #f472b6, #a855f7);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; color: #e2e8f0; font-family: 'Cinzel', serif;
            overflow: hidden; 
        }

        /* BACKGROUND & WEATHER OVERLAYS */
        #bg-image {
            position: fixed; inset: 0; z-index: 0;
            background: url('thefamilyhub.jpg') no-repeat center center fixed;
            background-size: cover;
            transition: filter 3s ease;
        }
        #weather-overlay {
            position: fixed; inset: 0; z-index: 1;
            background: var(--weather-tint);
            pointer-events: none; transition: background 5s ease;
        }
        .shadow-pulse {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            animation: breathe 8s infinite alternate ease-in-out;
        }
        @keyframes breathe { from { opacity: 0.5; } to { opacity: 1; } }

        #particle-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* SIDEBAR & SCROLLBAR */
        .sidebar {
            position: relative; width: 100%; max-width: 460px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.8) 90%, rgba(0,0,0,0) 100%);
            border-right: 2px solid var(--sigil-color);
        }
        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--header-grad); border-radius: 10px; }

        /* VIVID HEADERS */
        .expensive-header {
            font-size: 11px; letter-spacing: 0.4em; font-weight: 900; text-transform: uppercase;
            padding: 1.1rem 1.25rem; margin-bottom: 1rem;
            background: var(--header-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            border-bottom: 2px solid transparent; border-image: var(--header-grad) 1;
            display: flex; justify-content: space-between; align-items: center;
        }

        .glass-module {
            background: rgba(10, 10, 15, 0.9); backdrop-blur: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem;
            margin-bottom: 2rem; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        /* ICONS */
        .avatar-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 12px; }
        .avatar-option { 
            height: 40px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; 
            font-size: 20px; background: rgba(0,0,0,0.6); filter: grayscale(100%); opacity: 0.3;
        }
        .avatar-option.active { border-color: var(--sigil-color); filter: grayscale(0%); opacity: 1; transform: scale(1.1); box-shadow: 0 0 15px var(--sigil-color); }

        input {
            background: rgba(0,0,0,0.85) !important; border: 1px solid rgba(34, 211, 238, 0.2) !important;
            color: #fff !important; padding: 14px !important; border-radius: 8px; width: 100%; font-family: 'Inter', sans-serif;
        }

        .cal-date { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            font-size: 11px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s;
        }
        .cal-today { border: 2px solid #fbbf24 !important; color: #fbbf24; font-weight: 900; box-shadow: 0 0 10px rgba(251,191,36,0.3); }
        .has-quest { border-color: var(--sigil-color) !important; background: rgba(34, 211, 238, 0.1); }
    </style>
</head>
<body id="mainBody">

    <div id="bg-image"></div>
    <div id="weather-overlay"></div>
    <div class="shadow-pulse"></div>
    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-widest hub-title" style="background: var(--header-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TUCKER COOPER BURNS</h1>
            <p class="text-[10px] tracking-[0.6em] opacity-50 uppercase mt-2">Family Hub • Siren's Sands</p>
            
            <div id="weatherDisplay" class="mt-4 text-[10px] text-cyan-400 font-bold tracking-widest uppercase">Fetching Farmington Skies...</div>

            <div class="avatar-bar mt-6 bg-white/5 rounded-xl border border-white/5">
                <div class="avatar-option active" data-color="#22d3ee" onclick="selectAvatar(this, '🔱')">🔱</div>
                <div class="avatar-option" data-color="#f87171" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                <div class="avatar-option" data-color="#fbbf24" onclick="selectAvatar(this, '🐚')">🐚</div>
                <div class="avatar-option" data-color="#ef4444" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                <div class="avatar-option" data-color="#f97316" onclick="selectAvatar(this, '🔥')">🔥</div>
                <div class="avatar-option" data-color="#4ade80" onclick="selectAvatar(this, '🐢')">🐢</div>
                <div class="avatar-option" data-color="#94a3b8" onclick="selectAvatar(this, '🐺')">🐺</div>
                <div class="avatar-option" data-color="#fbbf24" onclick="selectAvatar(this, '🦉')">🦉</div>
                <div class="avatar-option" data-color="#38bdf8" onclick="selectAvatar(this, '⚓')">⚓</div>
                <div class="avatar-option" data-color="#a78bfa" onclick="selectAvatar(this, '📖')">📖</div>
                <div class="avatar-option" data-color="#84cc16" onclick="selectAvatar(this, '🥥')">🥥</div>
                <div class="avatar-option" data-color="#059669" onclick="selectAvatar(this, '🌴')">🌴</div>
                <div class="avatar-option" data-color="#60a5fa" onclick="selectAvatar(this, '🐬')">🐬</div>
                <div class="avatar-option" data-color="#f87171" onclick="selectAvatar(this, '🦀')">🦀</div>
                <div class="avatar-option" data-color="#e879f9" onclick="selectAvatar(this, '🎸')">🎸</div>
                <div class="avatar-option" data-color="#8b5cf6" onclick="selectAvatar(this, '🏹')">🏹</div>
                <div class="avatar-option" data-color="#d1d5db" onclick="selectAvatar(this, '⚔️')">⚔️</div>
                <div class="avatar-option" data-color="#f43f5e" onclick="selectAvatar(this, '🍄')">🍄</div>
                <div class="avatar-option" data-color="#fde68a" onclick="selectAvatar(this, '💎')">💎</div>
                <div class="avatar-option" data-color="#fb923c" onclick="selectAvatar(this, '🍺')">🍺</div>
            </div>
            <input id="userName" type="text" placeholder="NAME" class="mt-4 text-center uppercase tracking-widest font-black text-xs">
            <button onclick="toggleGothic()" class="mt-4 text-[9px] border border-white/20 px-3 py-1 rounded-full opacity-40 hover:opacity-100">Gothic Mode</button>
        </header>

        <div class="glass-module">
            <div class="expensive-header"><span>Grocery List</span></div>
            <div class="p-6">
                <div id="marketList" class="space-y-3 mb-4 font-inter"></div>
                <input id="mInput" type="text" placeholder="Add grocery..." onkeydown="if(event.key==='Enter') saveMarket()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header"><span>Love Notes</span><span class="text-[8px] opacity-40" onclick="toggleArchive()">Archive of Hearts</span></div>
            <div class="p-6">
                <div id="notesLog" class="space-y-6 mb-4"></div>
                <input id="nInput" type="text" placeholder="Speak your heart..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header">
                <span onclick="changeMonth(-1)" class="cursor-pointer">◀</span>
                <span id="calMonth"></span>
                <span onclick="changeMonth(1)" class="cursor-pointer">▶</span>
            </div>
            <div id="calendarDates" class="grid grid-cols-7 gap-1 p-4 min-h-[240px]"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', dispDate = new Date(), favoritesOnly = false, weatherCode = 0;

        function selectAvatar(el, icon) {
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active'); currentSigil = icon;
            document.documentElement.style.setProperty('--sigil-color', el.getAttribute('data-color'));
        }

        function toggleGothic() { document.getElementById('mainBody').classList.toggle('gothic-mode'); }
        function toggleArchive() { favoritesOnly = !favoritesOnly; loadNotes(); }

        window.onload = () => { refreshAll(); buildCalendar(); animate(); updateWeather(); setInterval(updateWeather, 300000); };

        async function updateWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.93&longitude=-88.51&current_weather=true');
                const data = await res.json();
                weatherCode = data.current_weather.weathercode;
                const temp = Math.round(data.current_weather.temperature * 9/5 + 32);
                document.getElementById('weatherDisplay').innerText = `${temp}°F • ${data.current_weather.weathercode > 50 ? 'RAINING' : 'CLEAR'} • FARMINGTON`;
                
                const hour = new Date().getHours();
                let tint = (hour < 6 || hour > 18) ? "rgba(0,0,50,0.6)" : "rgba(0,0,0,0.2)";
                if (weatherCode > 50) tint = "rgba(50,50,50,0.5)";
                document.documentElement.style.setProperty('--weather-tint', tint);
            } catch(e) {}
        }

        async function refreshAll() { loadNotes(); loadMarket(); }
        async function saveMarket() { const i = document.getElementById('mInput'); if(i.value) { await _supabase.from('market_items').insert([{ text: `${currentSigil} ${document.getElementById('userName').value || 'Someone'}: ${i.value}` }]); i.value = ""; refreshAll(); } }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between border-b border-white/5 pb-2 text-xs font-light"><span>${item.text}</span><span class="text-red-500 cursor-pointer" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }

        async function saveNote() {
            const i = document.getElementById('nInput');
            if(i.value) {
                await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${currentSigil} ${document.getElementById('userName').value || 'Someone'} • ${new Date().toLocaleTimeString()}`, is_pinned: false }]);
                triggerBurst(); i.value = ""; refreshAll();
            }
        }

        async function loadNotes() {
            let { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            if(favoritesOnly) data = data.filter(n => n.is_pinned);
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `
                <div class="relative group border-l-2 border-cyan-500/30 pl-4 py-2">
                    <small class="text-[9px] opacity-40 uppercase tracking-widest block mb-1 font-inter">${n.timestamp}</small>
                    <p class="italic text-[15px] font-light">"${n.note}"</p>
                    <div class="flex gap-4 mt-2">
                        <span class="cursor-pointer ${n.is_pinned ? 'text-red-500' : 'opacity-20'}" onclick="togglePin('${n.id}', ${n.is_pinned})">❤️</span>
                    </div>
                </div>`).join('') : '';
        }

        async function togglePin(id, s) { await _supabase.from('family_notes').update({ is_pinned: !s }).eq('id', id); refreshAll(); }
        async function deleteItem(t, id) { await _supabase.from(t).delete().eq('id', id); refreshAll(); }
        function changeMonth(o) { dispDate.setMonth(dispDate.getMonth() + o); buildCalendar(); }

        async function buildCalendar() {
            const y = dispDate.getFullYear(), m = dispDate.getMonth();
            document.getElementById('calMonth').innerText = dispDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            const grid = document.getElementById('calendarDates'); grid.innerHTML = '';
            const { data: appts } = await _supabase.from('calendar_events').select('*');
            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasA = appts?.some(e => e.start_date === ds);
                const isT = (d === new Date().getDate() && m === new Date().getMonth());
                grid.innerHTML += `<div class="cal-date ${isT ? 'cal-today' : ''} ${hasA ? 'has-quest' : ''}">${d}</div>`;
            }
        }

        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor(special = false) {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 20 + 10; this.speed = Math.random() * 1.5 + 0.5;
                this.opacity = Math.random() * 0.4; this.life = 1000;
            }
            update() {
                if (weatherCode > 50) { this.y += 5; this.x += 1; } // Rain
                else { this.y -= this.speed; }
                if (this.y < -50 || this.y > canvas.height + 50) this.y = canvas.height + 40;
            }
            draw() {
                ctx.fillStyle = `rgba(34, 211, 238, ${this.opacity})`;
                ctx.font = `${this.size}px serif`;
                ctx.fillText(weatherCode > 50 ? '💧' : (Math.random() > 0.5 ? '✨' : '♪'), this.x, this.y);
            }
        }

        class Burst {
            constructor() {
                this.x = 200; this.y = canvas.height * 0.6;
                this.size = Math.random() * 30 + 10;
                this.speedX = (Math.random() - 0.5) * 15; this.speedY = (Math.random() - 0.5) * 15;
                this.opacity = 1; this.life = 100;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.opacity -= 0.02; this.life--; }
            draw() { ctx.font = `${this.size}px serif`; ctx.fillText(Math.random() > 0.5 ? '❤️' : '✨', this.x, this.y); }
        }

        function triggerBurst() { for(let i=0; i<40; i++) particles.push(new Burst()); }
        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0 && p.opacity > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            if (particles.length < 50) particles.push(new Particle());
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
