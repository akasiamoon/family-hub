<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cottage Hub • Farmington</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; overflow-x: hidden; }
        
        /* THE FIX: Absolute first priority loading */
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; 
            background: #0d0d12 url('https://github.com/user-attachments/assets/37b40bf2-708b-449d-a1a5-1472af929dc5') no-repeat center center fixed; 
            background-size: cover;
            filter: brightness(35%) contrast(1.1);
            transition: filter 1s ease;
        }

        .glass {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 2rem;
        }

        .hub-title {
            letter-spacing: 0.4em;
            background: linear-gradient(to right, #fde68a, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .custom-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #22d3ee transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }

        .hidden-ui { opacity: 0 !important; transform: translateY(30px); pointer-events: none; }
        .bg-bright { filter: brightness(100%) !important; }
    </style>
</head>
<body>

    <div id="bg-image"></div>

    <button onclick="toggleUI()" class="fixed bottom-6 right-6 z-50 bg-cyan-900/40 border border-cyan-400/50 px-6 py-2 rounded-full backdrop-blur-md text-xs font-bold tracking-widest text-cyan-200">
        <span id="toggleText">HIDE INTERFACE</span>
    </button>

    <div id="mainUI" class="container mx-auto p-4 lg:p-10 transition-all duration-700">
        <header class="mb-10 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="text-center lg:text-left">
                <h1 class="text-4xl hub-title">Cottage Hub</h1>
                <p class="text-cyan-400/40 text-[10px] tracking-[0.3em] uppercase">Farmington, MS • Mission Control</p>
            </div>
            <div id="clock" class="text-cyan-300 text-xl font-mono font-bold shadow-cyan-500/50">00:00:00</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="glass p-6">
                    <h2 class="text-orange-400 text-xs font-bold tracking-widest mb-4 uppercase">🛒 Market List</h2>
                    <div id="marketList" class="h-40 custom-scroll space-y-2 mb-4"></div>
                    <div class="flex gap-2">
                        <input id="mInput" type="text" placeholder="Add..." class="bg-white/5 border border-white/10 rounded-lg p-2 w-full text-sm outline-none">
                        <button onclick="saveMarket()" class="bg-orange-700/30 border border-orange-500/50 px-4 rounded-lg">+</button>
                    </div>
                </div>
                <div class="glass p-6">
                    <h2 class="text-green-400 text-xs font-bold tracking-widest mb-4 uppercase">🍲 Meal Plan</h2>
                    <div id="mealGrid" class="space-y-2 text-[11px]"></div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass p-8 h-full flex flex-col min-h-[350px]">
                    <h2 class="text-cyan-400 text-xs font-bold tracking-widest mb-4 uppercase">📜 Family Log</h2>
                    <div id="notesLog" class="flex-grow custom-scroll space-y-4 mb-4"></div>
                    <div class="flex gap-2">
                        <input id="nInput" type="text" placeholder="Share a note..." class="bg-white/5 border border-white/10 rounded-xl p-3 w-full outline-none">
                        <button onclick="saveNote()" class="bg-cyan-700/30 border border-cyan-400/50 px-6 rounded-xl font-bold">POST</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass p-6">
                    <h2 class="text-cyan-300 text-xs font-bold tracking-widest mb-4 uppercase">📅 Schedule</h2>
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let uiVisible = true;
        let calendar;

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        window.onload = () => {
            updateClock();
            try {
                refreshAll();
                initCalendar();
            } catch (e) { console.error("Initial load error:", e); }

            _supabase.channel('db').on('postgres_changes', {event:'*', schema:'public'}, () => {
                refreshAll();
                if(calendar) calendar.refetchEvents();
            }).subscribe();
        };

        function toggleUI() {
            uiVisible = !uiVisible;
            document.getElementById('mainUI').classList.toggle('hidden-ui', !uiVisible);
            document.getElementById('bg-image').classList.toggle('bg-bright', !uiVisible);
            document.getElementById('toggleText').innerText = uiVisible ? "HIDE INTERFACE" : "SHOW INTERFACE";
        }

        async function initCalendar() {
            const calEl = document.getElementById('calendar');
            if (!calEl) return;
            calendar = new FullCalendar.Calendar(calEl, {
                initialView: 'dayGridMonth',
                height: 'auto',
                selectable: true,
                select: async (info) => {
                    const title = prompt('Add Entry:');
                    if (title) {
                        await _supabase.from('calendar_events').insert([{ title, start_date: info.startStr }]);
                        calendar.refetchEvents();
                    }
                },
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date, color: '#0e7490' })) : []);
                }
            });
            calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }

        async function saveNote() {
            const i = document.getElementById('nInput');
            if (!i.value) return;
            const ts = new Date().toLocaleString([], {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: ts }]);
            i.value = "";
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `
                <div class="border-l-2 border-cyan-500/30 pl-4 py-2 bg-white/5 rounded-r-xl">
                    <small class="text-cyan-400/50 text-[9px] font-mono">${n.timestamp}</small>
                    <p class="text-white/80 text-sm">${n.note}</p>
                </div>
            `).join('') : '';
        }

        async function saveMarket() {
            const i = document.getElementById('mInput');
            if (i.value) await _supabase.from('market_items').insert([{ text: i.value }]);
            i.value = "";
        }

        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `
                <div class="flex items-center gap-2 bg-white/5 p-2 rounded-lg border border-white/5 text-xs">
                    <input type="checkbox"> <span>${item.text}</span>
                </div>
            `).join('') : '';
        }

        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `
                    <div class="flex justify-between items-center bg-white/5 p-2 rounded-lg border border-white/5">
                        <span class="font-bold text-green-400">${day}</span>
                        <input onchange="updateMeal('${day}', this.value)" value="${meal}" class="bg-transparent text-right w-1/2 outline-none text-white/50 focus:text-cyan-300">
                    </div>
                `;
            }).join('');
        }

        async function updateMeal(day, menu) { await _supabase.from('meal_plan').upsert({ day, menu }, { onConflict: 'day' }); }
    </script>
</body>
</html>
