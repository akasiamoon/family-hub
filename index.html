<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Here's the Damn List • Cory's a poo poo head!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@200;400;700;900&display=swap');

        :root { --sigil: #22d3ee; --gold: #fbbf24; }
        [data-theme="purple"] { --sigil: #a855f7; }
        [data-theme="red"] { --sigil: #ef4444; }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: #e2e8f0; font-family: 'Cinzel', serif;
            overflow-x: hidden; 
        }

        /* FIXED TO THE GLASS - COVERING ENTIRE SCREEN */
        #particle-canvas { 
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0; 
            pointer-events: none; 
            background: #000;
        }

        .hub-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            z-index: 1; /* Sits on top of the drift */
            background: transparent;
        }

        .hero-image {
            width: 100%;
            height: 40vh;
            background: url('thefamilyhub.jpg') no-repeat center center;
            background-size: cover;
            border-bottom: 3px solid var(--sigil);
            position: relative;
        }

        .sidebar {
            position: relative; 
            width: 100%; 
            padding: 2rem 1.5rem; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
            flex-grow: 1;
        }

        @media (min-width: 1024px) {
            .hub-container { flex-direction: row; height: 100vh; overflow: hidden; }
            .hero-image { width: 65%; height: 100vh; border-bottom: none; border-right: 3px solid var(--sigil); }
            .sidebar { 
                max-width: 480px; 
                height: 100vh;
                overflow-y: auto;
                background: linear-gradient(to right, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
                scrollbar-width: none;
            }
        }

        .glass-module {
            background: rgba(15, 15, 20, 0.5); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 1rem;
            margin-bottom: 2.5rem; 
            overflow: hidden; 
        }

        .oracle-row {
            display: flex; justify-content: space-around; align-items: center; 
            font-size: 11px; font-weight: 900; letter-spacing: 2px;
            color: var(--sigil); margin: 20px 0 40px 0;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.4);
        }

        .expensive-header {
            font-size: 13px; letter-spacing: 0.35em; font-weight: 900; text-transform: uppercase;
            padding: 1.1rem 1.25rem; background: linear-gradient(to right, var(--gold), var(--sigil));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            border-bottom: 2px solid transparent; border-image: linear-gradient(to right, var(--gold), var(--sigil)) 1;
            display: flex; justify-content: space-between; align-items: center;
        }

        .avatar-bar { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 15px; }
        .avatar-option { height: 45px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(0,0,0,0.4); transition: 0.3s; }
        .avatar-option.active { border-color: var(--sigil); box-shadow: 0 0 15px var(--sigil); transform: scale(1.1); }

        input { background: rgba(0,0,0,0.6) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: #fff !important; padding: 15px !important; border-radius: 10px; font-family: 'Inter', sans-serif; width: 100%; transition: 0.3s; }
        .purge-btn { font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: #ef4444; cursor: pointer; }

        #themeMenu { display: none; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; }
        .theme-dot { height: 15px; border-radius: 50%; border: 1px solid white; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="hub-container">
        <div class="hero-image"></div>

        <div class="sidebar">
            <header class="text-center mb-6">
                <h1 class="text-3xl font-black tracking-[0.1em]" style="background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">HERE'S THE DAMN LIST</h1>
                <p class="text-[10px] tracking-[0.8em] opacity-40 uppercase mt-1">Cory's a poo poo head!</p>
                
                <div class="oracle-row">
                    <span id="clock">00:00:00</span>
                    <div class="flex items-center gap-2"><span id="weatherIcon">🌤️</span> <span id="temp">57°F</span></div>
                    <span>FARMINGTON</span>
                </div>

                <div class="avatar-bar bg-white/5 rounded-2xl border border-white/5">
                    <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐢')">🐢</div>
                </div>
                
                <div class="flex gap-2 mt-4">
                    <input id="userName" type="text" placeholder="NAME" class="text-center font-black">
                    <button onclick="toggleThemeMenu()" class="p-4 border border-white/10 rounded-xl text-[9px] uppercase font-black hover:bg-white/5">Vibe</button>
                </div>
                <div id="themeMenu" class="mt-2">
                    <div class="theme-dot bg-cyan-400" onclick="setTheme('')"></div>
                    <div class="theme-dot bg-purple-600" onclick="setTheme('purple')"></div>
                    <div class="theme-dot bg-red-600" onclick="setTheme('red')"></div>
                </div>
            </header>

            <div class="glass-module">
                <div class="expensive-header">
                    <span>The Provisions</span>
                    <span onclick="purgeList()" class="purge-btn">Purge All</span>
                </div>
                <div class="p-6">
                    <div id="marketList" class="space-y-4 mb-6 text-sm font-bold font-inter text-white"></div>
                    <input id="mInput" type="text" placeholder="Add to the list..." onkeydown="if(event.key==='Enter') saveMarket()">
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱';

        function selectAvatar(el, icon) { document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active')); el.classList.add('active'); currentSigil = icon; }
        function toggleThemeMenu() { const m = document.getElementById('themeMenu'); m.style.display = m.style.display === 'grid' ? 'none' : 'grid'; }
        function setTheme(t) { document.body.setAttribute('data-theme', t); }

        window.onload = async () => { 
            loadMarket(); animate();
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}); }, 1000);
        };

        async function purgeList() { if(confirm("Empty the list?")) { await _supabase.from('market_items').delete().neq('id', 0); loadMarket(); } }
        
        async function saveMarket() {
            const i = document.getElementById('mInput'); if(!i.value) return;
            const name = document.getElementById('userName').value || 'Someone';
            await _supabase.from('market_items').insert([{ text: `${currentSigil} ${name}: ${i.value}` }]);
            i.value = ""; loadMarket();
        }

        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between border-b border-white/5 pb-2"><span>${item.text}</span><span class="text-red-900 font-bold cursor-pointer" onclick="deleteItem('${item.id}')">×</span></div>`).join('') : '';
        }

        async function deleteItem(id) { await _supabase.from('market_items').delete().eq('id', id); loadMarket(); }

        /* THE HARD-LOCKED ANIMATION ENGINE */
        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        
        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            // Re-init particles on resize to ensure they cover new area
            particles = [];
            for (let i = 0; i < 60; i++) particles.push(new Particle());
        }
        window.addEventListener('resize', resize); 
        resize();
        
        class Particle {
            constructor() { this.init(); }
            init() { 
                this.x = Math.random() * canvas.width; 
                this.y = canvas.height + Math.random() * 100; 
                this.size = Math.random() * 25 + 10; 
                this.speed = Math.random() * 1.2 + 0.6; 
                this.opacity = Math.random() * 0.4 + 0.2; 
                this.isEmber = Math.random() > 0.6; 
                this.char = this.isEmber ? '•' : ['♪', '♫', '♬'][Math.floor(Math.random()*3)];
            }
            update() { 
                this.y -= this.speed; 
                this.x += Math.sin(this.y / 40) * 0.8; 
                if (this.y < -50) this.init(); 
            }
            draw() { 
                ctx.fillStyle = this.isEmber ? '#f97316' : '#22d3ee'; 
                ctx.globalAlpha = this.opacity; 
                ctx.font = `${this.size}px serif`; 
                ctx.fillText(this.char, this.x, this.y); 
                ctx.globalAlpha = 1; 
            }
        }

        function animate() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            particles.forEach(p => { p.update(); p.draw(); }); 
            requestAnimationFrame(animate); 
        }
    </script>
</body>
</html>
