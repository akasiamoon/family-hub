<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tucker • Family Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;600;800&display=swap');
        :root { --sigil: #22d3ee; --gold: #fbbf24; --deep-glass: rgba(5, 5, 8, 0.98); }
        [data-theme="purple"] { --sigil: #a855f7; } [data-theme="red"] { --sigil: #ef4444; } [data-theme="green"] { --sigil: #10b981; }
        [data-theme="gold"] { --sigil: #fbbf24; } [data-theme="pink"] { --sigil: #f472b6; } [data-theme="orange"] { --sigil: #f97316; }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        body.large-mode .note-text, body.large-mode .list-item { font-size: 26px !important; }
        
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
        .hub-container { display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 10; }
        
        .hero-image { width: 100%; height: 40vh; background: #111 url('thefamilyhub.jpg') center center no-repeat; background-size: cover; border-bottom: 3px solid var(--sigil); }
        .sidebar { width: 100%; padding: 2rem; background: linear-gradient(to bottom, rgba(0,0,0,0), #000 20%); flex-grow: 1; }
        
        @media (min-width: 1024px) { 
            .hub-container { flex-direction: row; height: 100vh; } 
            .hero-image { width: 62%; height: 100vh; border-right: 3px solid var(--sigil); } 
            .sidebar { max-width: 550px; height: 100vh; overflow-y: auto; scrollbar-width: none; } 
        }

        .oracle-row { display: flex; justify-content: space-around; align-items: center; padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 2rem; color: var(--gold); font-weight: 800; font-size: 13px; letter-spacing: 2px; }
        .glass-module { background: var(--deep-glass); backdrop-filter: blur(80px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; margin-bottom: 2rem; overflow: hidden; }
        .expensive-header { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 0.3em; font-weight: 900; text-transform: uppercase; padding: 1.5rem; background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }

        .quest-banner { background: linear-gradient(to right, rgba(34, 211, 238, 0.15), transparent); border-left: 5px solid var(--sigil); padding: 1.5rem; margin: 1rem; border-radius: 0 1rem 1rem 0; font-size: 15px; font-weight: 800; }
        
        .cal-date { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; border: 1px solid rgba(255,255,255,0.02); cursor: pointer; }
        .cal-today { border: 2px solid var(--gold) !important; color: var(--gold); background: rgba(251, 191, 36, 0.1); border-radius: 8px; }
        .has-quest { border: 1.5px solid var(--sigil) !important; box-shadow: inset 0 0 10px var(--sigil); color: var(--sigil); }

        .list-item { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .note-card { border-left: 5px solid var(--sigil); padding: 1.5rem; background: rgba(255,255,255,0.02); margin-bottom: 2rem; border-radius: 0 1rem 1rem 0; }
        .note-img { width: 100%; border-radius: 1rem; margin-top: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        
        .action-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 12px; font-size: 11px; font-weight: 900; color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .listening { background: #ef4444 !important; border-color: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #questModal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.98); backdrop-filter: blur(40px); align-items: center; justify-content: center; }
        .modal-glass { background: #000; border: 1px solid var(--gold); padding: 3rem; border-radius: 2.5rem; width: 90%; max-width: 480px; text-align: center; }
    </style>
</head>
<body id="mainBody">

    <div id="questModal">
        <div class="modal-glass">
            <h2 id="modalDateTitle" class="text-3xl font-black mb-8 uppercase text-white" style="font-family: 'Cinzel';"></h2>
            <div id="modalEventList" class="space-y-4 mb-8 text-left max-h-72 overflow-y-auto pr-4 text-white"></div>
            <input id="modalInput" class="w-full bg-white text-black p-4 rounded-xl outline-none" type="text" placeholder="Quest details...">
            <div class="flex gap-4 mt-8">
                <button onclick="closeQuestModal()" class="w-full py-5 border border-white/20 uppercase text-xs font-black rounded-2xl">Back</button>
                <button id="addQuestBtn" class="w-full py-5 bg-white/10 border border-white/30 uppercase text-xs font-black rounded-2xl">Save</button>
            </div>
        </div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div class="hub-container">
        <div class="hero-image"></div>
        <div class="sidebar">
            <header class="text-center mb-10">
                <h1 class="text-7xl font-black tracking-[0.2em]" style="background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Cinzel';">TUCKER</h1>
                <div class="oracle-row">
                    <span id="clock">00:00</span>
                    <span>FARMINGTON: 52°F</span>
                    <button id="sizeToggle" class="px-2 border border-white/20 rounded">AA</button>
                </div>
            </header>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('calContent')"><span>The Oracle</span><span>↕</span></div>
                <div id="calContent">
                    <div id="activeQuestBanner" class="quest-banner">Reading Fate...</div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 p-6 text-white text-xs"></div>
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('mealContent')"><span>Meal Plan</span><span>↕</span></div>
                <div id="mealContent" class="p-6">
                    <div id="mealList" class="mb-4"></div>
                    <input id="mealInput" class="w-full bg-black border border-white/20 p-4 rounded-xl outline-none" type="text" placeholder="Add dinner..." onkeydown="if(event.key==='Enter') saveItem('meal_plan', 'mealInput')">
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('noteContent')"><span>The Chronicler</span><span>↕</span></div>
                <div id="noteContent" class="p-8">
                    <div id="notesLog" class="space-y-6 mb-6 text-white"></div>
                    <input id="nInput" class="w-full bg-black border border-white/20 p-4 rounded-xl outline-none mb-4" type="text" placeholder="Tell a story..." onkeydown="if(event.key==='Enter') saveNote()">
                    <div class="flex gap-3">
                        <button id="voiceBtn" class="action-btn" onclick="startVoice()">🎤 SPEAK</button>
                        <button class="action-btn" id="photoBtn" onclick="document.getElementById('imgUpload').click()">📷 PHOTO</button>
                        <input type="file" id="imgUpload" class="hidden" accept="image/*" onchange="uploadAndSave(this)">
                    </div>
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('marketContent')"><span>Provisions</span><span>↕</span></div>
                <div id="marketContent" class="p-6">
                    <div id="marketList" class="mb-4 text-white"></div>
                    <input id="mInput" class="w-full bg-black border border-white/20 p-4 rounded-xl outline-none" type="text" placeholder="Add grocery..." onkeydown="if(event.key==='Enter') saveItem('market_items', 'mInput')">
                    <button onclick="purgeTable('market_items')" class="w-full mt-6 border border-red-500/40 py-4 rounded-xl text-[10px] font-black text-red-500 uppercase bg-red-500/5 hover:bg-red-500/10 transition">Purge Provisions</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', dispDate = new Date();

        window.onload = () => { 
            const savedName = localStorage.getItem('hubCommanderName');
            if (savedName) document.getElementById('userName').value = savedName;
            const isLarge = localStorage.getItem('hubLargeMode') === 'true';
            if (isLarge) document.body.classList.add('large-mode');

            refreshAll(); buildCalendar(); animate(); updateTodayBanner();
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }, 1000);
