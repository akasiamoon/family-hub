<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cottage Hub • Farmington</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; }
        
        /* Fixed Background Image */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .bg-container img {
            width: 100%; height: 100%; object-fit: cover;
            transition: filter 0.6s ease;
        }

        .glass {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 1.5rem;
        }

        /* Fixed Scrollbar Visibility */
        .custom-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #22d3ee rgba(0,0,0,0.2); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }

        .hidden-ui { opacity: 0 !important; transform: translateY(30px); pointer-events: none; }
        .dim { filter: brightness(35%); }
        .bright { filter: brightness(100%); }

        /* Calendar specific fixes */
        #calendar { background: rgba(0,0,0,0.4); border-radius: 1rem; padding: 10px; min-height: 400px; }
        .fc-toolbar-title { color: #22d3ee !important; }
    </style>
</head>
<body>

    <div class="bg-container">
        <img id="main-bg" src="https://i.imgur.com/nH96gF0.jpeg" class="dim">
    </div>

    <button onclick="toggleUI()" class="fixed bottom-6 right-6 z-50 bg-cyan-900/50 border border-cyan-400 px-6 py-2 rounded-full backdrop-blur-md">
        <span id="toggleText">HIDE INTERFACE</span>
    </button>

    <div id="mainUI" class="container mx-auto p-4 lg:p-8 transition-all duration-500">
        <header class="mb-8">
            <h1 class="text-4xl font-black text-cyan-200">COTTAGE HUB</h1>
            <p class="text-cyan-400/60 text-xs uppercase tracking-widest">Farmington, MS • Family Command</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="glass p-6">
                    <h2 class="text-orange-400 font-bold mb-4">🛒 MARKET LIST</h2>
                    <div id="marketList" class="space-y-2 mb-4 h-40 custom-scroll"></div>
                    <div class="flex gap-2">
                        <input id="mInput" type="text" placeholder="Add..." class="bg-black/40 border border-white/10 rounded p-2 w-full text-sm">
                        <button onclick="saveMarket()" class="bg-orange-700 px-4 rounded">+</button>
                    </div>
                </div>
                <div class="glass p-6">
                    <h2 class="text-green-400 font-bold mb-4">🍲 MEAL PLAN</h2>
                    <div id="mealGrid" class="space-y-2 text-xs"></div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass p-6 h-full flex flex-col">
                    <h2 class="text-cyan-400 font-bold mb-4">📜 FAMILY LOG</h2>
                    <div id="notesLog" class="flex-grow space-y-4 mb-4 custom-scroll min-h-[300px]"></div>
                    <div class="flex gap-2">
                        <input id="nInput" type="text" placeholder="Share a note..." class="bg-black/40 border border-white/10 rounded p-3 w-full">
                        <button onclick="saveNote()" class="bg-cyan-700 px-6 rounded font-bold">POST</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass p-6">
                    <h2 class="text-cyan-300 font-bold mb-4">📅 SCHEDULE</h2>
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let uiVisible = true;
        let calendar;

        window.onload = () => {
            if(SUPABASE_URL.includes('YOUR_')) return console.error("URL Missing");
            refreshAll();
            initCalendar();
            _supabase.channel('db').on('postgres_changes', {event:'*', schema:'public'}, () => {
                refreshAll();
                if(calendar) calendar.refetchEvents();
            }).subscribe();
        };

        function toggleUI() {
            uiVisible = !uiVisible;
            document.getElementById('mainUI').classList.toggle('hidden-ui', !uiVisible);
            document.getElementById('main-bg').className = uiVisible ? 'dim' : 'bright';
            document.getElementById('toggleText').innerText = uiVisible ? "HIDE INTERFACE" : "SHOW INTERFACE";
        }

        async function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                selectable: true,
                select: async (info) => {
                    const title = prompt('Add Entry:');
                    if (title) {
                        await _supabase.from('calendar_events').insert([{ title, start_date: info.startStr }]);
                        calendar.refetchEvents();
                    }
                },
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date, color: '#0e7490' })) : []);
                }
            });
            calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }

        async function saveNote() {
            const i = document.getElementById('nInput');
            if (!i.value) return;
            const ts = new Date().toLocaleString([], {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: ts }]);
            i.value = "";
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `
                <div class="border-l-4 border-cyan-500/40 pl-4 py-1">
                    <small class="text-cyan-400/60 font-mono">${n.timestamp}</small>
                    <p class="text-white/80">${n.note}</p>
                </div>
            `).join('') : '';
        }

        async function saveMarket() {
            const i = document.getElementById('mInput');
            if (i.value) await _supabase.from('market_items').insert([{ text: i.value }]);
            i.value = "";
        }

        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `
                <div class="flex gap-2 bg-white/5 p-2 rounded">
                    <input type="checkbox"> <span class="text-sm">${item.text}</span>
                </div>
            `).join('') : '';
        }

        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `<div class="flex justify-between bg-white/5 p-2 rounded"><b>${day}</b> <input onchange="updateMeal('${day}', this.value)" value="${meal}" class="bg-transparent text-right w-1/2 outline-none"></div>`;
            }).join('');
        }

        async function updateMeal(day, menu) { await _supabase.from('meal_plan').upsert({ day, menu }, { onConflict: 'day' }); }
    </script>
</body>
</html>
