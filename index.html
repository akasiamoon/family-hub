<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        .sidebar {
            position: relative;
            width: 100%; max-width: 480px; height: 100vh;
            padding: 2rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0) 100%);
            border-right: 1px solid rgba(34, 211, 238, 0.2);
        }

        /* EPIC CALENDAR OVERRIDE */
        #calendar { background: transparent !important; color: white !important; font-family: 'Inter', sans-serif; }
        .fc { --fc-border-color: rgba(34, 211, 238, 0.15); --fc-button-bg-color: rgba(34, 211, 238, 0.1); --fc-button-border-color: rgba(34, 211, 238, 0.4); }
        .fc .fc-toolbar-title { font-family: 'Cinzel', serif; font-size: 14px !important; color: #fde68a; letter-spacing: 2px; }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid rgba(34, 211, 238, 0.1) !important; }
        .fc .fc-col-header-cell-cushion { font-size: 10px; text-transform: uppercase; color: #22d3ee; opacity: 0.8; }
        .fc .fc-daygrid-day-number { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); padding: 8px !important; }
        .fc .fc-day-today { background: rgba(253, 230, 138, 0.05) !important; }
        .fc .fc-day-today .fc-daygrid-day-number { color: #fde68a; font-weight: 900; }
        .fc-event { background: rgba(34, 211, 238, 0.2) !important; border: 1px solid #22d3ee !important; font-size: 9px !important; padding: 2px !important; border-radius: 4px !important; }

        /* THE REST OF THE UI */
        .glass-module {
            background: rgba(8, 8, 12, 0.9);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(34, 211, 238, 0.25);
            border-radius: 1.25rem; margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
        }
        .module-header { padding: 1.25rem; display: flex; justify-content: space-between; cursor: pointer; border-bottom: 1px solid rgba(34, 211, 238, 0.1); }
        .hub-title { font-family: 'Cinzel', serif; letter-spacing: 0.2em; background: linear-gradient(135deg, #fde68a, #d97706, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; text-transform: uppercase; }

        input { background: rgba(0,0,0,0.9) !important; border: 1px solid rgba(34, 211, 238, 0.2) !important; color: #fff !important; padding: 14px !important; border-radius: 10px; width: 100%; margin-bottom: 12px; }
        .btn-ui { background: linear-gradient(135deg, #0e7490, #164e63) !important; color: #22d3ee !important; border: 1px solid rgba(34, 211, 238, 0.5) !important; padding: 12px; border-radius: 10px; width: 100%; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; }

        .avatar-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; background: rgba(34, 211, 238, 0.05); padding: 15px; border-radius: 1rem; border: 1px solid rgba(34, 211, 238, 0.1); }
        .avatar-option { height: 45px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; background: rgba(0,0,0,0.5); transition: 0.3s; }
        .avatar-option.active { border-color: #22d3ee; box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); background: rgba(34, 211, 238, 0.15); transform: translateY(-3px); }

        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: linear-gradient(#fde68a, #22d3ee); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <header class="mb-10 text-center">
            <h1 class="text-4xl hub-title">Siren's Sands</h1>
            <p class="text-cyan-400/60 text-[10px] tracking-[0.6em] uppercase mt-2 font-black">Tucker • Cooper • Burns</p>
            
            <div class="mt-8">
                <div class="avatar-bar" id="avatarBar">
                    <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐢')">🐢</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐺')">🐺</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🦉')">🦉</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '⚓')">⚓</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '📖')">📖</div>
                </div>
                <input id="userName" type="text" placeholder="CHOOSE YOUR NAME" style="text-align:center; font-weight:900; color:#fde68a!important; font-size:11px!important; letter-spacing:2px; text-transform:uppercase;">
            </div>
        </header>

        <div id="marketMod" class="glass-module">
            <div class="module-header" onclick="toggle('marketMod')"><span class="text-orange-400 font-black text-xs uppercase tracking-widest">🛒 Market</span></div>
            <div class="module-content">
                <div id="marketList" class="max-h-48 overflow-y-auto mb-4 space-y-2"></div>
                <input id="mInput" type="text" placeholder="Add provision..." onkeydown="if(event.key==='Enter') saveMarket()">
            </div>
        </div>

        <div id="mealMod" class="glass-module">
            <div class="module-header" onclick="toggle('mealMod')"><span class="text-green-400 font-black text-xs uppercase tracking-widest">🍲 Feasts</span></div>
            <div class="module-content"><div id="mealGrid" class="text-xs space-y-3"></div></div>
        </div>

        <div id="logMod" class="glass-module">
            <div class="module-header" onclick="toggle('logMod')"><span class="text-cyan-400 font-black text-xs uppercase tracking-widest">📜 Chronicles</span></div>
            <div class="module-content">
                <div id="notesLog" class="max-h-64 overflow-y-auto mb-4 space-y-4 pr-2"></div>
                <input id="nInput" type="text" placeholder="Speak, bard..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div id="calMod" class="glass-module">
            <div class="module-header" onclick="toggle('calMod')"><span class="text-cyan-200 font-black text-xs uppercase tracking-widest">📅 The Schedule</span></div>
            <div class="module-content"><div id="calendar"></div></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱';
        function selectAvatar(el, icon) { document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active')); el.classList.add('active'); currentSigil = icon; }
        function toggle(id) { document.getElementById(id).classList.toggle('module-collapsed'); }

        window.onload = () => { refreshAll(); initCalendar(); animate(); };

        async function initCalendar() {
            window.calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 'auto',
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date })) : []);
                }
            });
            window.calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }
        async function saveMarket() { const i = document.getElementById('mInput'); if(i.value) await _supabase.from('market_items').insert([{ text: `${currentSigil} ${document.getElementById('userName').value}: ${i.value}` }]); i.value = ""; }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="bg-white/5 p-2 rounded border border-white/5 text-xs flex justify-between"><span>${item.text}</span><span class="cursor-pointer text-red-400" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }
        async function saveNote() { const i = document.getElementById('nInput'); if(i.value) await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${currentSigil} ${document.getElementById('userName').value} • ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}` }]); i.value = ""; }
        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `<div class="bg-white/5 p-4 rounded-xl border border-white/5 relative group"><small class="text-cyan-400 font-black text-[9px] block mb-2 uppercase">${n.timestamp}</small><p class="text-[14px] font-light">${n.note}</p><span class="absolute top-2 right-3 text-red-400 opacity-0 group-hover:opacity-100 cursor-pointer" onclick="deleteItem('family_notes', '${n.id}')">×</span></div>`).join('') : '';
        }
        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `<div class="flex justify-between items-center bg-white/5 p-2 border border-white/5"><span class="font-bold text-green-400 text-[10px] uppercase">${day}</span><input onchange="updateMeal('${day}', this.value)" value="${meal}" class="!bg-transparent !border-none !p-0 !m-0 !w-auto text-right text-cyan-400 font-black text-xs"></div>`;
            }).join('');
        }
        async function updateMeal(day, menu) { await _supabase.from('meal_plan').upsert({ day, menu }, { onConflict: 'day' }); }
        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); }

        // --- PARTICLE ENGINE: BIGGER & BOLDER ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = canvas.height + 50;
                this.isNote = Math.random() > 0.4;
                this.size = Math.random() * 22 + 10; // MUCH BIGGER
                this.speed = Math.random() * 1.2 + 0.6; // BOLDER MOVEMENT
                this.opacity = Math.random() * 0.5 + 0.2;
                this.color = this.isNote ? '34, 211, 238' : '251, 191, 36';
            }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 60) * 0.8; if (this.y < -50) this.reset(); }
            draw() {
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                if (this.isNote) { ctx.font = `${this.size}px Cinzel`; ctx.fillText('♪', this.x, this.y); } 
                else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 4, 0, Math.PI * 2); ctx.fill(); }
            }
        }
        for (let i = 0; i < 35; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    </script>
</body>
</html>
