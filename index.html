<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tucker Cooper Burns • Family Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@200;400;700;900&display=swap');

        :root { --sigil: #22d3ee; --gold: #fbbf24; }
        [data-theme="purple"] { --sigil: #a855f7; }
        [data-theme="green"] { --sigil: #10b981; }
        [data-theme="red"] { --sigil: #ef4444; }
        [data-theme="silver"] { --sigil: #cbd5e1; }
        [data-theme="gold"] { --sigil: #fbbf24; }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; background-size: cover;
            color: #e2e8f0; font-family: 'Cinzel', serif; overflow: hidden; 
        }

        #particle-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

        .sidebar {
            position: relative; width: 100%; max-width: 480px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 85%, rgba(0,0,0,0) 100%);
            border-right: 3px solid var(--sigil); scrollbar-width: none;
        }

        /* WEATHER BAR */
        .weather-row {
            background: rgba(0,0,0,0.8); border: 1px solid var(--sigil);
            padding: 10px 20px; border-radius: 50px; display: flex; 
            justify-content: space-between; align-items: center; 
            font-size: 11px; font-weight: 900; letter-spacing: 2px;
            color: var(--sigil); margin-bottom: 20px;
        }

        .expensive-header {
            font-size: 12px; letter-spacing: 0.35em; font-weight: 900; text-transform: uppercase;
            padding: 1.25rem; background: linear-gradient(to right, var(--gold), var(--sigil));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            border-bottom: 2px solid transparent; border-image: linear-gradient(to right, var(--gold), var(--sigil)) 1;
            display: flex; justify-content: space-between; align-items: center;
        }

        .glass-module {
            background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem;
            margin-bottom: 2.5rem; overflow: hidden;
        }

        /* HIDDEN THEME MENU */
        #themeMenu { display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; background: #000; border: 1px solid var(--sigil); border-radius: 10px; margin-top: 10px; }
        .theme-btn { width: 100%; height: 30px; border-radius: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

        .avatar-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; }
        .avatar-option { height: 45px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(0,0,0,0.6); }
        .avatar-option.active { border-color: var(--sigil); box-shadow: 0 0 15px var(--sigil); }

        input { background: rgba(0,0,0,1) !important; border: 1px solid rgba(34, 211, 238, 0.2) !important; color: #fff !important; padding: 15px !important; border-radius: 10px; font-family: 'Inter', sans-serif; width: 100%; }

        .cal-date { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
        .cal-today { border: 2px solid var(--gold) !important; color: var(--gold); }
        .has-quest { border-color: var(--sigil) !important; box-shadow: inset 0 0 10px var(--sigil); }
    </style>
</head>
<body id="mainBody">

    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <header class="text-center mb-10">
            <div class="weather-row">
                <span id="clock">00:00</span>
                <div class="flex items-center gap-2">
                    <span id="weatherIcon">🌤️</span>
                    <span id="temp">57°F</span>
                </div>
                <span>FARMINGTON</span>
            </div>

            <h1 class="text-3xl font-black tracking-[0.2em]" style="background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TUCKER COOPER BURNS</h1>
            <p class="text-[10px] tracking-[0.8em] opacity-40 uppercase mt-1">Family Hub</p>
            
            <button onclick="toggleThemeMenu()" class="mt-4 text-[9px] border border-white/20 px-4 py-1 rounded-full uppercase tracking-widest font-black">Themes</button>
            <div id="themeMenu">
                <div class="theme-btn bg-cyan-400" onclick="setTheme('')"></div>
                <div class="theme-btn bg-purple-600" onclick="setTheme('purple')"></div>
                <div class="theme-btn bg-emerald-500" onclick="setTheme('green')"></div>
                <div class="theme-btn bg-red-600" onclick="setTheme('red')"></div>
                <div class="theme-btn bg-slate-400" onclick="setTheme('silver')"></div>
                <div class="theme-btn bg-yellow-500" onclick="setTheme('gold')"></div>
            </div>

            <div class="avatar-bar mt-8 bg-white/5 rounded-2xl border border-white/10">
                <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐢')">🐢</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐺')">🐺</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🦉')">🦉</div>
                <div class="avatar-option" onclick="selectAvatar(this, '⚓')">⚓</div>
                <div class="avatar-option" onclick="selectAvatar(this, '📖')">📖</div>
            </div>
            <input id="userName" type="text" placeholder="NAME" class="mt-4 text-center font-black">
        </header>

        <div class="glass-module"><div class="expensive-header"><span>Grocery List</span><span onclick="purgeList()" class="text-[8px] cursor-pointer opacity-30">Purge</span></div><div class="p-6"><div id="marketList" class="space-y-4 mb-4 text-sm font-bold"></div><input id="mInput" type="text" placeholder="Add provisions..." onkeydown="if(event.key==='Enter') saveMarket()"></div></div>
        
        <div class="glass-module"><div class="expensive-header">Archive of Hearts</div><div id="pinnedLog" class="p-6 space-y-6"></div></div>

        <div class="glass-module"><div class="expensive-header">Love Notes</div><div class="p-6"><div id="notesLog" class="space-y-8 mb-4"></div><input id="nInput" type="text" placeholder="Speak your heart..." onkeydown="if(event.key==='Enter') saveNote()"></div></div>

        <div class="glass-module">
            <div class="expensive-header"><span onclick="changeMonth(-1)">◀</span><span id="calMonth"></span><span onclick="changeMonth(1)">▶</span></div>
            <div id="calendarDates" class="grid grid-cols-7 gap-1 p-4 text-[11px] text-center min-h-[250px]"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', dispDate = new Date();

        function selectAvatar(el, icon) { document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active')); el.classList.add('active'); currentSigil = icon; }
        function toggleThemeMenu() { const m = document.getElementById('themeMenu'); m.style.display = m.style.display === 'grid' ? 'none' : 'grid'; }
        function setTheme(t) { document.body.setAttribute('data-theme', t); }
        function changeMonth(o) { dispDate.setMonth(dispDate.getMonth() + o); buildCalendar(); }

        window.onload = async () => { 
            refreshAll(); buildCalendar(); animate(); 
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }, 1000);
        };

        async function refreshAll() { loadNotes(); loadMarket(); }
        async function purgeList() { if(confirm("Clear grocery list?")) { await _supabase.from('market_items').delete().neq('id', 0); loadMarket(); } }
        
        async function saveMarket() {
            const i = document.getElementById('mInput'); if(!i.value) return;
            await _supabase.from('market_items').insert([{ text: `${currentSigil} ${document.getElementById('userName').value || 'Someone'}: ${i.value}` }]);
            i.value = ""; loadMarket();
        }

        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between border-b border-white/5 pb-2"><span>${item.text}</span><span class="text-red-900 font-bold cursor-pointer" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }

        async function saveNote() {
            const i = document.getElementById('nInput'); if(!i.value) return;
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${currentSigil} ${document.getElementById('userName').value || 'Someone'} • ${new Date().toLocaleTimeString()}`, is_pinned: false }]);
            i.value = ""; loadNotes();
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            if(!data) return;
            const p = data.filter(n => n.is_pinned), r = data.filter(n => !n.is_pinned);
            const html = (n) => `<div class="border-l-4 border-cyan-500/50 pl-4 py-2 group"><small class="text-[9px] opacity-40 uppercase font-inter">${n.timestamp}</small><p class="italic text-[16px] font-bold mt-1 text-white">"${n.note}"</p><div class="flex gap-4 mt-2"><span class="cursor-pointer ${n.is_pinned ? 'text-red-500' : 'opacity-20'}" onclick="togglePin('${n.id}', ${n.is_pinned})">❤️</span><span class="text-red-900 font-bold cursor-pointer" onclick="deleteItem('family_notes', '${n.id}')">×</span></div></div>`;
            document.getElementById('pinnedLog').innerHTML = p.map(html).join('');
            document.getElementById('notesLog').innerHTML = r.map(html).join('');
        }

        async function togglePin(id, s) { await _supabase.from('family_notes').update({ is_pinned: !s }).eq('id', id); loadNotes(); }
        async function deleteItem(t, id) { await _supabase.from(t).delete().eq('id', id); refreshAll(); }

        async function buildCalendar() {
            const y = dispDate.getFullYear(), m = dispDate.getMonth();
            document.getElementById('calMonth').innerText = dispDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            const grid = document.getElementById('calendarDates'); grid.innerHTML = '';
            const { data: appts } = await _supabase.from('calendar_events').select('*');
            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasA = appts?.some(e => e.start_date === ds);
                const isT = (d === new Date().getDate() && m === new Date().getMonth());
                grid.innerHTML += `<div class="cal-date ${isT ? 'cal-today' : ''} ${hasA ? 'has-quest' : ''} p-2">${d}</div>`;
            }
        }

        // --- STABLE BARDIC PARTICLES ---
        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width; this.y = canvas.height + 50;
                this.size = Math.random() * 20 + 10; this.speed = Math.random() * 0.5 + 0.3;
                this.opacity = Math.random() * 0.3;
                this.type = Math.random() > 0.4 ? 'note' : 'ember';
                this.char = ['♪', '♫', '♬'][Math.floor(Math.random()*3)];
                this.noteColor = ['#22d3ee', '#fbbf24', '#a855f7'][Math.floor(Math.random()*3)];
            }
            update() { this.y -= this.speed; if(this.y < -50) this.init(); }
            draw() {
                ctx.fillStyle = this.type === 'note' ? this.noteColor : '#f97316';
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px serif`;
                ctx.fillText(this.type === 'note' ? this.char : '•', this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }
        for (let i = 0; i < 40; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
