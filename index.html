<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        .sidebar {
            position: relative;
            width: 100%; max-width: 480px; height: 100vh;
            padding: 2rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0) 100%);
            border-right: 1px solid rgba(34, 211, 238, 0.2);
            box-shadow: 10px 0 50px rgba(0,0,0,0.9);
        }

        /* EPIC AVATAR BAR */
        .avatar-bar { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; 
            margin-bottom: 20px; background: rgba(34, 211, 238, 0.05); 
            padding: 15px; border-radius: 1rem; border: 1px solid rgba(34, 211, 238, 0.1);
        }
        .avatar-option {
            height: 45px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 20px;
            background: rgba(0,0,0,0.5);
        }
        .avatar-option:hover { border-color: #fde68a; background: rgba(253, 230, 138, 0.1); }
        .avatar-option.active { border-color: #22d3ee; box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); background: rgba(34, 211, 238, 0.15); transform: translateY(-3px); }

        .name-input {
            background: rgba(0,0,0,0.8) !important;
            border: 1px solid rgba(34, 211, 238, 0.3) !important;
            text-align: center; font-weight: 900; color: #fde68a !important;
            letter-spacing: 2px; text-transform: uppercase; font-size: 11px !important;
            box-shadow: inset 0 0 10px rgba(34, 211, 238, 0.1);
        }

        /* EPIC MODULES */
        .glass-module {
            background: rgba(8, 8, 12, 0.9);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(34, 211, 238, 0.25);
            border-radius: 1.25rem; margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9), inset 0 0 1px rgba(255,255,255,0.1);
        }
        .module-header { padding: 1.25rem; display: flex; justify-content: space-between; cursor: pointer; border-bottom: 1px solid rgba(34, 211, 238, 0.1); }
        .module-content { padding: 1.5rem; transition: all 0.4s ease; max-height: 1200px; opacity: 1; }
        .module-collapsed .module-content { max-height: 0; padding: 0; opacity: 0; overflow: hidden; pointer-events: none; }

        .hub-title { 
            font-family: 'Cinzel', serif; letter-spacing: 0.2em; 
            background: linear-gradient(135deg, #fde68a 0%, #d97706 50%, #22d3ee 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-weight: 900; text-transform: uppercase;
            filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.3));
        }

        /* INPUTS & BUTTONS */
        input { background: rgba(0,0,0,0.9) !important; border: 1px solid rgba(34, 211, 238, 0.2) !important; color: #fff !important; padding: 14px !important; border-radius: 10px; width: 100%; margin-bottom: 12px; font-weight: 300; }
        input:focus { border-color: #22d3ee !important; box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); outline: none; }
        
        .btn-ui { 
            background: linear-gradient(135deg, #0e7490, #164e63) !important; 
            color: #22d3ee !important; border: 1px solid rgba(34, 211, 238, 0.5) !important;
            padding: 12px; border-radius: 10px; width: 100%; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 2px; font-size: 11px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .btn-ui:hover { background: #22d3ee !important; color: #000 !important; box-shadow: 0 0 20px rgba(34, 211, 238, 0.6); }

        /* SCROLLBAR */
        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: linear-gradient(#fde68a, #22d3ee); border-radius: 10px; }

        .delete-btn { color: #f87171; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; opacity: 0.3; }
        .delete-btn:hover { opacity: 1; transform: scale(1.3); filter: drop-shadow(0 0 5px red); }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <header class="mb-10 text-center">
            <h1 class="text-4xl hub-title">Siren's Sands</h1>
            <p class="text-cyan-400/60 text-[10px] tracking-[0.6em] uppercase mt-2 font-black">Tucker • Cooper • Burns</p>
            
            <div class="mt-8">
                <div class="avatar-bar" id="avatarBar">
                    <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐢')">🐢</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐺')">🐺</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🦉')">🦉</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '⚓')">⚓</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '📖')">📖</div>
                </div>
                <input id="userName" type="text" placeholder="CHOOSE YOUR NAME" class="name-input" oninput="saveLocalName(this.value)">
            </div>
        </header>

        <div id="marketMod" class="glass-module">
            <div class="module-header" onclick="toggle('marketMod')">
                <span class="text-orange-400 font-black text-xs uppercase tracking-widest">🛒 Market Provisions</span>
                <span onclick="triggerPurge(event)" class="text-[9px] text-red-500 font-black cursor-pointer hover:text-red-300">[PURGE]</span>
            </div>
            <div class="module-content">
                <div id="marketList" class="max-h-56 overflow-y-auto mb-4 space-y-2 pr-2"></div>
                <input id="mInput" type="text" placeholder="Identify provision..." onkeydown="if(event.key==='Enter') saveMarket()">
                <button onclick="saveMarket()" class="btn-ui">Add to Provisions</button>
            </div>
        </div>

        <div id="mealMod" class="glass-module">
            <div class="module-header" onclick="toggle('mealMod')">
                <span class="text-green-400 font-black text-xs uppercase tracking-widest">🍲 The Weekly Feasts</span>
            </div>
            <div class="module-content"><div id="mealGrid" class="text-xs space-y-3"></div></div>
        </div>

        <div id="logMod" class="glass-module">
            <div class="module-header" onclick="toggle('logMod')">
                <span class="text-cyan-400 font-black text-xs uppercase tracking-widest">📜 Family Chronicles</span>
            </div>
            <div class="module-content">
                <div id="notesLog" class="max-h-72 overflow-y-auto mb-4 space-y-4 pr-2"></div>
                <input id="nInput" type="text" placeholder="Speak, bard..." onkeydown="if(event.key==='Enter') saveNote()">
                <button onclick="saveNote()" class="btn-ui">Seal the Chronicle</button>
            </div>
        </div>

        <div id="calMod" class="glass-module">
            <div class="module-header" onclick="toggle('calMod')">
                <span class="text-cyan-200 font-black text-xs uppercase tracking-widest">📅 Family Schedule</span>
            </div>
            <div class="module-content"><div id="calendar" class="text-[10px]"></div></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱';

        function selectAvatar(el, icon) {
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            currentSigil = icon;
        }

        function saveLocalName(val) { localStorage.setItem('sands_name', val); }
        function getUserLabel() {
            const name = document.getElementById('userName').value.trim() || "Someone";
            return `${currentSigil} ${name}`;
        }

        function toggle(id) { document.getElementById(id).classList.toggle('module-collapsed'); }

        window.onload = () => { 
            const saved = localStorage.getItem('sands_name');
            if(saved) document.getElementById('userName').value = saved;
            refreshAll(); initCalendar(); animate(); 
        };

        async function initCalendar() {
            window.calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 'auto',
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date, color: 'rgba(34, 211, 238, 0.3)' })) : []);
                }
            });
            window.calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }

        async function saveMarket() {
            const i = document.getElementById('mInput'); if (!i.value) return;
            await _supabase.from('market_items').insert([{ text: `${getUserLabel()}: ${i.value}` }]);
            i.value = "";
        }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between items-center bg-white/[0.03] p-3 rounded-lg border border-white/5 group"><span>${item.text}</span><span class="delete-btn" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }

        async function saveNote() {
            const i = document.getElementById('nInput'); if (!i.value) return;
            const ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${getUserLabel()} • ${ts}` }]);
            i.value = "";
        }
        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `
                <div class="bg-white/[0.03] p-5 rounded-2xl border border-white/5 relative group transition-all hover:bg-white/[0.06]">
                    <small class="text-cyan-400 font-black text-[9px] block mb-2 uppercase tracking-widest">${n.timestamp}</small>
                    <p class="text-[15px] font-light leading-relaxed">${n.note}</p>
                    <span class="absolute top-4 right-4 delete-btn" onclick="deleteItem('family_notes', '${n.id}')">×</span>
                </div>`).join('') : '';
        }

        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); }
        async function triggerPurge(e) { e.stopPropagation(); if(confirm("Purge shopping list?")) { await _supabase.from('market_items').delete().neq('id', 0); refreshAll(); } }

        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `<div class="flex justify-between items-center bg-white/[0.02] p-3 rounded-xl border border-white/5"><span class="font-black text-green-400 text-[10px] uppercase tracking-tighter">${day}</span><input onchange="updateMeal('${day}', this.value)" value="${meal}" class="!bg-transparent !border-none !p-0 !m-0 !w-auto text-right text-cyan-400 font-black"></div>`;
            }).join('');
        }
        async function updateMeal(day, menu) { await _supabase.from('meal_plan').upsert({ day, menu }, { onConflict: 'day' }); }

        // --- PARTICLE ENGINE: RE-TUNED ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const glyphs = ['♪', '♫', '♩'];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = canvas.height + 20;
                this.isNote = Math.random() > 0.4; this.size = Math.random() * 8 + 3;
                this.speed = Math.random() * 0.9 + 0.4; // Slightly faster
                this.opacity = Math.random() * 0.4 + 0.1; this.color = this.isNote ? '34, 211, 238' : '251, 191, 36';
            }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 80) * 0.4; if (this.y < -30) this.reset(); }
            draw() {
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                if (this.isNote) { ctx.font = `${this.size}px Cinzel`; ctx.fillText(glyphs[Math.floor(Math.random()*3)], this.x, this.y); } 
                else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 5, 0, Math.PI * 2); ctx.fill(); }
            }
        }
        for (let i = 0; i < 40; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    </script>
</body>
</html>
