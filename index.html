<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tucker • Family Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;600;800&display=swap');
        
        :root { --sigil: #22d3ee; --gold: #fbbf24; --deep-glass: rgba(5, 5, 8, 0.96); }
        [data-theme="purple"] { --sigil: #a855f7; }
        [data-theme="red"] { --sigil: #ef4444; }
        [data-theme="green"] { --sigil: #10b981; }
        [data-theme="gold"] { --sigil: #fbbf24; }
        [data-theme="pink"] { --sigil: #f472b6; }
        [data-theme="orange"] { --sigil: #f97316; }
        [data-theme="silver"] { --sigil: #cbd5e1; }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* TITAN SCALE */
        body.large-mode .list-item, body.large-mode .note-text { font-size: 28px !important; }
        body.large-mode .expensive-header { font-size: 20px !important; }
        body.large-mode input { font-size: 24px !important; }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
        .hub-container { display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 10; background: transparent; }
        
        .hero-image { width: 100%; height: 40vh; background: #111 url('thefamilyhub.jpg') center center no-repeat; background-size: cover; border-bottom: 3px solid var(--sigil); box-shadow: 0 10px 50px #000; }
        .sidebar { width: 100%; padding: 3rem 2rem; background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, #000 30%); flex-grow: 1; }
        
        @media (min-width: 1024px) { 
            .hub-container { flex-direction: row; height: 100vh; overflow: hidden; } 
            .hero-image { width: 62%; height: 100vh; border-right: 3px solid var(--sigil); border-bottom: none; } 
            .sidebar { max-width: 550px; height: 100vh; overflow-y: auto; scrollbar-width: none; } 
        }

        .oracle-row { display: flex; justify-content: space-around; align-items: center; padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 2rem; color: var(--gold); font-weight: 900; font-size: 14px; letter-spacing: 3px; font-family: 'Cinzel'; }
        .glass-module { background: var(--deep-glass); backdrop-filter: blur(60px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; margin-bottom: 2.5rem; overflow: hidden; }
        
        .expensive-header { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.3em; font-weight: 900; text-transform: uppercase; padding: 1.8rem; background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; }

        /* IDENTITY VAULT */
        .avatar-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .avatar-option { height: 55px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; background: rgba(255,255,255,0.02); transition: 0.3s; }
        .avatar-option.active { border-color: var(--sigil); box-shadow: 0 0 30px var(--sigil); transform: scale(1.1); background: rgba(34, 211, 238, 0.1); }
        .vibe-bar { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; padding: 0 20px 20px 20px; }
        .theme-dot { height: 26px; width: 26px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: 0.2s; }

        /* INTERFACE */
        input { background: #000 !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; color: #fff !important; padding: 22px !important; border-radius: 15px; font-weight: 700; width: 100%; outline: none; margin-top: 15px; }
        .list-item { font-size: 20px; font-weight: 700; padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
        
        .quest-banner { background: linear-gradient(to right, rgba(34, 211, 238, 0.15), transparent); border-left: 6px solid var(--sigil); padding: 1.5rem; margin: 1.5rem; border-radius: 0 1rem 1rem 0; font-size: 16px; font-weight: 800; }
        .cal-date { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 900; border: 1px solid rgba(255,255,255,0.02); cursor: pointer; transition: 0.2s; }
        .cal-today { border: 2px solid var(--gold) !important; color: var(--gold); background: rgba(251, 191, 36, 0.1); border-radius: 10px; }
        .has-quest { border: 1.5px solid var(--sigil) !important; box-shadow: inset 0 0 12px var(--sigil); color: var(--sigil); }

        .note-card { border-left: 5px solid var(--sigil); padding: 1.8rem; background: rgba(255,255,255,0.03); margin-bottom: 2rem; border-radius: 0 1.5rem 1.5rem 0; }
        .note-img { width: 100%; border-radius: 1.2rem; margin-top: 1.5rem; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        .action-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px 20px; border-radius: 12px; font-size: 12px; font-weight: 900; color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
        .listening { background: #ef4444 !important; border-color: #ef4444 !important; animation: pulse 1.5s infinite; }
        .nav-arrow { -webkit-text-fill-color: #fff; cursor: pointer; font-size: 20px; padding: 0 15px; }

        #questModal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.98); backdrop-filter: blur(40px); align-items: center; justify-content: center; }
        .modal-glass { background: #000; border: 1px solid var(--gold); padding: 3.5rem; border-radius: 2.5rem; width: 90%; max-width: 500px; text-align: center; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body id="mainBody">

    <div id="questModal">
        <div class="modal-glass">
            <h2 id="modalDateTitle" class="text-4xl font-black mb-10 uppercase text-white font-serif"></h2>
            <div id="modalEventList" class="space-y-5 mb-10 text-left max-h-72 overflow-y-auto pr-4 text-white"></div>
            <input id="modalInput" class="w-full bg-white text-black p-5 rounded-xl outline-none" type="text" placeholder="Quest detail...">
            <div class="flex gap-4 mt-8">
                <button onclick="closeQuestModal()" class="w-full py-5 border border-white/20 uppercase text-xs font-black rounded-2xl">Close</button>
                <button id="addQuestBtn" class="w-full py-5 bg-white/10 border border-white/30 uppercase text-xs font-black rounded-2xl">Assign</button>
            </div>
        </div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div class="hub-container">
        <div class="hero-image"></div>
        <div class="sidebar">
            <header class="text-center mb-12">
                <h1 class="text-7xl font-black tracking-[0.25em]" style="background: linear-gradient(to right, var(--gold), var(--sigil)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Cinzel';">TUCKER</h1>
                <div class="oracle-row">
                    <span id="clock">00:00</span>
                    <span>FARMINGTON: 52°F</span>
                    <button id="sizeToggle" class="px-3 border border-white/20 rounded font-black text-[10px]">AA</button>
                </div>

                <div class="glass-module">
                    <div class="avatar-bar">
                        <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🐢')">🐢</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🐺')">🐺</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🦉')">🦉</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '⚓')">⚓</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '📖')">📖</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🥥')">🥥</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🌴')">🌴</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🐬')">🐬</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🦀')">🦀</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🎸')">🎸</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🏹')">🏹</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '⚔️')">⚔️</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🍄')">🍄</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '💎')">💎</div>
                        <div class="avatar-option" onclick="selectAvatar(this, '🍺')">🍺</div>
                    </div>
                    <div class="vibe-bar">
                        <div class="theme-dot bg-cyan-400" onclick="setTheme('')"></div>
                        <div class="theme-dot bg-purple-600" onclick="setTheme('purple')"></div>
                        <div class="theme-dot bg-red-600" onclick="setTheme('red')"></div>
                        <div class="theme-dot bg-emerald-500" onclick="setTheme('green')"></div>
                        <div class="theme-dot bg-yellow-500" onclick="setTheme('gold')"></div>
                        <div class="theme-dot bg-pink-400" onclick="setTheme('pink')"></div>
                        <div class="theme-dot bg-orange-500" onclick="setTheme('orange')"></div>
                        <div class="theme-dot bg-slate-400" onclick="setTheme('silver')"></div>
                    </div>
                </div>
                <input id="userName" type="text" placeholder="COMMANDER NAME" class="text-center tracking-widest font-black uppercase">
            </header>

            <div class="glass-module">
                <div class="expensive-header">
                    <span class="nav-arrow" onclick="changeMonth(-1)">◀</span>
                    <span id="calMonthDisplay">MONTH</span>
                    <span class="nav-arrow" onclick="changeMonth(1)">▶</span>
                </div>
                <div id="calContent">
                    <div id="activeQuestBanner" class="quest-banner">Updating Oracle...</div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 p-6 text-white text-xs"></div>
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('mealContent')"><span>Meal Plan</span><span>↕</span></div>
                <div id="mealContent" class="p-8">
                    <div id="mealList" class="mb-4"></div>
                    <input id="mealInput" type="text" placeholder="Tonight's feast..." onkeydown="if(event.key==='Enter') saveItem('meal_plan', 'mealInput')">
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('noteContent')"><span>The Chronicler</span><span>↕</span></div>
                <div id="noteContent" class="p-8">
                    <div id="notesLog" class="space-y-6 mb-8 text-white"></div>
                    <input id="nInput" type="text" placeholder="Tell a story..." onkeydown="if(event.key==='Enter') saveNote()">
                    <div class="flex gap-3 mt-5">
                        <button id="voiceBtn" class="action-btn" onclick="startVoice()">🎤 SPEAK</button>
                        <button class="action-btn" id="photoBtn" onclick="document.getElementById('imgUpload').click()">📷 PHOTO</button>
                        <input type="file" id="imgUpload" class="hidden" accept="image/*" onchange="uploadAndSave(this)">
                    </div>
                </div>
            </div>

            <div class="glass-module">
                <div class="expensive-header" onclick="toggleModule('marketContent')"><span>Provisions</span><span>↕</span></div>
                <div id="marketContent" class="p-8">
                    <div id="marketList" class="mb-4 text-white"></div>
                    <input id="mInput" type="text" placeholder="Add grocery..." onkeydown="if(event.key==='Enter') saveItem('market_items', 'mInput')">
                    <button onclick="purgeTable('market_items')" class="w-full mt-8 border border-red-500/40 py-4 rounded-xl text-[10px] font-black text-red-500 uppercase bg-red-500/5">Purge Provisions</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', dispDate = new Date();

        window.onload = () => { 
            const savedName = localStorage.getItem('hubCommanderName');
            if (savedName) document.getElementById('userName').value = savedName;
            if (localStorage.getItem('hubLargeMode') === 'true') document.body.classList.add('large-mode');
            refreshAll(); buildCalendar(); animate(); updateTodayBanner();
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }, 1000); 
        };

        function selectAvatar(el, icon) { document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active')); el.classList.add('active'); currentSigil = icon; }
        function setTheme(t) { document.body.setAttribute('data-theme', t); }
        function toggleModule(id) { const e = document.getElementById(id); e.style.display = e.style.display === 'none' ? 'block' : 'none'; }
        function closeQuestModal() { document.getElementById('questModal').style.display = 'none'; }
        function changeMonth(o) { dispDate.setMonth(dispDate.getMonth() + o); buildCalendar(); }
        
        document.getElementById('userName').oninput = (e) => { localStorage.setItem('hubCommanderName', e.target.value); };
        document.getElementById('sizeToggle').onclick = () => {
            const active = document.body.classList.toggle('large-mode');
            localStorage.setItem('hubLargeMode', active);
        };

        async function updateTodayBanner() {
            const t = new Date(), ds = `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`;
            const { data } = await _supabase.from('calendar_events').select('title').eq('start_date', ds);
            document.getElementById('activeQuestBanner').innerText = data?.length ? data.map(e => e.title).join(' • ') : "No active quests.";
        }

        async function refreshAll() { loadList('market_items', 'marketList'); loadList('meal_plan', 'mealList'); loadNotes(); }
        
        async function saveItem(table, inputId) {
            const i = document.getElementById(inputId); if(!i.value) return;
            const name = document.getElementById('userName').value || 'Tucker';
            await _supabase.from(table).insert([{ text: `${currentSigil} ${name}: ${i.value}` }]);
            i.value = ""; refreshAll();
        }

        async function uploadAndSave(input) {
            const file = input.files[0]; if (!file) return;
            const btn = document.getElementById('photoBtn'); btn.innerText = "⏳...";
            const path = `note-images/${Date.now()}-${file.name}`;
            await _supabase.storage.from('note-images').upload(path, file);
            const { data: { publicUrl } } = _supabase.storage.from('note-images').getPublicUrl(path);
            const name = document.getElementById('userName').value || 'Tucker';
            await _supabase.from('family_notes').insert([{ note: "", image_url: publicUrl, timestamp: `${currentSigil} ${name} • ${new Date().toLocaleDateString()}` }]);
            btn.innerText = "📷 PHOTO"; loadNotes();
        }

        async function saveNote() {
            const i = document.getElementById('nInput'); if(!i.value) return;
            const name = document.getElementById('userName').value || 'Tucker';
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${currentSigil} ${name} • ${new Date().toLocaleDateString()}` }]);
            i.value = ""; loadNotes();
        }

        async function loadList(table, divId) {
            const { data } = await _supabase.from(table).select('*').order('created_at', { ascending: true });
            document.getElementById(divId).innerHTML = data?.length ? data.map(item => `<div class="list-item"><span>${item.text}</span><span class="text-red-900 font-black cursor-pointer px-4" onclick="deleteItem('${table}', '${item.id}')">×</span></div>`).join('') : '<div class="opacity-20 italic text-xs">Empty.</div>';
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `<div class="note-card"><div class="flex justify-between items-start mb-2"><small class="opacity-40 uppercase font-black text-[10px]">${n.timestamp}</small><span class="text-red-900 font-black cursor-pointer text-[10px]" onclick="deleteItem('family_notes', '${n.id}')">DELETE</span></div>${n.note ? `<p class="font-semibold text-xl leading-relaxed">"${n.note}"</p>` : ''}${n.image_url ? `<img src="${n.image_url}" class="note-img">` : ''}</div>`).join('') : '';
        }

        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); if(table === 'calendar_events') { buildCalendar(); updateTodayBanner(); } }
        async function purgeTable(table) { if(confirm("Purge list?")) { await _supabase.from(table).delete().neq('id', 0); refreshAll(); } }

        async function buildCalendar() {
            const y = dispDate.getFullYear(), m = dispDate.getMonth();
            document.getElementById('calMonthDisplay').innerText = dispDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const { data: appts } = await _supabase.from('calendar_events').select('*');
            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasA = appts?.some(e => e.start_date === ds);
                const isT = (d === new Date().getDate() && m === new Date().getMonth());
                grid.innerHTML += `<div class="cal-date ${isT ? 'cal-today' : ''} ${hasA ? 'has-quest' : ''}" onclick="openQuest('${ds}', ${d})">${d}</div>`;
            }
        }

        async function openQuest(ds, d) {
            document.getElementById('modalDateTitle').innerText = `${d}`;
            document.getElementById('questModal').style.display = 'flex';
            const { data: evs } = await _supabase.from('calendar_events').select('*').eq('start_date', ds);
            document.getElementById('modalEventList').innerHTML = evs?.length ? evs.map(e => `<div class="flex justify-between items-center p-4 bg-white/5 rounded-xl border border-white/10 text-white"><span>${e.title}</span><span class="text-red-500 font-black cursor-pointer" onclick="deleteItem('calendar_events', '${e.id}'); openQuest('${ds}', ${d});">×</span></div>`) : '<p class="opacity-30 italic text-white text-center">No assignments.</p>';
            document.getElementById('addQuestBtn').onclick = async () => {
                const v = document.getElementById('modalInput').value; if(!v) return;
                const name = document.getElementById('userName').value || 'Tucker';
                await _supabase.from('calendar_events').insert([{ title: `${currentSigil} ${name}: ${v}`, start_date: ds }]);
                document.getElementById('modalInput').value = ""; await buildCalendar(); updateTodayBanner(); openQuest(ds, d);
            };
        }

        function startVoice() {
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            r.lang = 'en-US'; r.start();
            document.getElementById('voiceBtn').classList.add('listening');
            r.onresult = (e) => { document.getElementById('nInput').value = e.results[0][0].transcript; document.getElementById('voiceBtn').classList.remove('listening'); };
            r.onerror = () => { document.getElementById('voiceBtn').classList.remove('listening'); };
        }

        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.init(); }
            init() { 
                this.x = Math.random() * canvas.width; this.y = canvas.height + 50; 
                this.size = Math.random() * 35 + 10; this.speed = Math.random() * 1.5 + 0.5; 
                this.opacity = Math.random() * 0.4 + 0.1; this.isEmber = Math.random() > 0.6; 
                this.char = this.isEmber ? '•' : '♪'; 
            }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 50) * 0.8; if (this.y < -50) this.init(); }
            draw() { 
                ctx.fillStyle = this.isEmber ? '#f97316' : getComputedStyle(document.documentElement).getPropertyValue('--sigil').trim(); 
                ctx.globalAlpha = this.opacity; ctx.font = `${this.size}px serif`; ctx.fillText(this.char, this.x, this.y); 
            }
        }
        for (let i = 0; i < 50; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
