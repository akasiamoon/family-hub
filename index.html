<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cottage Hub • Farmington</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #0a0a0c; color: white; font-family: sans-serif; overflow-x: hidden; }
        
        /* THE IMAGE LAYER - Forced priority */
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            background: #0d0d12 url('thefamilyhub.jpg') no-repeat center center fixed;
            background-size: cover;
            filter: brightness(40%);
        }

        #music-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .glass-module {
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 1rem;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .module-content { transition: max-height 0.3s ease; max-height: 800px; padding: 1.25rem; }
        .module-collapsed .module-content { max-height: 0; padding: 0; opacity: 0; pointer-events: none; }

        .hub-title { letter-spacing: 0.2em; font-weight: 900; color: #22d3ee; text-transform: uppercase; }
        .custom-scroll { overflow-y: auto; scrollbar-width: thin; }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <canvas id="music-canvas"></canvas>

    <div class="container mx-auto p-4">
        <header class="mb-6 flex justify-between items-center border-b border-white/10 pb-4">
            <div>
                <h1 class="text-2xl hub-title">Cottage Hub</h1>
                <p class="text-xs text-cyan-400/50">Farmington • System Live</p>
            </div>
            <div id="clock" class="text-cyan-300 font-mono text-lg">00:00:00</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div id="marketMod" class="glass-module">
                <div class="flex justify-between p-3 bg-white/5 cursor-pointer" onclick="toggle('marketMod')">
                    <span class="text-xs font-bold uppercase">🛒 Market</span>
                    <span class="text-[10px] opacity-50">EXPAND/HIDE</span>
                </div>
                <div class="module-content">
                    <div id="marketList" class="h-40 overflow-y-auto mb-4 custom-scroll"></div>
                    <div class="flex gap-2">
                        <input id="mInput" type="text" placeholder="Add..." class="bg-black/40 border border-white/20 p-2 w-full rounded text-sm outline-none">
                        <button onclick="saveMarket()" class="bg-cyan-500/20 px-4 rounded border border-cyan-500/40">+</button>
                    </div>
                </div>
            </div>

            <div id="mealMod" class="glass-module">
                <div class="flex justify-between p-3 bg-white/5 cursor-pointer" onclick="toggle('mealMod')">
                    <span class="text-xs font-bold uppercase">🍲 Meals</span>
                    <span class="text-[10px] opacity-50">EXPAND/HIDE</span>
                </div>
                <div class="module-content">
                    <div id="mealGrid" class="text-xs space-y-2"></div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div id="logMod" class="glass-module">
                    <div class="flex justify-between p-3 bg-white/5 cursor-pointer" onclick="toggle('logMod')">
                        <span class="text-xs font-bold uppercase">📜 Log</span>
                        <span class="text-[10px] opacity-50">EXPAND/HIDE</span>
                    </div>
                    <div class="module-content">
                        <div id="notesLog" class="h-60 overflow-y-auto mb-4 custom-scroll"></div>
                        <div class="flex flex-col gap-2">
                            <input id="nInput" type="text" placeholder="Note..." class="bg-black/40 border border-white/20 p-2 w-full rounded text-sm outline-none">
                            <button onclick="saveNote()" class="bg-cyan-500/20 py-2 rounded font-bold border border-cyan-500/40">POST</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="calMod" class="glass-module">
                    <div class="flex justify-between p-3 bg-white/5 cursor-pointer" onclick="toggle('calMod')">
                        <span class="text-xs font-bold uppercase">📅 Schedule</span>
                        <span class="text-[10px] opacity-50">EXPAND/HIDE</span>
                    </div>
                    <div class="module-content">
                        <div id="calendar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggle(id) { document.getElementById(id).classList.toggle('module-collapsed'); }
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
        setInterval(updateClock, 1000);

        window.onload = () => {
            updateClock();
            try {
                refreshAll();
                initCalendar();
            } catch(e) { console.warn("Init error: ", e); }

            _supabase.channel('db').on('postgres_changes', {event:'*', schema:'public'}, () => {
                refreshAll();
                if(window.calendar) window.calendar.refetchEvents();
            }).subscribe();
        };

        async function initCalendar() {
            const calEl = document.getElementById('calendar');
            window.calendar = new FullCalendar.Calendar(calEl, {
                initialView: 'dayGridMonth', height: 'auto',
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date, color: '#0e7490' })) : []);
                }
            });
            window.calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }
        async function saveNote() {
            const i = document.getElementById('nInput');
            if (!i.value) return;
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: new Date().toLocaleTimeString() }]);
            i.value = "";
        }
        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `<div class="bg-white/5 p-2 mb-2 rounded border border-white/5 text-sm">${n.note}</div>`).join('') : '';
        }
        async function saveMarket() {
            const i = document.getElementById('mInput');
            if (i.value) await _supabase.from('market_items').insert([{ text: i.value }]);
            i.value = "";
        }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*');
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="text-xs p-2 border-b border-white/5">🔘 ${item.text}</div>`).join('') : '';
        }
        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `<div class="flex justify-between p-1 border-b border-white/5"><span>${day}</span><span class="text-cyan-400">${meal}</span></div>`;
            }).join('');
        }

        // --- MUSIC NOTES ENGINE ---
        const canvas = document.getElementById('music-canvas');
        const ctx = canvas.getContext('2d');
        let notes = [];
        const glyphs = ['♪', '♫', '♩'];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Note {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = canvas.height + 20; this.text = glyphs[Math.floor(Math.random() * glyphs.length)]; this.speed = Math.random() * 0.4 + 0.1; this.opacity = Math.random() * 0.3 + 0.1; }
            update() { this.y -= this.speed; if (this.y < -20) this.reset(); }
            draw() { ctx.fillStyle = `rgba(34, 211, 238, ${this.opacity})`; ctx.fillText(this.text, this.x, this.y); }
        }
        for (let i = 0; i < 12; i++) notes.push(new Note());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); notes.forEach(n => { n.update(); n.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
