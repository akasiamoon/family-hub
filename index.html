<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@200;300;400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        .sidebar {
            position: relative;
            width: 100%; max-width: 480px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.85) 85%, rgba(0,0,0,0) 100%);
            border-right: 2px solid var(--sigil-color, #22d3ee);
            transition: all 0.8s ease;
        }

        /* GRADIENT BOX HEADERS */
        .expensive-header {
            font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.35em; font-weight: 900; text-transform: uppercase;
            padding: 1.25rem; 
            background: linear-gradient(to right, #fbbf24, #22d3ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(to right, #fbbf24, #22d3ee) 1;
            filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.4));
            display: flex; justify-content: space-between; align-items: center;
        }

        .hub-title { 
            font-family: 'Cinzel', serif; letter-spacing: 0.25em; 
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 50%, #22d3ee 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-weight: 900; text-transform: uppercase;
        }

        /* OBSIDIAN INPUTS (No White) */
        input {
            background: rgba(0, 0, 0, 0.7) !important;
            border: 1px solid rgba(34, 211, 238, 0.2) !important;
            color: #fff !important;
            padding: 14px !important;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            font-weight: 300;
        }
        input:focus {
            border-color: #22d3ee !important;
            background: rgba(0, 0, 0, 0.9) !important;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
            outline: none;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.3); font-style: italic; }

        .glass-module {
            background: rgba(8, 8, 12, 0.95); backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem; margin-bottom: 2.5rem; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }

        .cal-date { 
            aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 700; border-radius: 6px; 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.2s ease; cursor: pointer; position: relative; 
        }
        .cal-date.has-quest { border-color: #22d3ee !important; box-shadow: inset 0 0 10px rgba(34, 211, 238, 0.2); }
        .cal-today { color: #fbbf24; border: 2px solid #fbbf24 !important; font-weight: 900; }
        
        .archive-btn { font-size: 8px; color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); padding: 3px 12px; border-radius: 20px; cursor: pointer; letter-spacing: 1px; font-weight: 900; }
        .archive-btn.active { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; }

        .focus-banner {
            background: linear-gradient(45deg, rgba(251, 191, 36, 0.1), rgba(34, 211, 238, 0.05));
            border: 1px solid rgba(34, 211, 238, 0.3); border-radius: 1rem; padding: 1.5rem; margin-top: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="questModal" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl flex items-center justify-center">
        <div class="bg-black/95 border-2 border-cyan-500/50 p-10 rounded-xl w-90 max-w-[420px]">
            <h2 id="modalDateTitle" class="hub-title text-xl mb-8 text-center"></h2>
            <div id="modalEventList" class="space-y-4 mb-8 max-h-48 overflow-y-auto pr-2"></div>
            <input id="modalInput" type="text" placeholder="Assign New Appointment...">
            <div class="flex gap-4 mt-4">
                <button onclick="closeQuestModal()" class="w-full py-3 border border-white/20 text-[10px] uppercase font-bold tracking-widest text-white">Close</button>
                <button id="addQuestBtn" class="w-full py-3 bg-cyan-500/20 border border-cyan-500 text-cyan-400 text-[10px] uppercase font-bold tracking-widest">Assign</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <header class="mb-12 text-center">
            <h1 class="text-3xl hub-title">Tucker Cooper Burns</h1>
            <p class="text-cyan-400 text-[10px] tracking-[0.8em] uppercase mt-1 font-black">Family Hub</p>
            <div id="heartCount" class="heart-counter font-black text-[10px] text-red-500 mt-2 tracking-widest">❤️ 0 ARCHIVED HEARTS</div>
            
            <div class="mt-10">
                <div class="avatar-bar grid grid-cols-5 gap-2 p-3 bg-white/5 rounded-xl border border-white/10">
                    <div class="avatar-option active cursor-pointer p-2 border border-white/10 rounded-lg bg-black/40 text-center text-xl" data-color="#22d3ee" onclick="selectAvatar(this, '🔱')">🔱</div>
                    <div class="avatar-option cursor-pointer p-2 border border-white/10 rounded-lg bg-black/40 text-center text-xl" data-color="#f87171" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                    <div class="avatar-option cursor-pointer p-2 border border-white/10 rounded-lg bg-black/40 text-center text-xl" data-color="#cbd5e1" onclick="selectAvatar(this, '🐚')">🐚</div>
                    <div class="avatar-option cursor-pointer p-2 border border-white/10 rounded-lg bg-black/40 text-center text-xl" data-color="#ef4444" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                    <div class="avatar-option cursor-pointer p-2 border border-white/10 rounded-lg bg-black/40 text-center text-xl" data-color="#f97316" onclick="selectAvatar(this, '🔥')">🔥</div>
                    <div class="avatar-option cursor-pointer p-2 border border-white/10 rounded-lg bg-black/40 text-center text-xl" data-color="#4ade80" onclick="selectAvatar(this, '🐢')">🐢</div>
                    <div class="avatar-option cursor-pointer p-2 border border-white/10 rounded-lg bg-black/40 text-center text-xl" data-color="#94a3b8" onclick="selectAvatar(this, '🐺')">🐺</div>
                    <div class="avatar-option cursor-pointer p-2 border border-white/10 rounded-lg bg-black/40 text-center text-xl" data-color="#fbbf24" onclick="selectAvatar(this, '🦉')">🦉</div>
                    <div class="avatar-option cursor-pointer p-2 border border-white/10 rounded-lg bg-black/40 text-center text-xl" data-color="#38bdf8" onclick="selectAvatar(this, '⚓')">⚓</div>
                    <div class="avatar-option cursor-pointer p-2 border border-white/10 rounded-lg bg-black/40 text-center text-xl" data-color="#a78bfa" onclick="selectAvatar(this, '📖')">📖</div>
                </div>
                <input id="userName" type="text" placeholder="IDENTIFY" class="name-input w-full mt-4">
            </div>
        </header>

        <div class="glass-module">
            <div class="expensive-header"><span>Grocery List</span></div>
            <div class="p-6">
                <div id="marketList" class="space-y-3 mb-6"></div>
                <input id="mInput" type="text" placeholder="Add provision..." onkeydown="if(event.key==='Enter') saveMarket()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header">
                <span>Love Notes</span>
                <span id="archiveToggle" class="archive-btn" onclick="toggleArchive()">Archive of Hearts</span>
            </div>
            <div class="p-6">
                <div id="notesLog" class="space-y-8 mb-6"></div>
                <input id="nInput" type="text" placeholder="Speak your heart..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header">
                <span onclick="changeMonth(-1)" class="cursor-pointer hover:text-white">◀</span>
                <span id="calMonth"></span>
                <span onclick="changeMonth(1)" class="cursor-pointer hover:text-white">▶</span>
            </div>
            <div class="calendar-container">
                <div id="calendarDates" class="calendar-grid"></div>
            </div>
        </div>

        <div class="focus-banner">
            <small class="text-[9px] text-[#fbbf24] uppercase tracking-[5px] font-black block mb-2">Upcoming Quest</small>
            <div id="nextQuestDisplay" class="text-white font-light italic text-[14px]">Consulting the oracle...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', displayedDate = new Date(), favoritesOnly = false;

        function selectAvatar(el, icon) { 
            document.querySelectorAll('.avatar-option').forEach(opt => opt.style.borderColor = 'rgba(255,255,255,0.1)');
            el.style.borderColor = el.getAttribute('data-color');
            currentSigil = icon;
            document.documentElement.style.setProperty('--sigil-color', el.getAttribute('data-color'));
        }

        function toggleArchive() { favoritesOnly = !favoritesOnly; document.getElementById('archiveToggle').classList.toggle('active'); loadNotes(); }
        window.onload = () => { if(localStorage.getItem('sands_name')) document.getElementById('userName').value = localStorage.getItem('sands_name'); refreshAll(); buildCalendar(); animate(); };

        async function buildCalendar() {
            const y = displayedDate.getFullYear(), m = displayedDate.getMonth(), today = new Date();
            document.getElementById('calMonth').innerText = displayedDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            const grid = document.getElementById('calendarDates'); grid.innerHTML = '';
            const { data: appts } = await _supabase.from('calendar_events').select('*');
            const { data: pinned } = await _supabase.from('family_notes').select('*').eq('is_pinned', true);
            const upcoming = appts?.filter(a => new Date(a.start_date) >= today).sort((a,b) => new Date(a.start_date) - new Date(b.start_date))[0];
            document.getElementById('nextQuestDisplay').innerText = upcoming ? `${upcoming.title} • ${new Date(upcoming.start_date).toLocaleDateString()}` : "No active quests.";
            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasA = appts?.some(e => e.start_date === ds);
                const hasH = pinned?.some(n => n.post_date === ds);
                let ist = (d === today.getDate() && m === today.getMonth() && y === today.getFullYear()) ? 'cal-today' : '';
                grid.innerHTML += `<div class="cal-date ${ist} ${hasA ? 'has-quest' : ''}" onclick="openQuestModal('${ds}', ${d})">${d}${hasH ? '<span class="absolute bottom-1">❤️</span>' : ''}</div>`;
            }
        }

        async function openQuestModal(ds, d) {
            document.getElementById('modalDateTitle').innerText = `${d} ${displayedDate.toLocaleString('default', { month: 'long' })}`;
            document.getElementById('questModal').classList.remove('hidden');
            const { data: evs } = await _supabase.from('calendar_events').select('*').eq('start_date', ds);
            document.getElementById('modalEventList').innerHTML = evs?.length ? evs.map(e => `<div class="bg-white/5 p-4 rounded flex justify-between border border-white/5"><span>${e.title}</span><span class="text-red-600 font-bold cursor-pointer" onclick="deleteItem('calendar_events', '${e.id}'); openQuestModal('${ds}', ${d}); buildCalendar();">×</span></div>`).join('') : '<p class="opacity-30 text-center italic text-xs">No assignments.</p>';
            document.getElementById('addQuestBtn').onclick = async () => {
                const v = document.getElementById('modalInput').value; if(!v) return;
                await _supabase.from('calendar_events').insert([{ title: v, start_date: ds }]);
                document.getElementById('modalInput').value = ""; openQuestModal(ds, d); buildCalendar();
            };
        }
        function closeQuestModal() { document.getElementById('questModal').classList.add('hidden'); }
        function changeMonth(offset) { displayedDate.setMonth(displayedDate.getMonth() + offset); buildCalendar(); }

        function getUser() { return `${currentSigil} ${document.getElementById('userName').value || 'Someone'}`; }
        async function refreshAll() { loadNotes(); loadMarket(); }
        async function saveMarket() { const i = document.getElementById('mInput'); if(i.value) await _supabase.from('market_items').insert([{ text: `${getUser()} • ${i.value}` }]); i.value = ""; refreshAll(); }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between items-center text-[13px] font-light border-b border-white/5 pb-2"><span>${item.text}</span><span class="cursor-pointer text-red-900 font-bold" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }
        async function saveNote() { 
            const i = document.getElementById('nInput'); if(i.value) {
                const now = new Date(), dk = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
                await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${getUser()} • ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`, is_pinned: false, post_date: dk }]); 
                triggerSparkles();
            }
            i.value = ""; refreshAll(); buildCalendar();
        }
        async function loadNotes() {
            let { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            if(!data) return;
            document.getElementById('heartCount').innerText = `❤️ ${data.length} ARCHIVED HEARTS`;
            if(favoritesOnly) data = data.filter(n => n.is_pinned);
            const rN = (n) => `<div class="group"><div class="flex justify-between items-center mb-1"><small class="text-cyan-400 font-black text-[9px] uppercase tracking-widest">${n.timestamp}</small><div class="flex gap-4"><span class="cursor-pointer ${n.is_pinned ? 'text-red-500' : 'opacity-20'}" onclick="togglePin('${n.id}', ${n.is_pinned})">❤️</span><span class="text-red-900 opacity-0 group-hover:opacity-100 cursor-pointer font-bold" onclick="deleteItem('family_notes', '${n.id}')">×</span></div></div>${n.is_pinned ? '<span class="text-[8px] bg-red-500/10 text-red-500 px-3 py-1 rounded-full mb-2 inline-block font-black tracking-widest">❤️ PINNED ❤️</span>' : ''}<p class="text-[16px] font-light italic text-white/95 leading-relaxed">"${n.note}"</p></div>`;
            document.getElementById('notesLog').innerHTML = data.map(rN).join('');
        }
        async function togglePin(id, s) { await _supabase.from('family_notes').update({ is_pinned: !s }).eq('id', id); refreshAll(); buildCalendar(); }
        async function deleteItem(t, id) { await _supabase.from(t).delete().eq('id', id); refreshAll(); buildCalendar(); }

        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; this.isNote = Math.random() > 0.4; this.size = Math.random() * 30 + 15; this.speed = Math.random() * 1.5 + 0.5; this.opacity = Math.random() * 0.4 + 0.1; this.color = this.isNote ? '34, 211, 238' : '251, 191, 36'; }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 60) * 1; if (this.y < -50) this.reset(); }
            draw() { ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`; if (this.isNote) { ctx.font = `${this.size}px Cinzel`; ctx.fillText('♪', this.x, this.y); } else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 4, 0, Math.PI * 2); ctx.fill(); } }
        }
        class SpecialParticle {
            constructor(isHeart) { this.x = Math.random() * 400; this.y = canvas.height * 0.6; this.isHeart = isHeart; this.size = Math.random() * 20 + 10; this.speedX = (Math.random() - 0.5) * 4; this.speedY = -Math.random() * 5 - 2; this.opacity = 1; this.life = 100; }
            update() { this.x += this.speedX; this.y += this.speedY; this.opacity -= 0.01; this.life--; }
            draw() { if(this.opacity <= 0) return; ctx.fillStyle = this.isHeart ? `rgba(239, 68, 68, ${this.opacity})` : `rgba(251, 191, 36, ${this.opacity})`; ctx.font = `${this.size}px serif`; ctx.fillText(this.isHeart ? '❤️' : '✨', this.x, this.y); }
        }
        function triggerSparkles() { for (let i = 0; i < 20; i++) { particles.push(new SpecialParticle(true)); particles.push(new SpecialParticle(false)); } }
        for (let i = 0; i < 35; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles = particles.filter(p => p.life === undefined || p.life > 0); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
