    <title>Cottage Hub • Farmington</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #050505; color: white; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Fixed Background - Using your GitHub Asset Link */
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; 
            background: #0d0d12 url('https://github.com/user-attachments/assets/37b40bf2-708b-449d-a1a5-1472af929dc5') no-repeat center center fixed; 
            background-size: cover;
            transition: filter 1s ease-in-out;
        }

        /* Deep Glassmorphism */
        .glass {
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(34, 211, 238, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9), 
                        inset 0 0 15px rgba(34, 211, 238, 0.1);
            border-radius: 2.5rem;
        }

        /* RPG Neon Branding */
        .hub-title {
            text-transform: uppercase;
            letter-spacing: 0.5em;
            background: linear-gradient(to right, #fde68a, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.4));
        }

        .clock-glow {
            color: #22d3ee;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.6);
            font-family: monospace;
            letter-spacing: 0.1em;
        }

        .custom-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #22d3ee rgba(0,0,0,0.1); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
