<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        .sidebar {
            position: relative;
            width: 100%; max-width: 480px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0) 100%);
            border-right: 1px solid rgba(34, 211, 238, 0.3);
        }

        /* 20-AVATAR GALLERY */
        .avatar-bar { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            margin-bottom: 15px; background: rgba(34, 211, 238, 0.05); 
            padding: 12px; border-radius: 1rem; border: 1px solid rgba(34, 211, 238, 0.1);
        }
        .avatar-option {
            height: 40px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 20px;
            background: rgba(0,0,0,0.5); filter: grayscale(100%); opacity: 0.5;
        }
        .avatar-option.active { border-color: #22d3ee; filter: grayscale(0%); opacity: 1; box-shadow: 0 0 15px rgba(34, 211, 238, 0.4); transform: scale(1.1); }

        .name-input {
            background: rgba(0,0,0,0.8) !important; border: 1px solid rgba(34, 211, 238, 0.3) !important;
            text-align: center; font-weight: 900; color: #fde68a !important;
            letter-spacing: 2px; text-transform: uppercase; font-size: 11px !important;
        }

        /* EPIC GLASS MODULES */
        .glass-module {
            background: rgba(8, 8, 12, 0.9); backdrop-filter: blur(30px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 1.25rem; margin-bottom: 2rem;
            transition: all 0.4s ease;
        }
        .glass-module:hover { border-color: rgba(34, 211, 238, 0.6); box-shadow: 0 0 30px rgba(34, 211, 238, 0.1); }

        .hub-title { font-family: 'Cinzel', serif; letter-spacing: 0.2em; background: linear-gradient(135deg, #fde68a, #d97706, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; text-transform: uppercase; }
        
        input { background: rgba(0,0,0,0.9) !important; border: 1px solid rgba(34, 211, 238, 0.2) !important; color: #fff !important; padding: 12px !important; border-radius: 10px; width: 100%; margin-bottom: 10px; }

        /* LUNAR CALENDAR */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day-label { font-size: 9px; font-weight: 900; color: #22d3ee; text-align: center; opacity: 0.6; padding-bottom: 5px; }
        .cal-date { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; border-radius: 8px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(34, 211, 238, 0.05);
            transition: 0.3s; cursor: pointer;
        }
        .cal-date.has-quest { border-color: #22d3ee !important; background: rgba(34, 211, 238, 0.1); box-shadow: inset 0 0 10px rgba(34, 211, 238, 0.2); }
        .cal-today { color: #fde68a; border-color: #fde68a !important; font-weight: 900; }

        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: linear-gradient(#fde68a, #22d3ee); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <header class="mb-10 text-center">
            <h1 class="text-4xl hub-title">Siren's Sands</h1>
            <p class="text-cyan-400/60 text-[10px] tracking-[0.6em] uppercase mt-2 font-black">Tucker • Cooper • Burns</p>
            
            <div class="mt-8">
                <div class="avatar-bar" id="avatarBar">
                    <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐢')">🐢</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐺')">🐺</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🦉')">🦉</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '⚓')">⚓</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '📖')">📖</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🥥')">🥥</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🌴')">🌴</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🐬')">🐬</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🦀')">🦀</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🎸')">🎸</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🏹')">🏹</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '⚔️')">⚔️</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🍄')">🍄</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '💎')">💎</div>
                    <div class="avatar-option" onclick="selectAvatar(this, '🍺')">🍺</div>
                </div>
                <input id="userName" type="text" placeholder="WHO ARE YOU?" class="name-input" oninput="localStorage.setItem('sands_name', this.value)">
            </div>
        </header>

        <div class="glass-module">
            <div class="p-4 border-b border-white/5"><span class="text-orange-400 font-black text-xs uppercase tracking-widest">🛒 Grocery List</span></div>
            <div class="p-4">
                <div id="marketList" class="space-y-2 mb-4"></div>
                <input id="mInput" type="text" placeholder="Add to list..." onkeydown="if(event.key==='Enter') saveMarket()">
            </div>
        </div>

        <div class="glass-module">
            <div class="p-4 border-b border-white/5"><span class="text-cyan-400 font-black text-xs uppercase tracking-widest">📜 Love Notes</span></div>
            <div class="p-4">
                <div id="notesLog" class="space-y-4 mb-4"></div>
                <input id="nInput" type="text" placeholder="Write a note..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div class="glass-module">
            <div class="p-4 border-b border-white/5 flex justify-between items-center">
                <span class="text-cyan-200 font-black text-xs uppercase tracking-widest">📅 Appointments</span>
                <span id="calMonth" class="text-[10px] text-yellow-200 font-bold uppercase"></span>
            </div>
            <div class="p-6">
                <div class="calendar-grid">
                    <div class="cal-day-label">S</div><div class="cal-day-label">M</div><div class="cal-day-label">T</div><div class="cal-day-label">W</div><div class="cal-day-label">T</div><div class="cal-day-label">F</div><div class="cal-day-label">S</div>
                </div>
                <div id="calendarDates" class="calendar-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱';
        function selectAvatar(el, icon) { document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active')); el.classList.add('active'); currentSigil = icon; }

        window.onload = () => { 
            const saved = localStorage.getItem('sands_name');
            if(saved) document.getElementById('userName').value = saved;
            refreshAll(); buildCalendar(); animate(); 
        };

        // --- CALENDAR ---
        async function buildCalendar() {
            const now = new Date();
            document.getElementById('calMonth').innerText = now.toLocaleString('default', { month: 'long' });
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const grid = document.getElementById('calendarDates'); grid.innerHTML = '';

            const { data: q } = await _supabase.from('calendar_events').select('start_date');
            const questDays = q ? q.map(d => new Date(d.start_date).getDate() + 1) : [];

            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                let today = (d === now.getDate()) ? 'cal-today' : '';
                let quest = questDays.includes(d) ? 'has-quest' : '';
                grid.innerHTML += `<div class="cal-date ${today} ${quest}" onclick="addAppt(${d})">${d}</div>`;
            }
        }
        async function addAppt(day) {
            const title = prompt("New Appointment for the " + day + "?");
            if(title) {
                const dateStr = new Date(new Date().getFullYear(), new Date().getMonth(), day).toISOString().split('T')[0];
                await _supabase.from('calendar_events').insert([{ title, start_date: dateStr }]);
                buildCalendar();
            }
        }

        // --- DATA ---
        async function refreshAll() { loadNotes(); loadMarket(); }
        function getUser() { return `${currentSigil} ${document.getElementById('userName').value || 'Someone'}`; }

        async function saveMarket() { const i = document.getElementById('mInput'); if(i.value) await _supabase.from('market_items').insert([{ text: `${getUser()}: ${i.value}` }]); i.value = ""; }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="bg-white/5 p-3 rounded-lg border border-white/5 text-[11px] flex justify-between"><span>${item.text}</span><span class="cursor-pointer text-red-500" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }
        async function saveNote() { const i = document.getElementById('nInput'); if(i.value) await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${getUser()} • ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}` }]); i.value = ""; }
        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `<div class="bg-white/5 p-4 rounded-xl border border-white/5 relative"><small class="text-cyan-400 font-black text-[9px] block mb-2 uppercase tracking-widest">${n.timestamp}</small><p class="text-[14px] font-light leading-relaxed">${n.note}</p><span class="absolute top-2 right-3 text-red-400 cursor-pointer" onclick="deleteItem('family_notes', '${n.id}')">×</span></div>`).join('') : '';
        }
        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); }

        // --- ANIMATIONS ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = canvas.height + 50;
                this.isNote = Math.random() > 0.4; this.size = Math.random() * 30 + 15;
                this.speed = Math.random() * 1.5 + 0.5; this.opacity = Math.random() * 0.4 + 0.1;
                this.color = this.isNote ? '34, 211, 238' : '251, 191, 36';
            }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 60) * 1; if (this.y < -50) this.reset(); }
            draw() { ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`; if (this.isNote) { ctx.font = `${this.size}px Cinzel`; ctx.fillText('♪', this.x, this.y); } else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 4, 0, Math.PI * 2); ctx.fill(); } }
        }
        for (let i = 0; i < 35; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
