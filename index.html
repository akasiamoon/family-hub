<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        .sidebar {
            position: relative;
            width: 100%; max-width: 480px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0) 100%);
            border-right: 2px solid var(--sigil-color, rgba(34, 211, 238, 0.3));
            box-shadow: 10px 0 50px var(--sigil-shadow, rgba(34, 211, 238, 0.1));
            transition: all 0.8s ease;
        }

        /* 20-AVATAR GALLERY */
        .avatar-bar { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            margin-bottom: 15px; background: rgba(255, 255, 255, 0.03); 
            padding: 12px; border-radius: 1rem; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .avatar-option {
            height: 40px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 20px;
            background: rgba(0,0,0,0.5); filter: grayscale(100%); opacity: 0.5;
        }
        .avatar-option.active { border-color: var(--sigil-color, #22d3ee); filter: grayscale(0%); opacity: 1; box-shadow: 0 0 15px var(--sigil-color, #22d3ee); transform: scale(1.1); }

        /* BOX TITLES */
        .expensive-header {
            font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.3em; font-weight: 900; text-transform: uppercase;
            color: #fde68a; padding: 1rem 1.25rem; background: linear-gradient(to right, rgba(253, 230, 138, 0.1), transparent);
            border-bottom: 1px solid rgba(253, 230, 138, 0.3); text-shadow: 0 0 10px rgba(253, 230, 138, 0.5);
            display: flex; justify-content: space-between; align-items: center;
        }

        .glass-module {
            background: rgba(8, 8, 12, 0.9); backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem; margin-bottom: 2rem; overflow: hidden;
        }

        .hub-title { font-family: 'Cinzel', serif; letter-spacing: 0.2em; background: linear-gradient(135deg, #fde68a, #d97706, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; text-transform: uppercase; }
        
        input { background: rgba(0,0,0,0.9) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: #fff !important; padding: 12px !important; border-radius: 10px; width: 100%; margin-bottom: 10px; }

        /* HEART PIN STYLING */
        .pinned-tag { font-size: 8px; background: rgba(244, 114, 182, 0.2); color: #f472b6; padding: 3px 10px; border-radius: 6px; letter-spacing: 2px; font-weight: 900; }
        .heart-pin { cursor: pointer; transition: 0.3s; opacity: 0.3; filter: grayscale(100%); }
        .heart-active { opacity: 1 !important; filter: grayscale(0%) drop-shadow(0 0 8px #f472b6) !important; color: #f472b6; }

        /* CALENDAR */
        .cal-nav-btn { cursor: pointer; padding: 0 10px; transition: 0.3s; color: #22d3ee; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-date { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
        .cal-date.has-quest { border-color: var(--sigil-color, #22d3ee) !important; background: rgba(34, 211, 238, 0.1); }
        .cal-date.has-heart { border-color: #f472b6 !important; background: rgba(244, 114, 182, 0.1); }
        .heart-indicator { font-size: 7px; position: absolute; bottom: 2px; color: #f472b6; text-shadow: 0 0 5px #f472b6; }
        .cal-today { color: #fde68a; border-color: #fde68a !important; }

        #questModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); align-items: center; justify-content: center; }
        .modal-glass { background: rgba(10, 10, 15, 0.95); border: 1px solid #fde68a; padding: 2.5rem; border-radius: 1.5rem; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="questModal">
        <div class="modal-glass">
            <h2 id="modalDateTitle" class="hub-title text-xl mb-4 text-center"></h2>
            <div id="modalEventList" class="space-y-3 mb-6 max-h-40 overflow-y-auto"></div>
            <input id="modalInput" type="text" placeholder="Add Appointment..." class="mb-4">
            <div class="flex gap-2">
                <button onclick="closeQuestModal()" class="w-full py-2 bg-white/10 rounded-lg text-xs font-bold uppercase">Close</button>
                <button id="addQuestBtn" class="w-full py-2 bg-cyan-500/20 border border-cyan-500 rounded-lg text-cyan-400 text-xs font-bold uppercase">Add</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <header class="mb-10 text-center">
            <h1 class="text-3xl hub-title">Tucker Cooper Burns</h1>
            <p class="text-cyan-400/60 text-[10px] tracking-[0.6em] uppercase mt-2 font-black">Family Hub</p>
            
            <div class="mt-8">
                <div class="avatar-bar" id="avatarBar">
                    <div class="avatar-option active" data-color="#22d3ee" onclick="selectAvatar(this, '🔱')">🔱</div>
                    <div class="avatar-option" data-color="#f472b6" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                    <div class="avatar-option" data-color="#cbd5e1" onclick="selectAvatar(this, '🐚')">🐚</div>
                    <div class="avatar-option" data-color="#ef4444" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                    <div class="avatar-option" data-color="#f97316" onclick="selectAvatar(this, '🔥')">🔥</div>
                    <div class="avatar-option" data-color="#4ade80" onclick="selectAvatar(this, '🐢')">🐢</div>
                    <div class="avatar-option" data-color="#94a3b8" onclick="selectAvatar(this, '🐺')">🐺</div>
                    <div class="avatar-option" data-color="#fbbf24" onclick="selectAvatar(this, '🦉')">🦉</div>
                    <div class="avatar-option" data-color="#38bdf8" onclick="selectAvatar(this, '⚓')">⚓</div>
                    <div class="avatar-option" data-color="#a78bfa" onclick="selectAvatar(this, '📖')">📖</div>
                    <div class="avatar-option" data-color="#84cc16" onclick="selectAvatar(this, '🥥')">🥥</div>
                    <div class="avatar-option" data-color="#059669" onclick="selectAvatar(this, '🌴')">🌴</div>
                    <div class="avatar-option" data-color="#60a5fa" onclick="selectAvatar(this, '🐬')">🐬</div>
                    <div class="avatar-option" data-color="#f87171" onclick="selectAvatar(this, '🦀')">🦀</div>
                    <div class="avatar-option" data-color="#e879f9" onclick="selectAvatar(this, '🎸')">🎸</div>
                    <div class="avatar-option" data-color="#8b5cf6" onclick="selectAvatar(this, '🏹')">🏹</div>
                    <div class="avatar-option" data-color="#d1d5db" onclick="selectAvatar(this, '⚔️')">⚔️</div>
                    <div class="avatar-option" data-color="#f43f5e" onclick="selectAvatar(this, '🍄')">🍄</div>
                    <div class="avatar-option" data-color="#fde68a" onclick="selectAvatar(this, '💎')">💎</div>
                    <div class="avatar-option" data-color="#fb923c" onclick="selectAvatar(this, '🍺')">🍺</div>
                </div>
                <input id="userName" type="text" placeholder="WHO ARE YOU?" class="name-input" oninput="localStorage.setItem('sands_name', this.value)">
            </div>
        </header>

        <div class="glass-module">
            <div class="expensive-header"><span>Grocery List</span></div>
            <div class="p-4">
                <div id="marketList" class="space-y-2 mb-4"></div>
                <input id="mInput" type="text" placeholder="Add grocery..." onkeydown="if(event.key==='Enter') saveMarket()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header">Love Notes</div>
            <div class="p-4">
                <div id="notesLog" class="space-y-4 mb-4"></div>
                <input id="nInput" type="text" placeholder="Write a note..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header">
                <span class="cal-nav-btn" onclick="changeMonth(-1)">◀</span>
                <span id="calMonth" style="min-width: 100px; text-align: center;"></span>
                <span class="cal-nav-btn" onclick="changeMonth(1)">▶</span>
            </div>
            <div class="p-6">
                <div class="calendar-grid">
                    <div class="cal-day-label">S</div><div class="cal-day-label">M</div><div class="cal-day-label">T</div><div class="cal-day-label">W</div><div class="cal-day-label">T</div><div class="cal-day-label">F</div><div class="cal-day-label">S</div>
                </div>
                <div id="calendarDates" class="calendar-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', displayedDate = new Date();

        function selectAvatar(el, icon) { 
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active'); currentSigil = icon;
            const color = el.getAttribute('data-color');
            document.documentElement.style.setProperty('--sigil-color', color);
            document.documentElement.style.setProperty('--sigil-shadow', color + '44');
        }

        window.onload = () => { 
            const saved = localStorage.getItem('sands_name');
            if(saved) document.getElementById('userName').value = saved;
            refreshAll(); buildCalendar(); animate(); 
        };

        async function refreshAll() { loadNotes(); loadMarket(); }

        // --- LOVE NOTES WITH HEART PINNING ---
        async function saveNote() { 
            const i = document.getElementById('nInput'); 
            if(i.value) {
                const now = new Date();
                const dateKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
                await _supabase.from('family_notes').insert([{ 
                    note: i.value, 
                    timestamp: `${currentSigil} ${document.getElementById('userName').value || 'Someone'} • ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`,
                    is_pinned: false,
                    post_date: dateKey
                }]); 
                triggerSparkles();
            }
            i.value = ""; refreshAll(); buildCalendar();
        }

        async function togglePin(id, currentStatus) {
            await _supabase.from('family_notes').update({ is_pinned: !currentStatus }).eq('id', id);
            refreshAll(); buildCalendar();
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            if(!data) return;
            const pinned = data.filter(n => n.is_pinned), regular = data.filter(n => !n.is_pinned);

            const renderNote = (n) => `
                <div class="bg-white/5 p-4 rounded-xl border border-white/5 relative group ${n.is_pinned ? 'border-pink-500/30 bg-pink-500/5' : ''}">
                    <div class="flex justify-between items-center mb-2">
                        <small class="text-cyan-400 font-black text-[9px] uppercase tracking-widest">${n.timestamp}</small>
                        <div class="flex gap-3">
                            <span class="heart-pin ${n.is_pinned ? 'heart-active' : ''}" onclick="togglePin('${n.id}', ${n.is_pinned})">❤️</span>
                            <span class="text-red-400 cursor-pointer opacity-0 group-hover:opacity-100" onclick="deleteItem('family_notes', '${n.id}')">×</span>
                        </div>
                    </div>
                    ${n.is_pinned ? '<span class="pinned-tag mb-2 inline-block">❤️ PINNED ❤️</span>' : ''}
                    <p class="text-[14px] font-light leading-relaxed">${n.note}</p>
                </div>`;
            document.getElementById('notesLog').innerHTML = pinned.map(renderNote).join('') + regular.map(renderNote).join('');
        }

        // --- CALENDAR & MARKET ---
        function changeMonth(offset) { displayedDate.setMonth(displayedDate.getMonth() + offset); buildCalendar(); }
        async function buildCalendar() {
            const year = displayedDate.getFullYear(), month = displayedDate.getMonth(), today = new Date();
            document.getElementById('calMonth').innerText = displayedDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendarDates'); grid.innerHTML = '';
            
            const { data: appts } = await _supabase.from('calendar_events').select('*');
            const { data: notes } = await _supabase.from('family_notes').select('*').eq('is_pinned', true);

            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasAppt = appts?.some(e => e.start_date === dateStr);
                const hasHeart = notes?.some(n => n.post_date === dateStr);
                
                let isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) ? 'cal-today' : '';
                grid.innerHTML += `
                    <div class="cal-date ${isToday} ${hasAppt ? 'has-quest' : ''} ${hasHeart ? 'has-heart' : ''}" onclick="openQuestModal('${dateStr}', ${d})">
                        ${d}
                        ${hasHeart ? '<span class="heart-indicator">❤️</span>' : ''}
                    </div>`;
            }
        }

        async function openQuestModal(dateStr, d) {
            const modal = document.getElementById('questModal');
            document.getElementById('modalDateTitle').innerText = `${d} ${displayedDate.toLocaleString('default', { month: 'long' })}`;
            modal.style.display = 'flex';
            const { data: dayEvents } = await _supabase.from('calendar_events').select('*').eq('start_date', dateStr);
            const list = document.getElementById('modalEventList');
            list.innerHTML = dayEvents?.length ? dayEvents.map(e => `<div class="bg-white/5 p-2 rounded text-xs flex justify-between"><span>✦ ${e.title}</span><span class="text-red-500 cursor-pointer" onclick="deleteItem('calendar_events', '${e.id}'); openQuestModal('${dateStr}', ${d}); buildCalendar();">×</span></div>`).join('') : '<p class="text-[10px] text-center opacity-40">Empty...</p>';
            document.getElementById('addQuestBtn').onclick = async () => {
                const v = document.getElementById('modalInput').value; if(!v) return;
                await _supabase.from('calendar_events').insert([{ title: v, start_date: dateStr }]);
                document.getElementById('modalInput').value = ""; openQuestModal(dateStr, d); buildCalendar();
            };
        }
        function closeQuestModal() { document.getElementById('questModal').style.display = 'none'; }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(i => `<div class="bg-white/5 p-3 rounded-lg border border-white/5 text-[11px] flex justify-between"><span>${i.text}</span><span class="cursor-pointer text-red-500" onclick="deleteItem('market_items', '${i.id}')">×</span></div>`).join('') : '';
        }
        async function saveMarket() { const i = document.getElementById('mInput'); if(i.value) await _supabase.from('market_items').insert([{ text: `${currentSigil} ${document.getElementById('userName').value || 'Someone'}: ${i.value}` }]); i.value = ""; refreshAll(); }
        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); buildCalendar(); }

        // --- ANIMATIONS ---
        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; this.isNote = Math.random() > 0.4; this.size = Math.random() * 35 + 20; this.speed = Math.random() * 1.5 + 0.5; this.opacity = Math.random() * 0.4 + 0.1; this.color = this.isNote ? '34, 211, 238' : '251, 191, 36'; }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 60) * 1; if (this.y < -50) this.reset(); }
            draw() { ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`; if (this.isNote) { ctx.font = `${this.size}px Cinzel`; ctx.fillText('♪', this.x, this.y); } else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 4, 0, Math.PI * 2); ctx.fill(); } }
        }
        class SpecialParticle {
            constructor(isHeart) { this.x = Math.random() * 400; this.y = canvas.height * 0.6; this.isHeart = isHeart; this.size = Math.random() * 20 + 10; this.speedX = (Math.random() - 0.5) * 4; this.speedY = -Math.random() * 5 - 2; this.opacity = 1; this.life = 100; }
            update() { this.x += this.speedX; this.y += this.speedY; this.opacity -= 0.01; this.life--; }
            draw() { if(this.opacity <= 0) return; ctx.fillStyle = this.isHeart ? `rgba(244, 114, 182, ${this.opacity})` : `rgba(253, 230, 138, ${this.opacity})`; ctx.font = `${this.size}px serif`; ctx.fillText(this.isHeart ? '❤️' : '✨', this.x, this.y); }
        }
        function triggerSparkles() { for (let i = 0; i < 20; i++) { particles.push(new SpecialParticle(true)); particles.push(new SpecialParticle(false)); } }
        for (let i = 0; i < 35; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles = particles.filter(p => p.life === undefined || p.life > 0); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
