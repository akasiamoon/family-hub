<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Farmington Chronicle</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;700&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* THE BARDIC SIDEBAR */
        .sidebar {
            width: 100%; max-width: 460px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 80%, rgba(0,0,0,0) 100%);
            border-right: 1px solid rgba(34, 211, 238, 0.1);
        }

        .glass-module {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(34, 211, 238, 0.25);
            border-radius: 1.25rem; margin-bottom: 1.5rem;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(34, 211, 238, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .module-header { 
            padding: 1.25rem; display: flex; justify-content: space-between; 
            align-items: center; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .module-content { padding: 1.5rem; transition: all 0.5s ease; max-height: 1200px; opacity: 1; }
        .module-collapsed .module-content { max-height: 0; padding: 0; opacity: 0; overflow: hidden; pointer-events: none; }

        .hub-title {
            font-family: 'Cinzel', serif; letter-spacing: 0.4em;
            background: linear-gradient(to right, #fde68a, #f59e0b, #22d3ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; text-transform: uppercase;
            filter: drop-shadow(0 0 10px rgba(253, 230, 138, 0.3));
        }

        /* RPG Interaction Elements */
        input { 
            background: rgba(0,0,0,0.7) !important; 
            border: 1px solid rgba(34, 211, 238, 0.2) !important; 
            color: white !important; padding: 12px !important; 
            border-radius: 10px; width: 100%; margin-bottom: 10px;
            transition: border 0.3s ease;
        }
        input:focus { border-color: #22d3ee !important; outline: none; }
        
        .btn-magic { 
            background: rgba(34, 211, 238, 0.1); 
            border: 1px solid #22d3ee; color: #22d3ee; 
            padding: 10px; border-radius: 10px; width: 100%; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 10px;
            transition: all 0.3s;
        }
        .btn-magic:hover { background: rgba(34, 211, 238, 0.3); box-shadow: 0 0 15px rgba(34, 211, 238, 0.4); }

        .delete-btn { color: #f87171; font-weight: bold; cursor: pointer; opacity: 0.4; transition: 0.2s; }
        .delete-btn:hover { opacity: 1; transform: scale(1.2); }

        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.2); }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <header class="mb-12">
            <h1 class="text-3xl lg:text-4xl hub-title">Cottage Hub</h1>
            <p class="text-cyan-400/40 text-[9px] tracking-[0.5em] uppercase mt-2 font-bold">The Farmington Chronicle</p>
            
            <div class="mt-8 flex gap-3">
                <button onclick="toggleAudio()" class="btn-magic !w-auto px-6">Summon Tides</button>
                <audio id="beachAudio" loop src="https://www.soundjay.com/nature/ocean-wave-1.mp3"></audio>
            </div>
            <div id="clock" class="text-cyan-300 font-mono text-xs mt-6 opacity-40 tracking-widest">00:00:00</div>
        </header>

        <div id="marketMod" class="glass-module">
            <div class="module-header" onclick="toggle('marketMod')">
                <span class="text-orange-400 font-black text-[11px] uppercase tracking-widest">🛒 Market Provisions</span>
                <span onclick="clearMarket(event)" class="text-[9px] text-orange-200/30 hover:text-orange-400 uppercase tracking-tighter cursor-pointer">[Purge List]</span>
            </div>
            <div class="module-content">
                <div id="marketList" class="max-h-48 overflow-y-auto mb-6 space-y-3 pr-2"></div>
                <input id="mInput" type="text" placeholder="Type provision & hit Enter..." onkeydown="if(event.key==='Enter') saveMarket()">
            </div>
        </div>

        <div id="mealMod" class="glass-module">
            <div class="module-header" onclick="toggle('mealMod')">
                <span class="text-green-400 font-black text-[11px] uppercase tracking-widest">🍲 Weekly Feasts</span>
            </div>
            <div class="module-content">
                <div id="mealGrid" class="text-[11px] space-y-3"></div>
            </div>
        </div>

        <div id="logMod" class="glass-module">
            <div class="module-header" onclick="toggle('logMod')">
                <span class="text-cyan-400 font-black text-[11px] uppercase tracking-widest">📜 Family Chronicles</span>
            </div>
            <div class="module-content">
                <div id="notesLog" class="max-h-64 overflow-y-auto mb-6 space-y-4 pr-2"></div>
                <input id="nInput" type="text" placeholder="Note for the log..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div id="calMod" class="glass-module">
            <div class="module-header" onclick="toggle('calMod')">
                <span class="text-cyan-200 font-black text-[11px] uppercase tracking-widest">📅 Daily Quests</span>
            </div>
            <div class="module-content">
                <div id="calendar" class="text-[10px]"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggle(id) { document.getElementById(id).classList.toggle('module-collapsed'); }
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
        setInterval(updateClock, 1000);

        function toggleAudio() {
            const a = document.getElementById('beachAudio');
            a.paused ? a.play() : a.pause();
        }

        window.onload = () => {
            updateClock(); refreshAll(); initCalendar();
            _supabase.channel('db').on('postgres_changes', {event:'*', schema:'public'}, () => {
                refreshAll(); if(window.calendar) window.calendar.refetchEvents();
            }).subscribe();
        };

        async function initCalendar() {
            window.calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 'auto', selectable: true,
                select: async (info) => {
                    const title = prompt('Add Quest:');
                    if (title) { await _supabase.from('calendar_events').insert([{ title, start_date: info.startStr }]); window.calendar.refetchEvents(); }
                },
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date, color: 'rgba(34, 211, 238, 0.4)' })) : []);
                }
            });
            window.calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }

        // --- MARKET ---
        async function saveMarket() {
            const i = document.getElementById('mInput'); if (!i.value) return;
            await _supabase.from('market_items').insert([{ text: i.value }]);
            i.value = "";
        }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `
                <div class="flex justify-between items-center bg-white/[0.03] p-3 rounded-lg border border-white/5 group">
                    <span class="text-[13px] text-white/80 font-light">✦ ${item.text}</span>
                    <span class="delete-btn opacity-0 group-hover:opacity-100" onclick="deleteItem('market_items', '${item.id}')">×</span>
                </div>`).join('') : '';
        }
        async function clearMarket(e) { e.stopPropagation(); if(confirm("Purge all provisions?")) { await _supabase.from('market_items').delete().neq('id', 0); } }

        // --- MEALS ---
        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `<div class="flex justify-between items-center bg-white/[0.02] p-2 rounded border border-white/5">
                    <span class="font-bold text-green-400/70 uppercase text-[10px] tracking-widest">${day}</span>
                    <input onchange="updateMeal('${day}', this.value)" value="${meal}" class="!bg-transparent !border-none !p-0 !m-0 !mb-0 !w-auto text-right text-cyan-400 text-xs font-light">
                </div>`;
            }).join('');
        }
        async function updateMeal(day, menu) { await _supabase.from('meal_plan').upsert({ day, menu }, { onConflict: 'day' }); }

        // --- NOTES ---
        async function saveNote() {
            const i = document.getElementById('nInput'); if (!i.value) return;
            const ts = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: ts }]);
            i.value = "";
        }
        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `
                <div class="bg-white/[0.03] p-4 rounded-xl border border-white/5 relative group transition-all hover:bg-white/[0.05]">
                    <small class="text-cyan-500/40 block text-[9px] font-mono tracking-widest mb-2">${n.timestamp}</small>
                    <p class="text-[14px] leading-relaxed text-white/90">${n.note}</p>
                    <span class="absolute top-2 right-3 delete-btn opacity-0 group-hover:opacity-100" onclick="deleteItem('family_notes', '${n.id}')">×</span>
                </div>`).join('') : '';
        }

        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); }

        // --- ANIMATION ENGINE ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const glyphs = ['♪', '♫', '♩', '♬'];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 30;
                this.isNote = Math.random() > 0.4;
                this.text = glyphs[Math.floor(Math.random() * glyphs.length)];
                this.size = Math.random() * 14 + 6;
                this.speed = Math.random() * 0.7 + 0.3;
                this.opacity = Math.random() * 0.4 + 0.1;
                this.color = this.isNote ? '34, 211, 238' : '251, 191, 36'; // Cyan or Golden Ember
            }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 60) * 0.6; if (this.y < -30) this.reset(); }
            draw() {
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                if (this.isNote) {
                    ctx.font = `${this.size}px Cinzel`;
                    ctx.fillText(this.text, this.x, this.y);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size / 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        for (let i = 0; i < 45; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
