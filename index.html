<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@200;400;700;900&display=swap');

        :root { --sigil: #22d3ee; --gold: #fbbf24; }
        body.gothic { --sigil: #a855f7; --gold: #f472b6; }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; background-size: cover;
            color: #e2e8f0; font-family: 'Cinzel', serif; overflow: hidden; 
        }

        #pulse-overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; box-shadow: inset 0 0 150px rgba(0,0,0,0.9); animation: breathe 8s infinite alternate ease-in-out; }
        @keyframes breathe { from { opacity: 0.4; } to { opacity: 0.9; } }

        #particle-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

        .sidebar {
            position: relative; width: 100%; max-width: 460px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.8) 85%, rgba(0,0,0,0) 100%);
            border-right: 2px solid var(--sigil);
        }

        /* THIN MAGICAL SCROLLBAR */
        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: linear-gradient(var(--gold), var(--sigil)); border-radius: 10px; }

        .expensive-header {
            font-size: 12px; letter-spacing: 0.35em; font-weight: 900; text-transform: uppercase;
            padding: 1.1rem 1.25rem; background: linear-gradient(to right, var(--gold), var(--sigil));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            border-bottom: 2px solid transparent; border-image: linear-gradient(to right, var(--gold), var(--sigil)) 1;
            display: flex; justify-content: space-between; align-items: center;
        }

        .glass-module {
            background: rgba(8, 8, 12, 0.95); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem;
            margin-bottom: 2.5rem; overflow: hidden;
        }

        .avatar-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 12px; }
        .avatar-option { 
            height: 42px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; 
            transition: 0.3s; display: flex; align-items: center; justify-content: center; 
            font-size: 22px; background: rgba(0,0,0,0.6); filter: grayscale(100%); opacity: 0.3;
        }
        .avatar-option.active { border-color: var(--sigil); filter: grayscale(0%); opacity: 1; transform: scale(1.1); box-shadow: 0 0 15px var(--sigil); }

        /* OBSIDIAN INPUTS */
        input { background: rgba(0,0,0,0.9) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: #fff !important; padding: 12px !important; border-radius: 8px; font-family: 'Inter', sans-serif; width: 100%; margin-top: 5px; }
        input:focus { border-color: var(--sigil) !important; outline: none; }

        .cal-date { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .cal-today { border: 2px solid var(--gold) !important; color: var(--gold); font-weight: 900; }
        .has-quest { border-color: var(--sigil) !important; background: rgba(34, 211, 238, 0.1); }
        
        .pinned-area { background: rgba(251, 191, 36, 0.05); border-bottom: 1px solid rgba(251, 191, 36, 0.2); margin-bottom: 1rem; padding: 1rem; }
    </style>
</head>
<body id="mainBody">

    <div id="pulse-overlay"></div>
    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-widest" style="background: linear-gradient(to right, #fbbf24, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TUCKER COOPER BURNS</h1>
            <p class="text-[10px] tracking-[0.6em] opacity-50 uppercase mt-1">Family Hub • Siren's Sands</p>
            <div id="weather" class="text-[9px] text-cyan-400 font-bold mt-4 tracking-widest uppercase">FARMINGTON, MS • LOADING...</div>

            <div class="avatar-bar mt-6 bg-white/5 rounded-xl border border-white/5">
                <div class="avatar-option active" data-color="#22d3ee" onclick="selectAvatar(this, '🔱')">🔱</div>
                <div class="avatar-option" data-color="#f87171" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                <div class="avatar-option" data-color="#cbd5e1" onclick="selectAvatar(this, '🐚')">🐚</div>
                <div class="avatar-option" data-color="#ef4444" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                <div class="avatar-option" data-color="#f97316" onclick="selectAvatar(this, '🔥')">🔥</div>
                <div class="avatar-option" data-color="#4ade80" onclick="selectAvatar(this, '🐢')">🐢</div>
                <div class="avatar-option" data-color="#94a3b8" onclick="selectAvatar(this, '🐺')">🐺</div>
                <div class="avatar-option" data-color="#fbbf24" onclick="selectAvatar(this, '🦉')">🦉</div>
                <div class="avatar-option" data-color="#38bdf8" onclick="selectAvatar(this, '⚓')">⚓</div>
                <div class="avatar-option" data-color="#a78bfa" onclick="selectAvatar(this, '📖')">📖</div>
                <div class="avatar-option" data-color="#84cc16" onclick="selectAvatar(this, '🥥')">🥥</div>
                <div class="avatar-option" data-color="#059669" onclick="selectAvatar(this, '🌴')">🌴</div>
                <div class="avatar-option" data-color="#60a5fa" onclick="selectAvatar(this, '🐬')">🐬</div>
                <div class="avatar-option" data-color="#f87171" onclick="selectAvatar(this, '🦀')">🦀</div>
                <div class="avatar-option" data-color="#e879f9" onclick="selectAvatar(this, '🎸')">🎸</div>
                <div class="avatar-option" data-color="#8b5cf6" onclick="selectAvatar(this, '🏹')">🏹</div>
                <div class="avatar-option" data-color="#d1d5db" onclick="selectAvatar(this, '⚔️')">⚔️</div>
                <div class="avatar-option" data-color="#f43f5e" onclick="selectAvatar(this, '🍄')">🍄</div>
                <div class="avatar-option" data-color="#fde68a" onclick="selectAvatar(this, '💎')">💎</div>
                <div class="avatar-option" data-color="#fb923c" onclick="selectAvatar(this, '🍺')">🍺</div>
            </div>
            <div class="flex gap-2 mt-4">
                <input id="userName" type="text" placeholder="NAME" class="text-center font-black">
                <button onclick="toggleGothic()" class="p-2 border border-white/20 rounded-lg text-[9px] uppercase">Theme</button>
            </div>
        </header>

        <div class="glass-module">
            <div class="expensive-header"><span>Grocery List</span></div>
            <div class="p-6">
                <div id="marketList" class="space-y-3 mb-4 font-inter text-xs"></div>
                <input id="mInput" type="text" placeholder="Add to list..." onkeydown="if(event.key==='Enter') saveMarket()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header"><span>Love Notes</span></div>
            <div class="p-6">
                <div id="pinnedLog" class="pinned-area hidden space-y-4"></div>
                <div id="notesLog" class="space-y-6 mb-4"></div>
                <input id="nInput" type="text" placeholder="Write a note..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header">
                <span onclick="changeMonth(-1)" class="cursor-pointer">◀</span>
                <span id="calMonth"></span>
                <span onclick="changeMonth(1)" class="cursor-pointer">▶</span>
            </div>
            <div id="calendarDates" class="grid grid-cols-7 gap-1 p-4 min-h-[240px]"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', dispDate = new Date();

        function selectAvatar(el, icon) {
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active'); currentSigil = icon;
            document.documentElement.style.setProperty('--sigil-color', el.getAttribute('data-color'));
        }

        function toggleGothic() { document.body.classList.toggle('gothic'); }

        window.onload = () => { refreshAll(); buildCalendar(); animate(); updateWeather(); };

        async function updateWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.93&longitude=-88.51&current_weather=true');
                const data = await res.json();
                document.getElementById('weather').innerText = `${Math.round(data.current_weather.temperature * 9/5 + 32)}°F • FARMINGTON`;
            } catch(e) {}
        }

        async function refreshAll() { loadNotes(); loadMarket(); }
        
        async function saveMarket() { const i = document.getElementById('mInput'); if(i.value) { await _supabase.from('market_items').insert([{ text: `${currentSigil} ${document.getElementById('userName').value || 'User'}: ${i.value}` }]); i.value = ""; refreshAll(); } }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between border-b border-white/5 pb-2"><span>${item.text}</span><span class="text-red-500 cursor-pointer" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }

        async function saveNote() {
            const i = document.getElementById('nInput');
            if(i.value) {
                await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${currentSigil} ${document.getElementById('userName').value || 'User'} • ${new Date().toLocaleTimeString()}`, is_pinned: false }]);
                i.value = ""; refreshAll();
            }
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            if(!data) return;
            const pinned = data.filter(n => n.is_pinned), regular = data.filter(n => !n.is_pinned);
            const render = (n) => `<div class="border-l-2 border-cyan-500/30 pl-4 py-1 group"><small class="text-[9px] opacity-40 uppercase">${n.timestamp}</small><p class="italic text-[15px] font-light">"${n.note}"</p><div class="flex gap-4 mt-1"><span class="cursor-pointer ${n.is_pinned ? 'text-red-500' : 'opacity-20'}" onclick="togglePin('${n.id}', ${n.is_pinned})">❤️</span><span class="text-red-900 opacity-0 group-hover:opacity-100 cursor-pointer" onclick="deleteItem('family_notes', '${n.id}')">×</span></div></div>`;
            
            const pinDiv = document.getElementById('pinnedLog');
            if(pinned.length) {
                pinDiv.classList.remove('hidden');
                pinDiv.innerHTML = `<div class="text-[8px] font-black text-yellow-500 mb-2 tracking-[4px]">❤️ ARCHIVE OF HEARTS ❤️</div>` + pinned.map(render).join('');
            } else { pinDiv.classList.add('hidden'); }
            
            document.getElementById('notesLog').innerHTML = regular.map(render).join('');
        }

        async function togglePin(id, s) { await _supabase.from('family_notes').update({ is_pinned: !s }).eq('id', id); refreshAll(); }
        async function deleteItem(t, id) { await _supabase.from(t).delete().eq('id', id); refreshAll(); }
        function changeMonth(o) { dispDate.setMonth(dispDate.getMonth() + o); buildCalendar(); }

        async function buildCalendar() {
            const y = dispDate.getFullYear(), m = dispDate.getMonth();
            document.getElementById('calMonth').innerText = dispDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            const grid = document.getElementById('calendarDates'); grid.innerHTML = '';
            const { data: appts } = await _supabase.from('calendar_events').select('*');
            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasA = appts?.some(e => e.start_date === ds);
                const isT = (d === new Date().getDate() && m === new Date().getMonth());
                grid.innerHTML += `<div class="cal-date ${isT ? 'cal-today' : ''} ${hasA ? 'has-quest' : ''}">${d}</div>`;
            }
        }

        // --- BARDIC PARTICLE ENGINE ---
        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width; this.y = canvas.height + 50;
                this.size = Math.random() * 20 + 10; this.speed = Math.random() * 0.8 + 0.4;
                this.opacity = Math.random() * 0.3;
                this.type = Math.random() > 0.4 ? 'note' : 'ember';
            }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 50) * 0.5; if (this.y < -50) this.init(); }
            draw() {
                ctx.fillStyle = this.type === 'note' ? `rgba(34, 211, 238, ${this.opacity})` : `rgba(251, 191, 36, ${this.opacity})`;
                ctx.font = `${this.size}px serif`;
                ctx.fillText(this.type === 'note' ? (Math.random() > 0.5 ? '♪' : '♫') : '•', this.x, this.y);
            }
        }
        for (let i = 0; i < 40; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
