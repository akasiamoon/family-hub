<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@200;400;700;900&display=swap');

        :root { --sigil: #22d3ee; --gold: #fbbf24; }
        [data-theme="gothic"] { --sigil: #a855f7; --gold: #f472b6; }
        [data-theme="emerald"] { --sigil: #10b981; --gold: #e2e8f0; }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; background-size: cover;
            color: #e2e8f0; font-family: 'Cinzel', serif; overflow: hidden; 
        }

        #particle-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

        .sidebar {
            position: relative; width: 100%; max-width: 460px; height: 100vh;
            padding: 2.5rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 85%, rgba(0,0,0,0) 100%);
            border-right: 2px solid var(--sigil);
        }

        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: linear-gradient(var(--gold), var(--sigil)); }

        .expensive-header {
            font-size: 12px; letter-spacing: 0.35em; font-weight: 900; text-transform: uppercase;
            padding: 1.25rem; background: linear-gradient(to right, var(--gold), var(--sigil));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            border-bottom: 2px solid transparent; border-image: linear-gradient(to right, var(--gold), var(--sigil)) 1;
            display: flex; justify-content: space-between; align-items: center;
        }

        .glass-module {
            background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem;
            margin-bottom: 2.5rem; overflow: hidden;
        }

        .avatar-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 12px; }
        .avatar-option { height: 42px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; background: rgba(0,0,0,0.6); opacity: 0.3; }
        .avatar-option.active { border-color: var(--sigil); opacity: 1; box-shadow: 0 0 15px var(--sigil); transform: scale(1.1); }

        input { background: rgba(0,0,0,1) !important; border: 1px solid rgba(34, 211, 238, 0.2) !important; color: #fff !important; padding: 14px !important; border-radius: 8px; font-family: 'Inter', sans-serif; width: 100%; }
        
        /* ARCHIVE STYLING */
        .archive-heart { color: #ef4444; filter: drop-shadow(0 0 5px #ef4444); }
        .note-entry { border-left: 2px solid rgba(34, 211, 238, 0.2); padding-left: 1rem; margin-bottom: 1.5rem; position: relative; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-widest" style="background: linear-gradient(to right, #fbbf24, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TUCKER COOPER BURNS</h1>
            <p class="text-[10px] tracking-[0.6em] opacity-50 uppercase mt-1">Siren's Sands • Family Hub</p>
            
            <div class="avatar-bar mt-6 bg-white/5 rounded-xl">
                <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐢')">🐢</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐺')">🐺</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🦉')">🦉</div>
                <div class="avatar-option" onclick="selectAvatar(this, '⚓')">⚓</div>
                <div class="avatar-option" onclick="selectAvatar(this, '📖')">📖</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🥥')">🥥</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🌴')">🌴</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐬')">🐬</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🦀')">🦀</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🎸')">🎸</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🏹')">🏹</div>
                <div class="avatar-option" onclick="selectAvatar(this, '⚔️')">⚔️</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🍄')">🍄</div>
                <div class="avatar-option" onclick="selectAvatar(this, '💎')">💎</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🍺')">🍺</div>
            </div>
            <input id="userName" type="text" placeholder="NAME" class="mt-4 text-center font-black">
        </header>

        <div class="glass-module"><div class="expensive-header">Grocery List</div><div class="p-6"><div id="marketList" class="space-y-3 mb-4 text-xs"></div><input id="mInput" type="text" placeholder="Add provisions..." onkeydown="if(event.key==='Enter') saveMarket()"></div></div>
        
        <div class="glass-module">
            <div class="expensive-header">Archive of Hearts</div>
            <div id="pinnedLog" class="p-6 space-y-4"></div>
        </div>

        <div class="glass-module">
            <div class="expensive-header">Love Notes</div>
            <div class="p-6">
                <div id="notesLog" class="space-y-6 mb-4"></div>
                <input id="nInput" type="text" placeholder="Post a note..." onkeydown="if(event.key==='Enter') saveNote()">
            </div>
        </div>

        <div class="glass-module">
            <div class="expensive-header"><span onclick="changeMonth(-1)">◀</span><span id="calMonth"></span><span onclick="changeMonth(1)">▶</span></div>
            <div id="calendarDates" class="grid grid-cols-7 gap-1 p-4 text-[11px] text-center"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSigil = '🔱', dispDate = new Date();

        function selectAvatar(el, icon) {
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active'); currentSigil = icon;
        }

        window.onload = () => { refreshAll(); buildCalendar(); animate(); };

        async function refreshAll() { loadNotes(); loadMarket(); }
        
        async function saveMarket() {
            const i = document.getElementById('mInput');
            if(!i.value) return;
            const name = document.getElementById('userName').value || 'User';
            await _supabase.from('market_items').insert([{ text: `${currentSigil} ${name}: ${i.value}` }]);
            i.value = ""; refreshAll();
        }

        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between border-b border-white/5 pb-2"><span>${item.text}</span><span class="text-red-900 cursor-pointer" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }

        async function saveNote() {
            const i = document.getElementById('nInput');
            if(!i.value) return;
            const name = document.getElementById('userName').value || 'User';
            const { error } = await _supabase.from('family_notes').insert([{ 
                note: i.value, 
                timestamp: `${currentSigil} ${name} • ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`, 
                is_pinned: false 
            }]);
            if (error) console.error(error);
            i.value = ""; refreshAll();
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            if(!data) return;
            const pinned = data.filter(n => n.is_pinned);
            const regular = data.filter(n => !n.is_pinned);
            
            const html = (n) => `
                <div class="note-entry group">
                    <small class="text-[9px] opacity-40 uppercase font-inter block">${n.timestamp}</small>
                    <p class="italic text-[15px] font-light mt-1">"${n.note}"</p>
                    <div class="flex gap-4 mt-2">
                        <span class="cursor-pointer ${n.is_pinned ? 'archive-heart' : 'opacity-20'}" onclick="togglePin('${n.id}', ${n.is_pinned})">❤️</span>
                        <span class="text-red-900 opacity-0 group-hover:opacity-100 cursor-pointer" onclick="deleteItem('family_notes', '${n.id}')">×</span>
                    </div>
                </div>`;
            
            document.getElementById('pinnedLog').innerHTML = pinned.length ? pinned.map(html).join('') : '<p class="text-[10px] opacity-30 italic">No pinned devotions.</p>';
            document.getElementById('notesLog').innerHTML = regular.map(html).join('');
        }

        async function togglePin(id, s) { await _supabase.from('family_notes').update({ is_pinned: !s }).eq('id', id); refreshAll(); }
        async function deleteItem(t, id) { await _supabase.from(t).delete().eq('id', id); refreshAll(); }
        
        function changeMonth(o) { dispDate.setMonth(dispDate.getMonth() + o); buildCalendar(); }
        async function buildCalendar() {
            const y = dispDate.getFullYear(), m = dispDate.getMonth();
            document.getElementById('calMonth').innerText = dispDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            const grid = document.getElementById('calendarDates'); grid.innerHTML = '';
            const { data: appts } = await _supabase.from('calendar_events').select('*');
            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasA = appts?.some(e => e.start_date === ds);
                const isT = (d === new Date().getDate() && m === new Date().getMonth());
                grid.innerHTML += `<div class="cal-date ${isT ? 'cal-today' : ''} ${hasA ? 'has-quest' : ''} p-2">${d}</div>`;
            }
        }

        // --- GLITCH-FREE PARTICLES ---
        const canvas = document.getElementById('particle-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const NOTE_CHARS = ['♪', '♫', '♬', '♩'];
        
        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 50;
                this.size = Math.random() * 15 + 10;
                this.speed = Math.random() * 0.5 + 0.3;
                this.opacity = Math.random() * 0.3;
                this.char = NOTE_CHARS[Math.floor(Math.random() * NOTE_CHARS.length)];
                this.isEmber = Math.random() > 0.6;
            }
            update() {
                this.y -= this.speed;
                this.x += Math.sin(this.y / 60) * 0.3;
                if (this.y < -50) this.init();
            }
            draw() {
                ctx.fillStyle = this.isEmber ? `rgba(251, 191, 36, ${this.opacity})` : `rgba(34, 211, 238, ${this.opacity})`;
                ctx.font = `${this.size}px serif`;
                ctx.fillText(this.isEmber ? '•' : this.char, this.x, this.y);
            }
        }

        for (let i = 0; i < 40; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
