<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cottage Hub • Farmington</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #050505; color: white; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        #bg-image {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; 
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            filter: brightness(45%) contrast(1.1);
            transition: filter 1s ease;
        }

        #music-notes {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .glass-module {
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(34, 211, 238, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            border-radius: 2rem;
            padding: 2rem;
            height: fit-content;
        }

        .hub-title {
            text-transform: uppercase;
            letter-spacing: 0.5em;
            background: linear-gradient(to right, #fde68a, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .custom-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #22d3ee transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }

        .hidden-ui { opacity: 0 !important; transform: translateY(30px); pointer-events: none; }
        
        .btn-glow {
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
            border: 1px solid rgba(34, 211, 238, 0.5);
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <canvas id="music-notes"></canvas>

    <button onclick="toggleUI()" class="fixed bottom-8 right-8 z-50 bg-cyan-950/60 border border-cyan-400/50 px-6 py-2 rounded-full backdrop-blur-md text-xs font-bold tracking-widest text-cyan-200">
        <span id="toggleText">HIDE INTERFACE</span>
    </button>

    <div id="mainUI" class="container mx-auto p-6 lg:p-12 transition-all duration-700">
        <header class="mb-12 flex flex-col lg:flex-row justify-between items-center gap-6">
            <div class="text-center lg:text-left">
                <h1 class="text-5xl hub-title mb-2">Cottage Hub</h1>
                <p class="text-cyan-400/50 text-[10px] tracking-[0.4em] uppercase">Farmington, MS • Mission Control</p>
            </div>
            
            <div class="flex items-center gap-4 bg-black/40 p-3 rounded-2xl border border-white/10 backdrop-blur-md">
                <span class="text-[10px] font-bold tracking-widest text-cyan-300 uppercase">Bardic Ambiance</span>
                <button id="audioToggle" onclick="toggleAudio()" class="bg-cyan-500/20 px-4 py-2 rounded-xl text-xs font-black text-cyan-100 btn-glow">PLAY</button>
                <audio id="beachAmbience" loop>
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                    <source src="https://assets.mixkit.co/active_storage/sfx/1234/1234-preview.mp3" type="audio/mpeg">
                </audio>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-8">
                <div class="glass-module">
                    <h2 class="text-orange-400 font-black text-xs tracking-widest uppercase mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-orange-500"></span> Market List
                    </h2>
                    <div id="marketList" class="space-y-3 mb-6 h-48 custom-scroll"></div>
                    <div class="flex gap-2">
                        <input id="mInput" type="text" placeholder="Add..." class="bg-white/5 border border-white/10 rounded-xl p-3 w-full text-sm outline-none">
                        <button onclick="saveMarket()" class="bg-orange-600/20 px-5 rounded-xl border border-orange-500/50 font-bold">+</button>
                    </div>
                </div>

                <div class="glass-module">
                    <h2 class="text-green-400 font-black text-xs tracking-widest uppercase mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span> Meal Plan
                    </h2>
                    <div id="mealGrid" class="space-y-3 text-xs"></div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass-module h-full flex flex-col min-h-[450px]">
                    <h2 class="text-cyan-400 font-black text-xs tracking-widest uppercase mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-cyan-500"></span> Family Log
                    </h2>
                    <div id="notesLog" class="flex-grow space-y-6 mb-8 custom-scroll"></div>
                    <div class="flex gap-4">
                        <input id="nInput" type="text" placeholder="Lesson notes or updates..." class="bg-white/5 border border-white/10 rounded-2xl p-5 w-full outline-none">
                        <button onclick="saveNote()" class="bg-cyan-600/20 px-10 rounded-2xl font-black border border-cyan-400/50 text-cyan-200">POST</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass-module">
                    <h2 class="text-cyan-300 font-black text-xs tracking-widest uppercase mb-8 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-cyan-300"></span> Family Schedule
                    </h2>
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- AUDIO LOGIC ---
        const audio = document.getElementById('beachAmbience');
        const audioBtn = document.getElementById('audioToggle');
        // Setting a specific beach/fire soundscape URL
        audio.src = "https://actions.google.com/sounds/v1/water/ocean_waves.ogg";

        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                audioBtn.innerText = "PAUSE";
                audioBtn.classList.add('bg-cyan-500/40');
            } else {
                audio.pause();
                audioBtn.innerText = "PLAY";
                audioBtn.classList.remove('bg-cyan-500/40');
            }
        }

        // --- FLOATING NOTES LOGIC ---
        const canvas = document.getElementById('music-notes');
        const ctx = canvas.getContext('2d');
        let notes = [];
        const glyphs = ['♪', '♫', '♩', '♬', '♭', '♮'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        class Note {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 50;
                this.text = glyphs[Math.floor(Math.random() * glyphs.length)];
                this.size = Math.random() * 15 + 10;
                this.speedY = Math.random() * 0.8 + 0.2;
                this.opacity = Math.random() * 0.4 + 0.1;
                this.angle = Math.random() * Math.PI * 2;
                this.wobble = Math.random() * 0.02;
                this.color = Math.random() > 0.5 ? '34, 211, 238' : '253, 230, 138';
            }
            update() {
                this.y -= this.speedY;
                this.angle += this.wobble;
                this.x += Math.sin(this.angle) * 0.5;
                if (this.y < -50) this.reset();
            }
            draw() {
                ctx.font = `${this.size}px serif`;
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(${this.color}, 0.5)`;
                ctx.fillText(this.text, this.x, this.y);
            }
        }

        for (let i = 0; i < 20; i++) notes.push(new Note());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            notes.forEach(note => { note.update(); note.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- APP LOGIC ---
        window.onload = () => {
            refreshAll();
            initCalendar();
            _supabase.channel('db').on('postgres_changes', {event:'*', schema:'public'}, () => {
                refreshAll();
                if(calendar) calendar.refetchEvents();
            }).subscribe();
        };

        function toggleUI() {
            const ui = document.getElementById('mainUI');
            const bg = document.getElementById('bg-image');
            ui.classList.toggle('hidden-ui');
            bg.style.filter = ui.classList.contains('hidden-ui') ? 'brightness(100%)' : 'brightness(45%) contrast(1.1)';
            document.getElementById('toggleText').innerText = ui.classList.contains('hidden-ui') ? "SHOW INTERFACE" : "HIDE INTERFACE";
        }

        async function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                height: 'auto',
                selectable: true,
                select: async (info) => {
                    const title = prompt('Add Appointment:');
                    if (title) {
                        await _supabase.from('calendar_events').insert([{ title, start_date: info.startStr }]);
                        calendar.refetchEvents();
                    }
                },
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date, backgroundColor: 'rgba(34, 211, 238, 0.2)', borderColor: '#22d3ee' })) : []);
                }
            });
            calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }

        async function saveNote() {
            const i = document.getElementById('nInput');
            if (!i.value) return;
            const ts = new Date().toLocaleString([], {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: ts }]);
            i.value = "";
        }

        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `
                <div class="border-l-4 border-cyan-500/30 pl-6 py-4 bg-white/5 rounded-r-2xl">
                    <small class="text-cyan-400/60 font-mono tracking-widest text-[10px] uppercase">${n.timestamp}</small>
                    <p class="text-white/80 text-lg font-light mt-1">${n.note}</p>
                </div>
            `).join('') : '';
        }

        async function saveMarket() {
            const i = document.getElementById('mInput');
            if (i.value) await _supabase.from('market_items').insert([{ text: i.value }]);
            i.value = "";
        }

        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-xl border border-white/5">
                    <input type="checkbox" class="w-4 h-4 accent-orange-500">
                    <span class="text-sm text-white/70 tracking-tight">${item.text}</span>
                </div>
            `).join('') : '';
        }

        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                        <span class="font-bold text-green-400 text-[10px] uppercase tracking-tighter">${day}</span>
                        <input onchange="updateMeal('${day}', this.value)" value="${meal}" class="bg-transparent text-right w-2/3 outline-none text-white/50 focus:text-white">
                    </div>
                `;
            }).join('');
        }

        async function updateMeal(day, menu) { await _supabase.from('meal_plan').upsert({ day, menu }, { onConflict: 'day' }); }
    </script>
</body>
</html>
