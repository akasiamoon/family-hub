<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Sands • Tucker Cooper Burns</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700;800&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('thefamilyhub.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        .sidebar {
            position: relative;
            width: 100%; max-width: 480px; height: 100vh;
            padding: 2rem; overflow-y: auto; z-index: 10;
            background: linear-gradient(to right, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 80%, rgba(0,0,0,0) 100%);
            border-right: 1px solid rgba(34, 211, 238, 0.15);
        }

        /* Avatar Selection Styling */
        .avatar-bar { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .avatar-option {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); font-size: 20px;
        }
        .avatar-option.active { border-color: #22d3ee; box-shadow: 0 0 15px #22d3ee; transform: scale(1.1); }

        .glass-module {
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(25px); border: 2px solid rgba(34, 211, 238, 0.2);
            border-radius: 1.5rem; margin-bottom: 2rem;
        }

        .module-header { padding: 1.25rem; display: flex; justify-content: space-between; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .module-content { padding: 1.5rem; transition: all 0.4s ease; max-height: 1200px; opacity: 1; }
        .module-collapsed .module-content { max-height: 0; padding: 0; opacity: 0; overflow: hidden; pointer-events: none; }

        .hub-title {
            font-family: 'Cinzel', serif; letter-spacing: 0.1em;
            background: linear-gradient(to right, #fde68a, #22d3ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; text-transform: uppercase;
        }

        input { background: rgba(0,0,0,0.8) !important; border: 2px solid rgba(255,255,255,0.1) !important; color: white !important; padding: 12px !important; border-radius: 12px; width: 100%; margin-bottom: 10px; }
        .btn-ui { background: #22d3ee !important; color: #000 !important; padding: 10px; border-radius: 12px; width: 100%; font-weight: 800; text-transform: uppercase; font-size: 13px; }

        /* Scrollbar Fix */
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.3); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <header class="mb-8">
            <h1 class="text-3xl hub-title">Siren's Sands</h1>
            <p class="text-cyan-400 text-[10px] tracking-widest uppercase mt-1 font-bold">Tucker • Cooper • Burns</p>
            
            <p class="text-white/40 text-[9px] uppercase tracking-widest mt-6 mb-2">Identify Yourself:</p>
            <div class="avatar-bar" id="avatarBar">
                <div class="avatar-option active" onclick="selectAvatar(this, '🔱')">🔱</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🧜‍♀️')">🧜‍♀️</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐚')">🐚</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🏴‍☠️')">🏴‍☠️</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🔥')">🔥</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🏹')">🏹</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐺')">🐺</div>
            </div>
        </header>

        <div id="marketMod" class="glass-module">
            <div class="module-header" onclick="toggle('marketMod')">
                <span class="text-orange-400 font-extrabold text-xs uppercase tracking-wider">🛒 Shopping List</span>
                <span onclick="triggerPurge(event)" class="text-[9px] text-red-400 font-bold cursor-pointer">[PURGE]</span>
            </div>
            <div class="module-content">
                <div id="marketList" class="max-h-48 overflow-y-auto mb-4 space-y-2"></div>
                <input id="mInput" type="text" placeholder="Add provision..." onkeydown="if(event.key==='Enter') saveMarket()">
            </div>
        </div>

        <div id="mealMod" class="glass-module">
            <div class="module-header" onclick="toggle('mealMod')">
                <span class="text-green-400 font-extrabold text-xs uppercase tracking-wider">🍲 Weekly Feasts</span>
            </div>
            <div class="module-content"><div id="mealGrid" class="text-xs space-y-3"></div></div>
        </div>

        <div id="logMod" class="glass-module">
            <div class="module-header" onclick="toggle('logMod')">
                <span class="text-cyan-400 font-extrabold text-xs uppercase tracking-wider">📜 Family Chronicles</span>
            </div>
            <div class="module-content">
                <div id="notesLog" class="max-h-60 overflow-y-auto mb-4 space-y-4"></div>
                <input id="nInput" type="text" placeholder="Speak, bard..." onkeydown="if(event.key==='Enter') saveNote()">
                <button onclick="saveNote()" class="btn-ui">Post to Log</button>
            </div>
        </div>

        <div id="calMod" class="glass-module">
            <div class="module-header" onclick="toggle('calMod')">
                <span class="text-cyan-200 font-extrabold text-xs uppercase tracking-wider">📅 Schedule</span>
            </div>
            <div class="module-content"><div id="calendar" class="text-[10px]"></div></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yflfpwcaowzkoxqnohso.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OUXpGQk3QkOoUu94S9YZNg_Sb34-Jc4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let selectedAvatar = '🔱';

        function selectAvatar(el, icon) {
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            selectedAvatar = icon;
        }

        function toggle(id) { document.getElementById(id).classList.toggle('module-collapsed'); }

        window.onload = () => { refreshAll(); initCalendar(); animate(); };

        async function initCalendar() {
            window.calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 'auto',
                events: async (info, success) => {
                    const { data } = await _supabase.from('calendar_events').select('*');
                    success(data ? data.map(e => ({ title: e.title, start: e.start_date, color: '#0e7490' })) : []);
                }
            });
            window.calendar.render();
        }

        async function refreshAll() { loadNotes(); loadMarket(); loadMeals(); }

        // Modified save functions to include the avatar
        async function saveMarket() {
            const i = document.getElementById('mInput'); if (!i.value) return;
            await _supabase.from('market_items').insert([{ text: `${selectedAvatar} ${i.value}` }]);
            i.value = "";
        }
        async function loadMarket() {
            const { data } = await _supabase.from('market_items').select('*').order('created_at', { ascending: true });
            document.getElementById('marketList').innerHTML = data ? data.map(item => `<div class="flex justify-between items-center bg-white/5 p-3 rounded-lg border border-white/5"><span>${item.text}</span><span class="text-red-400 text-xs cursor-pointer" onclick="deleteItem('market_items', '${item.id}')">×</span></div>`).join('') : '';
        }

        async function saveNote() {
            const i = document.getElementById('nInput'); if (!i.value) return;
            const ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            await _supabase.from('family_notes').insert([{ note: i.value, timestamp: `${selectedAvatar} • ${ts}` }]);
            i.value = "";
        }
        async function loadNotes() {
            const { data } = await _supabase.from('family_notes').select('*').order('created_at', { ascending: false });
            document.getElementById('notesLog').innerHTML = data ? data.map(n => `
                <div class="bg-white/5 p-4 rounded-xl border border-white/5 relative">
                    <small class="text-cyan-400 font-bold text-[9px] block mb-1 uppercase">${n.timestamp}</small>
                    <p class="text-sm">${n.note}</p>
                    <span class="absolute top-2 right-3 text-red-400 cursor-pointer" onclick="deleteItem('family_notes', '${n.id}')">×</span>
                </div>`).join('') : '';
        }

        async function deleteItem(table, id) { await _supabase.from(table).delete().eq('id', id); refreshAll(); }
        async function triggerPurge(e) { e.stopPropagation(); if(confirm("Wipe Shopping List?")) { await _supabase.from('market_items').delete().neq('id', 0); refreshAll(); } }

        async function loadMeals() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const { data } = await _supabase.from('meal_plan').select('*');
            document.getElementById('mealGrid').innerHTML = days.map(day => {
                const meal = data?.find(m => m.day === day)?.menu || "TBD";
                return `<div class="flex justify-between items-center bg-white/5 p-2 rounded-lg border border-white/5"><span class="font-bold text-green-400 text-[10px] uppercase">${day}</span><input onchange="updateMeal('${day}', this.value)" value="${meal}" class="!bg-transparent !border-none !p-0 !m-0 !w-auto text-right text-cyan-400 font-bold"></div>`;
            }).join('');
        }
        async function updateMeal(day, menu) { await _supabase.from('meal_plan').upsert({ day, menu }, { onConflict: 'day' }); }

        // PARTICLE ENGINE
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const glyphs = ['♪', '♫', '♩'];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = canvas.height + 20;
                this.isNote = Math.random() > 0.3; this.text = glyphs[Math.floor(Math.random() * glyphs.length)];
                this.size = Math.random() * 8 + 4; this.speed = Math.random() * 0.4 + 0.1;
                this.opacity = Math.random() * 0.3 + 0.1; this.color = this.isNote ? '34, 211, 238' : '251, 191, 36';
            }
            update() { this.y -= this.speed; this.x += Math.sin(this.y / 100) * 0.3; if (this.y < -30) this.reset(); }
            draw() {
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                if (this.isNote) { ctx.font = `${this.size}px Cinzel`; ctx.fillText(this.text, this.x, this.y); } 
                else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 5, 0, Math.PI * 2); ctx.fill(); }
            }
        }
        for (let i = 0; i < 35; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    </script>
</body>
</html>
